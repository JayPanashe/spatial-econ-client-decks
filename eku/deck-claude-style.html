<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Ekurhuleni Spatial Economic Intelligence Platform — Onboarding</title>
  <meta name="viewport" content="width=1920, initial-scale=1">
  <style>
/* Spatial Economics — Colors & Type
 *
 * Brand inputs (confirmed by user):
 *   - Primary purple    #594AE3
 *   - Warm-grey neutral #E8E7DF
 *   - Type family       Segoe UI (system stack)
 *
 * Voice: spatial econometrics & GIS / urban economies — crisp, light,
 * research-publication. One saturated indigo accent on a warm-paper canvas.
 * No webfonts; the entire system is set in Segoe UI off the system stack.
 */

:root {
  /* ───────────────────────────────────────── PRIMARY (BRAND) ── */
  /* The single saturated colour in the system. */
  --se-primary:        #594AE3;
  --se-primary-600:    #4A3DD0;   /* hover */
  --se-primary-700:    #3A30B0;   /* active / press */
  --se-primary-50:     #EEEBFD;   /* tint chips & callouts */
  --se-primary-100:    #DDD7FB;
  --se-primary-200:    #BBB1F7;

  /* ───────────────────────────────────────── NEUTRALS ── */
  /* The warm grey #E8E7DF anchors panels and dividers. The page itself
     stays paper-white; #E8E7DF appears as soft bands, card edges, and
     the body of the trusted-by strip. Text is a cool near-black ink. */
  --se-bg:             #FFFFFF;
  --se-bg-soft:        #F4F3EE;   /* soft warm panel (lighter than --warm) */
  --se-warm:           #E8E7DF;   /* signature warm-grey */
  --se-warm-strong:    #D9D7CC;   /* warm-grey hairline / divider */

  --se-bg-cool:        #F7F8FB;   /* alternate cool panel for data UIs */
  --se-line:           #E3E3DC;   /* default hairline (warm tilt) */
  --se-line-strong:    #C9C8BF;

  --se-fg:             #0F1525;   /* body ink */
  --se-fg-strong:      #060914;   /* headings */
  --se-fg-2:           #3A4256;   /* secondary copy */
  --se-fg-3:           #6B7385;   /* tertiary / labels */
  --se-fg-4:           #9AA0AE;   /* disabled / captions */

  /* ───────────────────────────────────────── SEMANTIC ── */
  --se-success:        #1F8F5A;
  --se-success-bg:     #E5F5EC;
  --se-warning:        #B26A00;
  --se-warning-bg:     #FFF1DA;
  --se-danger:         #C5283D;
  --se-danger-bg:      #FCE7EA;
  --se-info:           var(--se-primary);
  --se-info-bg:        var(--se-primary-50);

  /* ───────────────────────────────────────── DATA-VIZ ── */
  /* Map / chart palette tuned for choropleths and ranked categories. */
  --se-data-1:         #594AE3;   /* indigo (brand) */
  --se-data-2:         #2F8FE3;   /* sky */
  --se-data-3:         #18B4A7;   /* teal */
  --se-data-4:         #E5A33C;   /* amber */
  --se-data-5:         #D5436A;   /* magenta */
  --se-data-6:         #2A2F45;   /* graphite */

  /* ───────────────────────────────────────── ELEVATION ── */
  --se-shadow-xs: 0 1px 2px rgba(15, 21, 37, 0.04);
  --se-shadow-sm: 0 2px 6px rgba(15, 21, 37, 0.06);
  --se-shadow-md: 0 8px 24px rgba(15, 21, 37, 0.08);
  --se-shadow-lg: 0 24px 48px -12px rgba(15, 21, 37, 0.18);
  --se-ring:      0 0 0 3px rgba(89, 74, 227, 0.22);

  /* ───────────────────────────────────────── RADII ── */
  --se-radius-xs: 4px;
  --se-radius-sm: 6px;
  --se-radius-md: 10px;
  --se-radius-lg: 14px;
  --se-radius-xl: 20px;
  --se-radius-pill: 999px;

  /* ───────────────────────────────────────── SPACING (4-base) ── */
  --se-space-1:  4px;
  --se-space-2:  8px;
  --se-space-3:  12px;
  --se-space-4:  16px;
  --se-space-5:  24px;
  --se-space-6:  32px;
  --se-space-7:  48px;
  --se-space-8:  64px;
  --se-space-9:  96px;

  /* ───────────────────────────────────────── TYPE FAMILIES ── */
  /* No webfonts. Segoe UI off the system stack — same family for display,
     UI, and editorial. For numerical / tabular content we still call
     `--se-font-mono` so figures sit in columns; it falls back to Consolas /
     SF Mono which ship on Segoe-host systems. */
  --se-font-display: "Segoe UI", "Segoe UI Variable Display", system-ui, -apple-system, "Helvetica Neue", Arial, sans-serif;
  --se-font-sans:    "Segoe UI", "Segoe UI Variable Text", system-ui, -apple-system, "Helvetica Neue", Arial, sans-serif;
  --se-font-mono:    "Cascadia Mono", "Consolas", ui-monospace, "SF Mono", Menlo, monospace;

  /* ───────────────────────────────────────── TYPE SCALE ── */
  /* 1.250 (major third), base 16px */
  --se-fs-xs:   12px;
  --se-fs-sm:   14px;
  --se-fs-base: 16px;
  --se-fs-md:   18px;
  --se-fs-lg:   20px;
  --se-fs-xl:   24px;
  --se-fs-2xl:  30px;
  --se-fs-3xl:  38px;
  --se-fs-4xl:  48px;
  --se-fs-5xl:  60px;
  --se-fs-6xl:  76px;

  --se-lh-tight:   1.1;
  --se-lh-snug:    1.25;
  --se-lh-normal:  1.5;
  --se-lh-relaxed: 1.65;

  /* Segoe UI is friendlier with slightly less aggressive tracking than
     a geometric display font would take. */
  --se-tracking-tight:  -0.015em;
  --se-tracking-snug:   -0.005em;
  --se-tracking-normal: 0;
  --se-tracking-wide:   0.02em;
  --se-tracking-wider:  0.08em;   /* eyebrows / overlines */

  /* ───────────────────────────────────────── MOTION ── */
  --se-ease-out:    cubic-bezier(0.2, 0.8, 0.2, 1);
  --se-ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);
  --se-dur-fast: 120ms;
  --se-dur:      200ms;
  --se-dur-slow: 360ms;
}

/* ─────────────────────────────────────────── BASE ── */

html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
body {
  font-family: var(--se-font-sans);
  font-size: var(--se-fs-base);
  line-height: var(--se-lh-relaxed);
  color: var(--se-fg);
  background: var(--se-bg);
}

/* ─────────────────────────────────────────── SEMANTIC TYPE ── */
/* Apply these classes (or copy the rules) wherever you'd otherwise reach
   for ad-hoc font-size declarations. Headings track tight, body tracks
   normal, eyebrows track wide. Display uses Segoe UI Semibold (600) for
   weight; Segoe Bold (700) for top-of-page hero only. */

.se-eyebrow,
[data-se="eyebrow"] {
  font-family: var(--se-font-sans);
  font-size: var(--se-fs-xs);
  font-weight: 600;
  letter-spacing: var(--se-tracking-wider);
  text-transform: uppercase;
  color: var(--se-primary);
}

.se-h1, [data-se="h1"] {
  font-family: var(--se-font-display);
  font-size: clamp(40px, 5vw, var(--se-fs-5xl));
  font-weight: 700;
  line-height: var(--se-lh-tight);
  letter-spacing: var(--se-tracking-tight);
  color: var(--se-fg-strong);
}

.se-h2, [data-se="h2"] {
  font-family: var(--se-font-display);
  font-size: clamp(28px, 3.4vw, var(--se-fs-3xl));
  font-weight: 600;
  line-height: var(--se-lh-snug);
  letter-spacing: var(--se-tracking-snug);
  color: var(--se-fg-strong);
}

.se-h3, [data-se="h3"] {
  font-family: var(--se-font-display);
  font-size: var(--se-fs-xl);
  font-weight: 600;
  line-height: var(--se-lh-snug);
  letter-spacing: var(--se-tracking-snug);
  color: var(--se-fg-strong);
}

.se-h4, [data-se="h4"] {
  font-family: var(--se-font-display);
  font-size: var(--se-fs-lg);
  font-weight: 600;
  line-height: var(--se-lh-snug);
  color: var(--se-fg-strong);
}

.se-lead, [data-se="lead"] {
  font-family: var(--se-font-sans);
  font-size: var(--se-fs-lg);
  font-weight: 400;
  line-height: var(--se-lh-relaxed);
  color: var(--se-fg-2);
}

.se-body, [data-se="body"] {
  font-family: var(--se-font-sans);
  font-size: var(--se-fs-base);
  font-weight: 400;
  line-height: var(--se-lh-relaxed);
  color: var(--se-fg);
}

.se-small, [data-se="small"] {
  font-family: var(--se-font-sans);
  font-size: var(--se-fs-sm);
  line-height: var(--se-lh-normal);
  color: var(--se-fg-3);
}

.se-mono, [data-se="mono"] {
  font-family: var(--se-font-mono);
  font-size: var(--se-fs-sm);
  letter-spacing: 0;
  font-feature-settings: "tnum" 1;
}

.se-quote, [data-se="quote"] {
  font-family: var(--se-font-sans);   /* italic Segoe — no serif option */
  font-size: var(--se-fs-2xl);
  font-style: italic;
  font-weight: 400;
  line-height: var(--se-lh-snug);
  color: var(--se-fg-strong);
}

/* Tabular figures — use anywhere you render a number (KPIs, ward counts).
   Segoe UI supports tnum natively. */
.se-tnum { font-variant-numeric: tabular-nums; font-feature-settings: "tnum" 1; }

</style>
  <script>
/**
 * <deck-stage> — reusable web component for HTML decks.
 *
 * Handles:
 *  (a) speaker notes — reads <style>
    body {
      margin: 0;
      background: var(--se-bg-muted, #EEF1F6);
      font-family: var(--se-font-sans);
      color: var(--se-fg);
    }

    deck-stage { display: block; width: 100%; height: 100vh; }

    /* Reference-data badge for non-ETH clients on every slide driven by ETH numbers,
       worked examples, or eThekwini-specific scenarios */
    body.has-reference-badge section.slide[data-screen-label^="09 "]::before,
    body.has-reference-badge section.slide[data-screen-label^="13 "]::before,
    body.has-reference-badge section.slide[data-screen-label^="14 "]::before,
    body.has-reference-badge section.slide[data-screen-label^="15 "]::before,
    body.has-reference-badge section.slide[data-screen-label^="16 "]::before,
    body.has-reference-badge section.slide[data-screen-label^="17 "]::before,
    body.has-reference-badge section.slide[data-screen-label^="19 "]::before,
    body.has-reference-badge section.slide[data-screen-label^="27 "]::before,
    body.has-reference-badge section.slide[data-screen-label^="28 "]::before,
    body.has-reference-badge section.slide[data-screen-label^="29 "]::before {
      content: "REFERENCE · figures shown are eThekwini's pilot implementation";
      position: absolute;
      top: 28px;
      right: 112px;
      z-index: 10;
      padding: 7px 14px;
      background: var(--se-warm);
      color: var(--se-fg-strong);
      border: 1px solid var(--se-warm-strong);
      border-radius: 999px;
      font-family: var(--se-font-sans);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.10em;
      text-transform: uppercase;
    }

    /* ─────────────── slide chrome ─────────────── */
    section.slide {
      width: 1920px;
      height: 1080px;
      background: var(--se-bg);
      color: var(--se-fg);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .slide-pad {
      padding: 88px 112px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 40px;
    }

    .slide-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      border-bottom: 1px solid var(--se-line);
      padding-bottom: 24px;
    }

    .slide-eyebrow {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--se-primary);
      font-family: var(--se-font-sans);
    }
    .slide-section-tag {
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--se-fg-3);
      font-family: var(--se-font-mono);
    }

    .slide-footer {
      position: absolute;
      bottom: 36px;
      left: 112px;
      right: 112px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      color: var(--se-fg-3);
      letter-spacing: 0.04em;
      font-family: var(--se-font-mono);
      border-top: 1px solid var(--se-line);
      padding-top: 16px;
    }
    .slide-footer .brand {
      display: flex; align-items: center;
      font-family: var(--se-font-display);
      font-weight: 700;
      color: var(--se-fg-strong);
      letter-spacing: 0.02em;
    }
    .slide-footer .brand b { color: var(--se-primary); }
    .slide-footer .brand img { height: 22px; width: auto; display: block; }
    .title-left .brand-mark img { height: 40px; width: auto; display: block; }
    .title-left .brand-mark { display: flex; align-items: center; gap: 18px; }
    .title-left .brand-mark .meta { font-family: var(--se-font-mono); font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--se-fg-3); border-left: 1px solid var(--se-line); padding-left: 18px; line-height: 1.5; }

    h1.slide-title {
      font-family: var(--se-font-display);
      font-size: 64px;
      line-height: 1.05;
      letter-spacing: -0.02em;
      font-weight: 700;
      color: var(--se-fg-strong);
      margin: 0;
      max-width: 1400px;
    }
    h2.slide-title {
      font-family: var(--se-font-display);
      font-size: 52px;
      line-height: 1.08;
      letter-spacing: -0.02em;
      font-weight: 700;
      color: var(--se-fg-strong);
      margin: 0;
      max-width: 1500px;
    }
    p.slide-lead {
      font-size: 24px;
      line-height: 1.4;
      color: var(--se-fg-2);
      max-width: 1200px;
      margin: 0;
      font-weight: 400;
    }

    /* ─────────────── primitives ─────────────── */
    .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:32px; }
    .grid-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:24px; }
    .grid-4 { display:grid; grid-template-columns:repeat(4,1fr); gap:20px; }

    .card {
      background: var(--se-bg);
      border: 1px solid var(--se-line);
      border-radius: 14px;
      padding: 28px 32px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .card.soft { background: var(--se-bg-soft); border-color: var(--se-line); }
    .card.warm { background: #E8E7DF; border-color: #DAD9D0; }
    .card.indigo {
      background: var(--se-primary);
      color: #fff;
      border-color: var(--se-primary);
    }
    .card.indigo h3, .card.indigo h4, .card.indigo .num { color: #fff; }
    .card.indigo p, .card.indigo .small { color: rgba(255,255,255,0.85); }

    .tag {
      align-self: flex-start;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--se-primary);
      font-family: var(--se-font-mono);
    }
    .card.indigo .tag { color: rgba(255,255,255,0.9); }

    .card h3 { margin:0; font-family:var(--se-font-display); font-size:24px; font-weight:700; color:var(--se-fg-strong); letter-spacing:-0.01em; }
    .card h4 { margin:0; font-family:var(--se-font-display); font-size:20px; font-weight:700; color:var(--se-fg-strong); }
    .card p  { margin:0; font-size:16px; line-height:1.5; color:var(--se-fg-2); }
    .card .small { font-size:13px; color:var(--se-fg-3); }
    .card .num {
      font-family: var(--se-font-display);
      font-size: 56px; font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--se-fg-strong);
      line-height: 0.95;
      font-variant-numeric: tabular-nums;
    }
    .card .num small { font-size: 18px; color: var(--se-fg-3); font-weight:500; letter-spacing: 0; margin-left:6px; }

    .chip {
      display: inline-flex; align-items: center;
      padding: 6px 14px;
      border: 1px solid var(--se-line);
      border-radius: 999px;
      font-size: 13px;
      color: var(--se-fg-2);
      font-family: var(--se-font-mono);
      background: #fff;
    }
    .chip.indigo { background: var(--se-primary-50); color: var(--se-primary-700); border-color: var(--se-primary-100); }
    .chip-row { display:flex; flex-wrap:wrap; gap:10px; }

    .kv { display:grid; grid-template-columns: 220px 1fr; gap: 12px 24px; font-size: 15px; }
    .kv dt { font-family: var(--se-font-mono); color: var(--se-fg-3); font-size: 13px; letter-spacing: 0.04em; text-transform: uppercase; }
    .kv dd { margin: 0; color: var(--se-fg); }

    table.spec {
      width: 100%; border-collapse: collapse; font-size: 15px;
    }
    table.spec th, table.spec td {
      text-align: left; padding: 14px 18px; border-bottom: 1px solid var(--se-line);
      vertical-align: top;
    }
    table.spec th {
      font-family: var(--se-font-mono); font-size: 12px; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--se-fg-3); font-weight: 600;
      border-bottom: 2px solid var(--se-fg-strong);
    }
    table.spec td.mono { font-family: var(--se-font-mono); font-variant-numeric: tabular-nums; }
    table.spec td .badge {
      display:inline-block; font-family: var(--se-font-mono); font-size:11px;
      padding: 2px 8px; border-radius: 4px; background: var(--se-primary-50);
      color: var(--se-primary-700); letter-spacing: 0.06em;
    }

    /* full-bleed title slide */
    section.slide.title-slide { padding: 0; background: var(--se-bg); }
    .title-grid {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      width: 100%; height: 100%;
    }
    .title-left {
      padding: 88px 96px;
      display: flex; flex-direction: column; justify-content: space-between;
      background: var(--se-bg);
    }
    .title-right {
      background: var(--se-primary);
      color: #fff;
      padding: 88px 96px;
      display: flex; flex-direction: column; justify-content: space-between;
      position: relative; overflow: hidden;
    }
    .title-right::before {
      content: ""; position:absolute; inset:0;
      background: radial-gradient(circle at 80% 20%, rgba(255,255,255,0.10), transparent 60%);
    }
    .title-right > * { position: relative; z-index: 1; }
    .title-display {
      font-family: var(--se-font-display);
      font-weight: 800;
      font-size: 92px;
      line-height: 0.96;
      letter-spacing: -0.03em;
      color: var(--se-fg-strong);
      margin: 0;
    }
    .title-display em { font-style: normal; color: var(--se-primary); }
    .title-sub {
      font-size: 22px; line-height: 1.45; color: var(--se-fg-2);
      max-width: 560px; margin-top: 32px;
    }
    .title-meta {
      display: grid; grid-template-columns: auto 1fr; gap: 8px 24px;
      font-family: var(--se-font-mono); font-size: 14px;
      color: var(--se-fg-3);
    }
    .title-meta dt { text-transform: uppercase; letter-spacing: 0.08em; }
    .title-meta dd { margin: 0; color: var(--se-fg-strong); }

    .title-stat {
      font-family: var(--se-font-display);
      font-size: 220px; font-weight: 800;
      line-height: 0.85;
      letter-spacing: -0.04em;
      color: #fff;
    }
    .title-stat-label {
      font-family: var(--se-font-mono);
      font-size: 14px; text-transform: uppercase;
      letter-spacing: 0.16em; opacity: 0.8;
    }
    .title-statgrid { display:grid; grid-template-columns:1fr 1fr; gap:32px 24px; }
    .title-statgrid .num {
      font-family: var(--se-font-display); font-size: 88px; font-weight: 800;
      letter-spacing: -0.03em; color: #fff; line-height: 0.95;
    }
    .title-statgrid .lbl {
      font-family: var(--se-font-mono); font-size: 13px;
      text-transform: uppercase; letter-spacing: 0.12em;
      color: rgba(255,255,255,0.78); margin-top: 6px;
    }

    /* section dividers */
    section.slide.section-divider {
      background: var(--se-fg-strong);
      color: #fff;
    }
    section.slide.section-divider .slide-pad { justify-content: center; }
    .section-num {
      font-family: var(--se-font-mono);
      font-size: 18px; letter-spacing: 0.18em;
      color: var(--se-primary-200);
      text-transform: uppercase;
    }
    .section-title {
      font-family: var(--se-font-display);
      font-size: 140px; line-height: 0.95;
      font-weight: 800; letter-spacing: -0.03em;
      color: #fff; margin: 24px 0 0; max-width: 1500px;
    }
    .section-subtitle {
      font-size: 26px; max-width: 1200px;
      color: rgba(255,255,255,0.82);
      margin-top: 28px; line-height: 1.4;
    }

    /* model card grid */
    .model-card {
      border: 1px solid var(--se-line);
      border-radius: 14px;
      padding: 22px 24px;
      background: #fff;
      display: flex; flex-direction: column;
      gap: 8px;
    }
    .model-card .id {
      font-family: var(--se-font-mono);
      font-weight: 700; color: var(--se-primary);
      font-size: 14px; letter-spacing: 0.06em;
    }
    .model-card h4 { margin: 0; font-family: var(--se-font-display); font-size: 19px; color: var(--se-fg-strong); }
    .model-card p  { margin: 0; font-size: 14px; line-height: 1.45; color: var(--se-fg-2); }
    .model-card .out {
      font-family: var(--se-font-mono); font-size: 12px;
      color: var(--se-fg-3); letter-spacing: 0.04em;
      padding-top: 10px; margin-top: auto;
      border-top: 1px dashed var(--se-line);
    }

    /* timeline */
    .timeline { display:flex; gap:0; align-items:stretch; }
    .timeline .step {
      flex:1; padding: 20px 22px; border-right: 1px solid var(--se-line);
      display:flex; flex-direction:column; gap:8px;
    }
    .timeline .step:last-child { border-right: none; }
    .timeline .step .n {
      font-family: var(--se-font-mono); font-size: 12px; letter-spacing: 0.1em;
      color: var(--se-primary); font-weight: 600;
    }
    .timeline .step h5 { margin:0; font-family:var(--se-font-display); font-size:18px; font-weight:700; color:var(--se-fg-strong);}
    .timeline .step p  { margin:0; font-size:13px; line-height:1.45; color:var(--se-fg-2); }

    /* big stat block */
    .bigstat {
      display:flex; flex-direction:column; gap: 6px;
      padding: 20px 0;
    }
    .bigstat .v {
      font-family: var(--se-font-display); font-weight: 800;
      font-size: 96px; letter-spacing: -0.04em; line-height: 0.9;
      color: var(--se-fg-strong); font-variant-numeric: tabular-nums;
    }
    .bigstat .l {
      font-family: var(--se-font-mono); font-size: 13px;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--se-fg-3);
    }
    .bigstat.indigo .v { color: var(--se-primary); }

    /* Quote / pull */
    .pull {
      font-family: var(--se-font-display);
      font-weight: 600;
      font-size: 36px; line-height: 1.25;
      letter-spacing: -0.01em;
      color: var(--se-fg-strong);
      max-width: 1300px;
    }

    /* legend */
    .legend { display:flex; gap:18px; flex-wrap:wrap; font-family:var(--se-font-mono); font-size:12px; }
    .legend .sw { display:flex; align-items:center; gap:8px; color:var(--se-fg-2); }
    .legend .sw i { width:14px; height:14px; border-radius:3px; display:inline-block; }

    /* density toggle */
    body[data-density="calm"] .dense-only { display: none; }
    body[data-density="dense"] .calm-only { display: none; }
    body[data-density="calm"] .slide-pad { gap: 56px; }
    body[data-density="calm"] p.slide-lead { font-size: 28px; }

    /* sparkline placeholder rows */
    .row-list { display:flex; flex-direction:column; gap: 10px; }
    .row-list .r {
      display:grid; grid-template-columns: 130px 1fr 90px; gap:18px;
      align-items:center; padding: 10px 14px; border:1px solid var(--se-line);
      border-radius: 10px; background:#fff;
    }
    .row-list .r .lbl { font-family:var(--se-font-mono); font-size:12px; color:var(--se-fg-3); letter-spacing:0.06em; text-transform:uppercase; }
    .row-list .r .bar { height:10px; background:var(--se-bg-soft); border-radius:5px; overflow:hidden; }
    .row-list .r .bar i { display:block; height:100%; background:var(--se-primary); border-radius:5px; }
    .row-list .r .v { font-family: var(--se-font-mono); font-variant-numeric: tabular-nums; font-size: 14px; color: var(--se-fg-strong); text-align: right; }

    /* small captions */
    .cap { font-family: var(--se-font-mono); font-size: 12px; color: var(--se-fg-3); letter-spacing: 0.06em; text-transform: uppercase; }

    /* Surface slides 25/26/27 — tighter padding so dense tile grids fit */
    .slide.compact-surface .slide-pad { padding: 64px 96px 88px; gap: 18px; }
    .slide.compact-surface .slide-header { margin-bottom: 0; }
    .slide.compact-surface .slide-title { font-size: 36px !important; line-height: 1.15; }
    .slide.compact-surface p.slide-lead { font-size: 17.5px !important; line-height: 1.55; }

    .slide.compact-sources .slide-pad { padding-top: 56px; padding-bottom: 96px; gap: 16px; }
    .slide.compact-sources .slide-header { margin-bottom: 0; }
    .slide.compact-sources .slide-title { font-size: 36px !important; line-height: 1.15; }
    .slide.compact-sources .card { padding: 16px 18px !important; gap: 6px; }
    .slide.compact-sources .card h3 { font-size: 19px; line-height: 1.2; margin: 0; }
    .slide.compact-sources .card h4 { font-size: 17px; line-height: 1.2; margin: 0; }
    .slide.compact-sources .card p { font-size: 13.5px; line-height: 1.4; margin: 0; }
    .slide.compact-sources .card .tag { font-size: 11px; }
    .slide.compact-sources .card .cap { font-size: 11.5px; letter-spacing: 0.04em; }
    .slide.compact-sources table.spec td { padding: 5px 6px; font-size: 12.5px; line-height: 1.25; }
    .slide.compact-sources table.spec .cap { margin-top: 2px !important; font-size: 10.5px; }
    .slide.compact-sources .badge { font-size: 10px; padding: 2px 6px; }

    /* Slide 08 — 19-model registry: scoped density overrides only on this slide */
    .slide.compact-registry .slide-pad { padding-top: 56px; padding-bottom: 100px; gap: 20px; }
    .slide.compact-registry .slide-header { margin-bottom: 0; }
    .slide.compact-registry .slide-title { font-size: 32px !important; line-height: 1.15; }
    .slide.compact-registry .model-card { padding: 10px 13px !important; gap: 5px; border-radius: 12px; }
    .slide.compact-registry .model-card .id { font-size: 11.5px; letter-spacing: 0.05em; }
    .slide.compact-registry .model-card h4 { font-size: 15.5px; line-height: 1.2; }
    .slide.compact-registry .model-card p { font-size: 12.5px; line-height: 1.35; }
    .slide.compact-registry .model-card .out { font-size: 11px; letter-spacing: 0.03em; }
  </style>
</head>

          <h1 class="title-display">The Ekurhuleni<br/>Spatial Economic<br/><em>Intelligence</em> Platform.</h1>
          <p class="title-sub">A unified hexagonal model of Ekurhuleni's economy at 1.2&nbsp;km resolution. Built on a national backbone covering all nine metros, nine provinces, and South Africa — the metro backbone is staged today, with eThekwini as the live, validated pilot. Tiers 1–3 already cover your geography from the national backbone — what's missing is your operational layer (Tier 4). This deck walks you through what we've built, what already runs for your geography on day one, and how a co-designed Tier 4 turns the platform into your operating system.</p>

        <div class="card">

          <h3>Sub-ward, uniform geometry</h3>
          <p>H3 Level&nbsp;7 hexagons — ~1.2 km edge — tile Ekurhuleni approximately 478 times; the same grid extends nationally as the staged scope is brought online. Wards are political; hexes are analytical. Every model, map, and forecast in the metro is keyed to this grid.</p>
          <div class="cap" style="margin-top:auto;">Primary key · <span style="color:var(--se-primary);">hex7</span></div>
        </div>
        <div class="card">
          <span class="tag">Temporal resolution</span>
          <div class="num">146<small>months</small></div>
          <h3>Monthly, 2014 → Feb&nbsp;2026</h3>
          <p>Twelve full years of monthly observations on every hexagon. Long enough to see the COVID drop, the 2021 unrest, the 2022 floods, and load-shedding stages 4–6 — and recover from each.</p>
          <div class="cap" style="margin-top:auto;">Composite key · <span style="color:var(--se-primary);">hex7 × year_month</span></div>
        </div>
        <div class="card indigo">
          <span class="tag">Analytical surface</span>
          <div class="num">1B<small style="color:rgba(255,255,255,0.7);">+ rows</small></div>
          <h3>One panel. 1000+ variables.</h3>
          <p>Every signal — FTE, electricity, water, nightlights, faults, valuations, FDI projects, EDIP rebates, GHSL population, SANLC land cover, ward GDP, customs trade, plus all nineteen model outputs — sits on a single primary key. <span style="font-family:var(--se-font-mono);">hex7 × year_month</span> for the eThekwini ready slice; coarser geometry for the staged province and national scopes.</p>

  <!-- 03 — Why hexagons -->
  <section class="slide" data-screen-label="03 Why hexagons">
    <div class="slide-pad">
      <header class="slide-header">
        <div>
          <div class="slide-eyebrow">Why hexagons</div>
          <h2 class="slide-title" style="margin-top:14px;">Wards explain politics.<br/>Hexagons explain economics.</h2>
        </div>
        <div class="slide-section-tag">§ 01 · Frame</div>
      </header>
      <div class="grid-2" style="flex:1; align-items:stretch;">
        <div style="display:flex; flex-direction:column; gap:24px;">
          <p class="slide-lead">Wards are uneven, politically defined, and re-drawn. Suburbs blur into each other. Pixel grids ignore neighbourhood structure. We needed a uniform analytical surface that respected geography but didn't inherit administrative noise.</p>
          <div class="grid-2" style="gap:20px;">
            <div class="card soft">
              <span class="tag">H3 Level 7</span>
              <h4>~1.2 km edge length</h4>
              <p>Each cell covers ~5.16 km². Smaller than a ward, larger than a property, comparable across the metro.</p>
            </div>
            <div class="card soft">
              <span class="tag">Lossless aggregation</span>
              <h4>Roll up, drill down</h4>
              <p>Hexes nest cleanly into wards (and out to the metro). Outputs reconcile to ward GDP via Denton-Cholette.</p>
            </div>
            <div class="card soft">
              <span class="tag">Cross-metro comparable</span>
              <h4>Same grid, any city</h4>
              <p>The same H3 spec runs the Western Cape Urban Growth Monitors. Ekurhuleni becomes one node in a national lattice.</p>
            </div>
            <div class="card soft">
              <span class="tag">Edge-aware</span>
              <h4>Economic activity crosses lines</h4>
              <p>A retail corridor can span three wards. Hexes capture the corridor; ward statistics dilute it.</p>
            </div>
          </div>
        </div>

      <p class="slide-lead" style="font-size:18px; max-width:1500px; margin:0;">

  <!-- 07 — Pipeline -->
  <section class="slide" data-screen-label="07 Pipeline architecture">
    <div class="slide-pad">
      <header class="slide-header">
        <div>
          <div class="slide-eyebrow">Pipeline architecture</div>
          <h2 class="slide-title" style="margin-top:14px;">From raw data to decision surface in five stages.</h2>
        </div>
        <div class="slide-section-tag">§ 02 · Data</div>
      </header>
      <div class="timeline" style="border:1px solid var(--se-line); border-radius:14px; overflow:hidden; background:#fff;">
        <div class="step">
          <div class="n">STAGE 01</div>
          <h5>Ingest</h5>
          <p>Per-source loaders for SEADsa, VIIRS, consumption, valuation, faults, FDI, EDIP, GHSL, SANLC, Census.</p>
          <div class="cap" style="margin-top:auto; color:var(--se-primary);">eku ingest</div>
        </div>
        <div class="step">
          <div class="n">STAGE 02</div>
          <h5>Harmonise</h5>
          <p>Spatial &amp; temporal alignment to hex-7 × month. Raster zonal stats, suburb→hex fallback, masking.</p>
          <div class="cap" style="margin-top:auto; color:var(--se-primary);">harmonize/</div>
        </div>
        <div class="step">
          <div class="n">STAGE 03</div>
          <h5>Build panel</h5>
          <p>LEFT-JOIN every source onto the hex × month grid. Outputs <span style="font-family:var(--se-font-mono); color:var(--se-primary);">hex_panel</span> (1000+ vars).</p>
          <div class="cap" style="margin-top:auto; color:var(--se-primary);">eku build-panel</div>
        </div>
        <div class="step">
          <div class="n">STAGE 04</div>
          <h5>Run models</h5>
          <p>Nineteen models (M1–M19) read from the panel and write back. Econometric shadow mode for forecasts.</p>
          <div class="cap" style="margin-top:auto; color:var(--se-primary);">eku run-models</div>
        </div>
        <div class="step">
          <div class="n">STAGE 05</div>
          <h5>Validate &amp; serve</h5>
          <p>Six programmatic checks. Dash dashboard, REST API, admin control plane, scenario lab.</p>
          <div class="cap" style="margin-top:auto; color:var(--se-primary);">validate · dashboard · api</div>
        </div>
      </div>

      <div class="grid-3" style="gap:24px;">
        <div class="card soft">
          <span class="tag">Idempotent</span>
          <h4>Re-runs are cheap</h4>
          <p>Every stage is checkpointed in DuckDB. Re-running a single stage doesn't invalidate downstream tables unless their inputs changed.</p>
        </div>
        <div class="card soft">
          <span class="tag">Portable</span>
          <h4>Mac, Linux, Azure</h4>
          <p>Bootstrap creates the venv, installs extras, seeds env files. Doctor checks portability before deploy.</p>
        </div>
        <div class="card soft">
          <span class="tag">Reproducible</span>
          <h4>One command rebuild</h4>
          <p><span style="font-family:var(--se-font-mono); color:var(--se-primary);">make all-local</span> regenerates the panel and all nineteen models from the local data subset, no external volume required.</p>
        </div>
      </div>
    </div>

      <p class="slide-lead" style="font-size:20px; max-width:1500px;">
        Most municipal economic data stops at the ward — a polygon containing tens of thousands of people. Our panel descends four further rungs, ending at a single 10&nbsp;m land-cover pixel. Every rung below SEADSA is built; every rung is keyed to <span style="font-family:var(--se-font-mono); color:var(--se-primary);">hex7&nbsp;×&nbsp;year_month</span> so the same query traverses all of them.
      </p>

  <!-- 10 — So what -->
  <section class="slide" data-screen-label="10 Hyperlocal · so what">
    <div class="slide-pad">
      <header class="slide-header">
        <div>
          <div class="slide-eyebrow">Hyperlocal · so what</div>
          <h2 class="slide-title" style="margin-top:14px;">Hex-level intelligence reveals what ward-level GDP cannot.</h2>
        </div>
        <div class="slide-section-tag">§ 02 · Data</div>
      </header>

      <p class="slide-lead" style="max-width:1500px;">
        The ladder is not a technical curiosity. It is the difference between an economic statistic and an economic <em>instrument</em> — a number that helps the metro decide where, and what, and when.
      </p>

      <div class="grid-3" style="gap:24px; flex:1; min-height:0;">

        <div class="card" style="gap:16px;">
          <span class="tag">Resolution unlocks · 01</span>
          <h3 style="font-size:26px;">The informal economy<br/>becomes measurable.</h3>
          <p>SEADSA cannot see four thousand informal households inside one ward. The ladder can — by triangulating GHSL density, SANLC class signatures, and VIIRS radiance against the absence of valuation-roll and EDIP records.</p>
          <div style="display:flex; gap:12px; margin-top:auto;">
            <div class="num" style="font-size:48px;">~22%</div>
            <p style="font-size:13px; color:var(--se-fg-3); margin:0; align-self:flex-end;">of metro built surface tags as informal · invisible to ward GVA</p>
          </div>
        </div>

        <div class="card" style="gap:16px;">
          <span class="tag">Resolution unlocks · 02</span>
          <h3 style="font-size:26px;">Sub-ward inequality<br/>becomes visible.</h3>
          <p>One ward, one number averages the rich half and the poor half together. The ladder splits the same ward into 4–7 hexes, each with its own GVA estimate, accessibility score, and resilience trajectory. The Gini doesn't disappear into the mean.</p>
          <div style="display:flex; gap:12px; margin-top:auto;">
            <div class="num" style="font-size:48px;">7×</div>
            <p style="font-size:13px; color:var(--se-fg-3); margin:0; align-self:flex-end;">finer than ward · ~5.16 km² per cell · monthly cadence</p>
          </div>
        </div>

        <div class="card indigo" style="gap:16px;">
          <span class="tag">Resolution unlocks · 03</span>
          <h3 style="font-size:26px;">Infrastructure failure<br/>localises to economic loss.</h3>
          <p>A fault in one hex shows up as a measurable GVA dip in the same hex (M4). At ward scale this is noise. At hex scale it is a coefficient — and a budget argument the metro can defend.</p>
          <div style="display:flex; gap:12px; margin-top:auto;">
            <div class="num" style="font-size:48px;">1 hex</div>
            <p style="font-size:13px; color:rgba(255,255,255,0.85); margin:0; align-self:flex-end;">is the unit at which fault → GVA causality is identifiable</p>

        <div class="model-card"><div class="id">M5 · RESILIENCE</div><h4>Shock recovery</h4><p>COVID, KZN floods, July 2021 unrest, load-shedding. Resistance + recovery months per hex.</p><div class="out">→ resilience_score</div></div>

        <div class="model-card"><div class="id">M6 · HEDONIC</div><h4>16-year property model</h4><p>Hedonic regression on the valuation roll — value vs amenity, access, infrastructure.</p><div class="out">→ value_premium</div></div>
        <div class="model-card"><div class="id">M7 · URBAN GROWTH</div><h4>50-year typology</h4><p>GHSL built-surface change (1975–2030) classified into growth typologies per hex.</p><div class="out">→ growth_typology</div></div>
        <div class="model-card"><div class="id">M8 · LAND ECONOMY</div><h4>SANLC transitions</h4><p>Dominant land-use classification linked to economic outcomes (cropland → built, etc.).</p><div class="out">→ dominant_landuse</div></div>
        <div class="model-card"><div class="id">M9 · TRADE</div><h4>Customs gravity</h4><p>SARS hex×SIC×country trade rolled into dependency and supply-chain risk per hex.</p><div class="out">→ trade_dependency · supply_chain_risk</div></div>
        <div class="model-card"><div class="id">M10 · LABOUR</div><h4>Spatial mismatch</h4><p>Where the jobs are vs where the workers live. Mismatch + exclusion scores per hex.</p><div class="out">→ spatial_mismatch · exclusion</div></div>

        <div class="model-card"><div class="id">M11 · CLIMATE</div><h4>Hazard exposure</h4><p>Flood, heat, sea-level risk overlaid with economic activity. Adaptation priority ranking.</p><div class="out">→ climate_risk · adaptation_priority</div></div>
        <div class="model-card"><div class="id">M12 · CGE / SAM</div><h4>Sectoral SAM</h4><p>SEAD-SA-derived social accounting matrix. Sector ⇄ sector multipliers feeding scenario runs.</p><div class="out">→ sectoral multipliers</div></div>
        <div class="model-card"><div class="id">M13 · FIRMS</div><h4>Firm dynamics</h4><p>Birth, death, and entry rates by hex. Where the startup ecosystems are forming.</p><div class="out">→ startup_ecosystem · entry_rate</div></div>
        <div class="model-card"><div class="id">M14 · COMPOSITE</div><h4>Index rollups</h4><p>Cross-model composite indices for dashboard layers and the pilot package.</p><div class="out">→ composite layers</div></div>
        <div class="model-card"><div class="id">M15 · PULSE</div><h4>Activity nowcast</h4><p>High-frequency pulse from VIIRS + utilities. Anomaly flags when the city is off-trend.</p><div class="out">→ activity_index · anomaly_flag</div></div>

        <div class="model-card"><div class="id">M16 · FISCAL</div><h4>Municipal health</h4><p>Council SDBIP and rates base. Liquidity, revenue mix, and capex execution at municipal level.</p><div class="out">→ fiscal scorecard</div></div>
        <div class="model-card"><div class="id">M17 · INEQUALITY</div><h4>Inclusion index</h4><p>Income, access, and service distribution across hexes. Who the economy is leaving behind.</p><div class="out">→ inclusion_index</div></div>
        <div class="model-card"><div class="id">M18 · INFORMAL</div><h4>Informal economy</h4><p>Estimates the informal share per hex and the formalisation potential.</p><div class="out">→ informal_share · formalisation</div></div>
        <div class="model-card"><div class="id">M19 · GOVERNANCE</div><h4>Service delivery</h4><p>Faults, SDBIP, and council ops fused into a governance quality score.</p><div class="out">→ governance_quality · service_trend</div></div>

        </div>
        <div class="slide-section-tag">§ 03 · Models</div>
      </header>
      <div class="grid-2" style="gap:40px; flex:1;">
        <div style="display:flex; flex-direction:column; gap:20px;">
          <p class="slide-lead">National GDP arrives quarterly with a six-week lag. Our nowcaster produces a hex-level GVA estimate every month, calibrated to the ward GDP pipeline so totals reconcile.</p>
          <div class="card soft">
            <span class="tag">Method</span>
            <h4>Proxy regression → Denton-Cholette</h4>
            <p>Step 1 — fit log-GVA against FTE, electricity, water, and nightlight intensity at the hex level on a calibration window. Step 2 — Denton-Cholette temporal disaggregation reconciles the monthly hex series back to the ward-quarter GDP target.</p>
          </div>

  <section class="slide" data-screen-label="20 AI Analyst">
    <div class="slide-pad">
      <header class="slide-header">
        <div>
          <div class="slide-eyebrow">The AI analyst</div>
          <h2 class="slide-title" style="margin-top:14px;">Ask in English. Get a sourced answer with charts and caveats.</h2>
        </div>
        <div class="slide-section-tag">§ 04 · Surface</div>
      </header>
      <p class="slide-lead">A Claude-powered <span style="font-family:var(--se-font-mono); color:var(--se-primary);">ChatAgent</span> sits over the same DuckDB store as the dashboard. It is read-only, scope-aware, and instrumented — every answer carries the SQL it ran, the tools it called, the freshness of each source, and the caveats the data quality registry attached. It is not a chat skin; it is the model's tool-use surface, exposed.</p>
      <div class="grid-2" style="gap:32px; flex:1;">
        <div style="display:flex; flex-direction:column; gap:18px;">
          <div class="card">
            <span class="tag">How a turn runs</span>
            <h4 style="margin-top:10px;">Three phases · one tool-use loop</h4>
            <ol style="padding-left:18px; margin:14px 0 0; line-height:1.7;">
              <li><b>Pre-setup.</b> Resolve user role and scope, pick the workflow pack, build the system prompt, pre-load context.</li>
              <li><b>Tool loop.</b> Anthropic tool-use iterates: call a tool, read the result, decide the next call, terminate when it has the answer or hits the iteration cap.</li>
              <li><b>Post-synthesise.</b> Assemble Markdown answer + Plotly / MapLibre / Mermaid artefacts + caveats + source list. Persist to the conversation store.</li>
            </ol>
          </div>
          <div class="card warm">
            <span class="tag" style="color:var(--se-fg-strong);">Termination contract</span>
            <p style="font-family:var(--se-font-mono); font-size:13px; line-height:1.7; margin-top:8px;">
              tool_loop_terminated_reason ∈ {<br/>
              &nbsp;&nbsp;"final",<br/>
              &nbsp;&nbsp;"max_tokens",<br/>
              &nbsp;&nbsp;"user_cancel",<br/>
              &nbsp;&nbsp;"tool_error"<br/>
              }
            </p>
          </div>
        </div>
        <div style="display:flex; flex-direction:column; gap:18px;">
          <div class="card" style="padding:0; overflow:hidden;">
            <div style="padding:18px 24px; border-bottom:1px solid var(--se-line); display:flex; justify-content:space-between; align-items:baseline;">

              <span class="cap">Mock</span>
            </div>

              <div style="color:var(--se-fg-strong); margin-bottom:14px;">Which 5 wards have rising GVA momentum and elevated service pressure?</div>

  <section class="slide compact-surface" data-screen-label="21 How the model thinks">
    <div class="slide-pad">
      <header class="slide-header">
        <div>
          <div class="slide-eyebrow">How the AI works</div>
          <h2 class="slide-title" style="margin-top:14px;">The model is a panel. The AI is a tool-user.<br/>It doesn't reason about the city — it queries it.</h2>
        </div>
        <div class="slide-section-tag">§ 04 · Surface</div>
      </header>
      <p class="slide-lead">Our AI is not a chatbot bolted onto a dashboard, and it is not a forecasting black box. It is a frontier-LLM <span style="font-family:var(--se-font-mono); color:var(--se-primary);">tool-use loop</span> — Anthropic's <b>Claude Opus 4.7</b> and OpenAI's <b>GPT‑5.5</b>, swappable per workload — that sits over the same governed panel everything else reads from. When you ask a question, the agent does not invent a number — it picks tools, runs SQL, calls a model endpoint, reads the result, and decides what to call next, until it has enough evidence to answer.</p>

          <h2 class="slide-title" style="margin-top:14px;">Eighteen tools. Seven families. Every one declared, typed, and replayable.</h2>
        </div>
        <div class="slide-section-tag">§ 04 · Surface</div>
      </header>
      <p class="slide-lead" style="margin-bottom:8px;">The Canvas, the AI Analyst, and the Workbench all draw from the same registry. A tool is a contract: declared name, JSON-Schema input, typed output, supported scopes and modes, normalisation it accepts, and the data quality it reads. Add a tool to the registry and it appears, simultaneously, on the Canvas rail and in the AI Analyst's allow-list.</p>

  <!-- 23 — Guardrails & evidence -->
  <section class="slide" data-screen-label="23 Guardrails and evidence">
    <div class="slide-pad">
      <header class="slide-header">
        <div>
          <div class="slide-eyebrow">Guardrails</div>
          <h2 class="slide-title" style="margin-top:14px;">Every answer carries the receipts.<br/>Every query passes the gate.</h2>
        </div>
        <div class="slide-section-tag">§ 04 · Surface</div>
      </header>
      <p class="slide-lead">An AI that can write SQL is an AI that can produce confident nonsense. We close that gap with four mechanisms — a SQL gate, a scope &amp; normalisation contract, a caveats registry, and turn-by-turn replay. Together they turn "the AI said so" into "here is the SQL, here is the data, here are the caveats, here is the prior turn."</p>

      <div class="grid-2" style="gap:32px; flex:1;">
        <div style="display:flex; flex-direction:column; gap:16px;">
          <div class="card">
            <span class="tag">Mechanism 01 · SQL guard</span>
            <h4 style="margin-top:6px;">Allow-list before plan</h4>
            <p style="font-family:var(--se-font-mono); font-size:12.5px; line-height:1.7; margin-top:6px; color:var(--se-fg-strong);">
              sql_guard.check(query) →<br/>
              &nbsp;&nbsp;✓ tables ∈ allow_list<br/>
              &nbsp;&nbsp;✓ no DDL · no DML<br/>
              &nbsp;&nbsp;✓ rows ≤ 100,000<br/>
              &nbsp;&nbsp;✓ plan inspected · no Cartesian
            </p>
          </div>
          <div class="card">
            <span class="tag">Mechanism 02 · Scope &amp; normalisation</span>
            <h4 style="margin-top:6px;">Refuse incoherent comparisons</h4>
            <p style="margin-top:6px;">Every tool declares its scope. The model refuses to chart <span style="font-family:var(--se-font-mono);">native_raw</span> next to <span style="font-family:var(--se-font-mono);">national_comparable</span>. A ward tool cannot answer a province question.</p>
          </div>
        </div>

        <div style="display:flex; flex-direction:column; gap:16px;">
          <div class="card warm">
            <span class="tag" style="color:var(--se-fg-strong);">Mechanism 03 · Caveats registry</span>
            <h4 style="margin-top:6px;">Every cell has a footnote</h4>
            <div style="margin-top:10px; display:grid; grid-template-columns:auto 1fr; gap:8px 14px; font-family:var(--se-font-mono); font-size:12.5px; line-height:1.5;">
              <div style="color:#B85C2A;">⚠ freshness</div><div>VIIRS ≥ 60d stale → flag</div>

          <h2 class="slide-title" style="margin-top:14px;">A tile workbench. 18 tools. Two modes. Six scopes. One persistent layout.</h2>
        </div>
        <div class="slide-section-tag">§ 04 · Surface</div>
      </header>
      <p class="slide-lead" style="margin-bottom:10px;">Where the dashboard answers a fixed set of questions, the <b>Canvas</b> is open — drop a tool, get a tile; rearrange tiles into the layout you need; pin, share, export. Each tile carries its own provenance and normalisation contract. The catalogue is a registry: every tool declares which modes, scopes, and normalisations it supports, so the surface refuses incoherent comparisons.</p>

  <!-- 26 — Workbench (authoring + lifecycle) -->
  <section class="slide compact-surface" data-screen-label="26 Workbench">
    <div class="slide-pad">
      <header class="slide-header">
        <div>
          <div class="slide-eyebrow">The Workbench</div>
          <h2 class="slide-title" style="margin-top:14px;">A tile is a question. The Workbench is where you arrange them.</h2>
        </div>
        <div class="slide-section-tag">§ 04 · Surface</div>
      </header>
      <p class="slide-lead" style="margin-bottom:10px;">The Canvas is the surface; the <b>Workbench</b> is the verb. Drop a tool from the rail, configure once, and it becomes a tile — a self-contained, provenance-bearing visualisation at a fixed scope and normalisation. Tiles are first-class objects: pin them, duplicate them, link them so a click on one filters the others, share the layout as a URL, export the arrangement as a one-page brief.</p>

      <div class="grid-2" style="gap:28px; flex:1;">
        <div class="card" style="padding:0; overflow:hidden;">
          <div style="padding:18px 24px; border-bottom:1px solid var(--se-line); display:flex; justify-content:space-between; align-items:baseline;">
            <h4 style="margin:0;">Tile lifecycle</h4>
            <span class="cap">5 states</span>
          </div>
          <div style="padding:24px;">
            <div class="timeline" style="border:1px solid var(--se-line); border-radius:10px; overflow:hidden;">
              <div class="step"><div class="n">01 · DRAFT</div><h5>Pick &amp; configure</h5><p>Choose a tool, set scope &amp; normalisation. Preview before commit.</p></div>
              <div class="step"><div class="n">02 · LIVE</div><h5>Tile renders</h5><p>Tool runs against the panel. Provenance stamped on the tile footer.</p></div>
              <div class="step"><div class="n">03 · LINKED</div><h5>Cross-filter</h5><p>Click a hex on tile A — tiles B, C, D scope to the same selection.</p></div>
              <div class="step"><div class="n">04 · PINNED</div><h5>Saved layout</h5><p>Layout becomes a named Canvas. URL-shareable. Belongs to a pack.</p></div>
              <div class="step"><div class="n">05 · EXPORT</div><h5>One-page brief</h5><p>PDF · PPTX · annual pack. Caveats included. SQL hashes included.</p></div>
            </div>
          </div>
        </div>

        <div style="display:flex; flex-direction:column; gap:16px;">
          <div class="card warm">
            <span class="tag" style="color:var(--se-fg-strong);">What lives on a tile</span>
            <div style="margin-top:8px; display:grid; grid-template-columns:auto 1fr; gap:6px 16px; font-family:var(--se-font-mono); font-size:12.5px; line-height:1.6;">
              <div style="color:var(--se-primary);">header</div><div>tool name · scope · year</div>
              <div style="color:var(--se-primary);">body</div><div>map · chart · table · narrative</div>
              <div style="color:var(--se-primary);">controls</div><div>scope-step · normalise · year-scrubber</div>
              <div style="color:var(--se-primary);">evidence</div><div>SQL hash · sources · freshness</div>
              <div style="color:var(--se-primary);">caveats</div><div>0..n flags from the registry</div>
              <div style="color:var(--se-primary);">actions</div><div>pin · link · duplicate · export · ask AI</div>
            </div>
          </div>
          <div class="grid-2" style="gap:14px;">
            <div class="card"><span class="tag">Cross-filter</span><h4 style="margin-top:6px; font-size:16px;">Brushing</h4><p style="font-size:12.5px;">Selecting a hex/ward on any tile broadcasts a scope-event; linked tiles re-render in place.</p></div>
            <div class="card"><span class="tag">Persistence</span><h4 style="margin-top:6px; font-size:16px;">URL state</h4><p style="font-size:12.5px;">Layout, scope, year, normalisation, filters — all in the URL. Send a link, get the same view.</p></div>
            <div class="card"><span class="tag">Ask the AI</span><h4 style="margin-top:6px; font-size:16px;">Per-tile</h4><p style="font-size:12.5px;">"Explain this tile" hands the analyst exactly the SQL, the data, and the question.</p></div>
            <div class="card"><span class="tag">Export</span><h4 style="margin-top:6px; font-size:16px;">Annual pack</h4><p style="font-size:12.5px;">A pinned Canvas becomes the seed for the next monthly or annual board pack.</p></div>
          </div>
        </div>

      <div class="grid-3" style="gap:28px; flex:1;">
        <div class="card indigo"><span class="tag">Ask 01</span><div class="num">1</div><h3>Nominated counterpart</h3><p>A named, stable lead from your office — single point for Tier 4 data scoping, validation sign-off, and quarterly review.</p><div class="cap" style="margin-top:auto; color:rgba(255,255,255,0.75);">Time commitment · ~4 hrs / month</div></div>
        <div class="card"><span class="tag">Ask 02</span><div class="num">4</div><h3>Tier 4 onboarding workshop</h3><p>One half-day with your data, finance, infrastructure, and economic-development leads to scope the Ekurhuleni operational layer (consumption, faults, valuation, incentives, firm registry).</p><div class="cap" style="margin-top:auto;">Output · co-designed Tier 4 schema</div></div>
        <div class="card"><span class="tag">Ask 03</span><div class="num">4</div><h3>Quarterly review cadence</h3><p>One 90-minute review per quarter. Walk through validation results, confirm the policy questions in flight, and re-prioritise the roadmap.</p><div class="cap" style="margin-top:auto;">Output · signed validation memo</div></div>
      </div>
      <p class="slide-lead">In return: Tiers 1–3 of the platform refreshed against the Ekurhuleni backbone from day one; Tier 4 brought online together with full reproducibility and source code access — the same surface eThekwini runs today.</p>

      <table class="spec">
        <thead>
          <tr><th style="width:240px;">Risk</th><th>Why it matters</th><th>Mitigation</th><th style="width:120px;">Status</th></tr>
        </thead>
        <tbody>
          <tr><td><strong>FTE small-cell masking</strong><div class="cap" style="margin-top:4px;">Privacy</div></td><td>Hexes with very few employees are masked to prevent re-identification. M1 calibration must work around the masked rows.</td><td>Calibration uses ward-level totals as anchor; downstream models tolerate masked inputs and surface them in the dashboard.</td><td><span class="badge" style="background:#E5F5EC; color:#1F8F5A;">MITIGATED</span></td></tr>
          <tr><td><strong>External volume dependency</strong><div class="cap" style="margin-top:4px;">/Volumes/SpatialEcon</div></td><td>GHSL rasters and SANLC live on the external volume. Without it, M7 and M8 cannot rebuild from raw.</td><td>Pre-built derived tables live in DuckDB. Pipeline runs <span style="font-family:var(--se-font-mono);">--skip-external</span> gracefully.</td><td><span class="badge" style="background:#FFF1DA; color:#B26A00;">WATCHING</span></td></tr>
          <tr><td><strong>Anthropic API for chat / report export</strong></td><td>The conversational extras and DOCX report export require credentials at request time. Non-AI routes are unaffected.</td><td>API startup no longer requires Anthropic credentials. AI routes degrade gracefully when the key is absent.</td><td><span class="badge" style="background:#E5F5EC; color:#1F8F5A;">MITIGATED</span></td></tr>
          <tr><td><strong>Consumption feed lag</strong></td><td>Utility consumption data arrives with a 2–6 week lag. Recent-month nowcasts widen confidence bands.</td><td>Dashboard surfaces freshness per variable; recent-month estimates explicitly tagged as provisional.</td><td><span class="badge" style="background:#FFF1DA; color:#B26A00;">WATCHING</span></td></tr>
          <tr><td><strong>Calibration window drift</strong></td><td>Long-running structural shifts (load-shedding regime, hybrid work) can detune M1's proxy regression.</td><td>Retraining cadence is quarterly; validation harness fails the build if M1's r² drops below threshold.</td><td><span class="badge" style="background:#E5F5EC; color:#1F8F5A;">MONITORED</span></td></tr>
