<script type="__bundler/template">"\u003c!doctype html\u003e\n\u003chtml lang=\"en\"\u003e\n\u003chead\u003e\n  \u003cmeta charset=\"utf-8\"\u003e\n  \u003ctitle\u003eJohannesburg Spatial Economic Intelligence Platform — Onboarding\u003c/title\u003e\n  \u003cmeta name=\"viewport\" content=\"width=1920, initial-scale=1\"\u003e\n  \u003clink rel=\"stylesheet\" href=\"3d79686235c54912be13934afe920e8b\"\u003e\n  \u003cscript src=\"5e8819e6cf4b44dfa899f8de52a7bc37\"\u003e\u003c/script\u003e\n  \u003cscript src=\"https://unpkg.com/react@18.3.1/umd/react.development.js\" integrity=\"sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L\" crossorigin=\"anonymous\"\u003e\u003c/script\u003e\n  \u003cscript src=\"https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js\" integrity=\"sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm\" crossorigin=\"anonymous\"\u003e\u003c/script\u003e\n  \u003cscript src=\"https://unpkg.com/@babel/standalone@7.29.0/babel.min.js\" integrity=\"sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y\" crossorigin=\"anonymous\"\u003e\u003c/script\u003e\n\n  \u003cscript type=\"application/json\" id=\"speaker-notes\"\u003e\n[\n  \"Open with the headline frame. This is an onboarding deck — assume the room knows eThekwini but does not know what we have built. The point of slide 1 is to set scale: this is the first hexagonal economic intelligence platform for any African city, and it lives at sub-city resolution.\",\n  \"Three numbers anchor the rest of the talk: 429 hexagons (the eThekwini ready slice), 146 months, 1000+ variables. The 429 is what's live and validated for the metro today; the geography model underneath supports all 9 metros, all 9 provinces, districts, and the national footprint — those scopes are staged, not ready. If they remember nothing else, they should remember sub-ward resolution, monthly, twelve years deep through Feb 2026, with a national geography backbone behind it.\",\n  \"The 'why hexagons' slide. Wards are politically defined and uneven; suburbs blur into each other. H3 Level 7 gives us a uniform, comparable analytical surface. Walk the audience through the spatial logic — a ward contains many hexes, and hexes cross ward boundaries when economic activity does.\",\n  \"Section 2 divider · Data. One short beat. Set up the next stretch: the data spine — thirty-plus governed sources, fused on hex7 × year_month. Most municipalities have these in silos; we have them on a single primary key.\",\n  \"The data spine. The platform now has 32+ governed source families fused on hex7 × year_month. Group them so the room can read it: SEADSA + GHSL + SANLC + GIS as the geography spine; StatsSA, QLFS, Census, S\u0026P metro GDP, SARB, NT Data, DataFirst, provincial data as national statistical context; SARS Customs, VIIRS nightlights and ward-GDP, monthly satellite, SAPS crime as flow / activity layers; and eThekwini-specific feeds as the metro-only operational layer. Don't read all 32 — say 'thirty-plus governed sources, four tiers'. The boring slide that wins credibility.\",\n  \"Variables on the panel. Don't read this slide line-by-line — point to it as proof. The cards are grouped by the role each column plays. Left: identity and place — keys and the geometry that doesn't change for a hex. Middle: economy and activity — what the economy IS (SEADSA, valuation) and what's happening month to month (consumption, nightlights, fault counts). Right indigo card: investment and outputs — fDi, EDIP flows, and what the model writes BACK (gva_estimated, ECI, accessibility, resilience, data_quality_score). Land it as: roughly a thousand columns on the panel today, all named, typed, and tied to a source family.\",\n  \"From data to panel. The hex_panel is the single analytical surface — over 1 billion rows across metro, district, province, and national scope, with 1000+ variables. Every model reads from here, every output writes back here. The same panel shape applies at every geometry level — eThekwini hexes are the ready slice; province polygons and municipality polygons are staged but populated. Emphasise: there is no second data lake; this is it.\",\n  \"The resolution ladder. Five rungs from a national tax record to a ten-metre pixel. SEADSA gives one number for the whole metro; ward gives ~110 polygons drawn for politics; H3 hex-7 is our key — uniform, comparable, ~5.16 sq km, 429 across the metro; GHSL nests ~516 hundred-metre cells inside each hex; SANLC sits at the bottom with 10-metre land-cover pixels — about 51,600 per hex, in 73 classes. Every rung below SEADSA is built and joined onto hex7 × year_month. Same query, every rung.\",\n  \"The worked example. One hex inside one residential ward in the western metro. SEADSA reports a clean ward GVA — 1.42 billion. Inside the hex the finer rungs disagree. Valuation roll covers only 38% of the built surface. EDIP is silent. GHSL says density is 2.3× the ward mean. SANLC tags 22% of the built surface as informal-settlement class. VIIRS nightlights are growing 18% YoY. M4 fault density is 3.1× the metro mean. Land that as: none of these signals contradicts SEADSA — they sit inside its number, at sub-ward resolution. The disagreement IS the formal/informal economy boundary made measurable.\",\n  \"So what. Three things hex-level resolution unlocks that ward GVA cannot. One: the informal economy becomes measurable — triangulating GHSL density, SANLC class signatures and VIIRS radiance against the absence of valuation and EDIP records. Two: sub-ward inequality becomes visible — wards average the rich half and the poor half together; hex-7 splits each ward into 4–7 cells. Three: infrastructure failure localises to economic loss. Close on the one-liner: wards tell you THAT the economy moved; the ladder tells you WHERE, WHY, and TO WHOM.\",\n  \"Section 3 divider. Set up the scale: nineteen integrated models, all keyed to the same hex_panel. The point of this divider is to land the surface area before we deep-dive on three.\",\n  \"The model menu. Don't try to explain all nineteen in detail — name each one in passing, give the one-line outcome, and tell them we'll go deep on three (M1, M3, M5) and skim the rest as a registry.\",\n  \"M1 — Nowcasting. Municipal GDPNow. Translate: every month, for every hexagon, we estimate economic output using electricity consumption, water consumption, nightlights, and FTE. Calibrated to ward-level GDP via Denton-Cholette.\",\n  \"M3 — Accessibility. Quantifies the apartheid spatial legacy. A gravity-based job accessibility index. The number itself is interesting; the gradient across former group areas is the headline.\",\n  \"M5 — Resilience. Three named shocks: COVID, KZN floods, July 2021 unrest. We measure resistance (drop) and recovery (months to baseline) per hexagon. This is the slide that lands hardest with municipal audiences.\",\n  \"The other sixteen models. Don't read them out one by one — group them as you go: place \u0026 growth (M6 hedonic, M7 urban growth, M8 land economy), flows \u0026 markets (M9 trade gravity, M13 firm dynamics, M18 informal economy), shocks \u0026 spillovers (M10 labour mismatch, M11 climate, M15 pulse anomaly), distribution \u0026 institutions (M17 inclusion, M19 governance). M2 complexity, M4 infrastructure-economy, M12 SAM/CGE, M14 composite indices, and M16 fiscal health round it out. Land it as: M1 nowcasts, M3 measures the spatial legacy, M5 measures resilience — the other sixteen each answer one more question, all reading from the same panel.\",\n  \"Validation. We don't ship a model that hasn't been checked. Six programmatic checks run every build. Walk through one or two — 'industrial-zone hexes have higher ECI', 'KZN unrest months show measurable GVA drop'. The point: face validity is automated, not asserted.\",\n  \"Section 4 divider · Surface. One short beat. Frame the next stretch: this is what you'll touch — the dashboard, the AI Analyst, the Canvas, the Workbench, the Econometric Lab, the API. Everything else is plumbing.\",\n  \"The dashboard. This is what the user touches. 17 selectable variables, monthly time slider, ward-aggregation toggle. Show the hex choropleth at this point if you have a screen — otherwise the deck visual is enough.\",\n  \"The AI Analyst. Where the dashboard answers fixed questions, the analyst answers any question — in English. Land the framing: this is not a chat skin; it is the tool-use surface of the model exposed. Three phases — pre-setup, tool loop, post-synthesise — and four termination reasons. Every answer carries the SQL it ran, the tools it called, and the caveats the data quality registry attached. Read-only handle. Replay-able for golden-output diffing.\",\n  \"How the model thinks. The AI is a frontier-LLM tool-use loop — Claude Opus 4.7 and GPT-5.5, swappable per workload — not a forecaster. Walk the diagram: question → pre-setup (role, pack, system prompt) → tool loop (the model picks a tool, tool runs, result back, decide next call, terminate) → post-synthesis (Markdown + Plotly + caveats). The brain is Claude; the hands are 18 declared tools; the memory is the panel. Land the contract: it can read, compose, cite, refuse — it cannot mutate, fabricate, or reach the open web.\",\n  \"The 18 tools, declared. Same registry powers the Canvas, the AI Analyst, and the Workbench. A tool is a contract — declared name, JSON-Schema input, typed output, supported scopes and modes, normalisation contract. Walk the family table — datasets·macro 5, labour\u0026services 2, property\u0026land 2, spatial 2, trade\u0026complexity 2, scenarios 3, diagnostics 2. Show the priority_surface declaration as the canonical example.\",\n  \"Guardrails and evidence. Four mechanisms close the gap between 'AI said so' and 'here are the receipts'. SQL guard — allow-list, no DDL/DML, row caps, plan inspection. Scope and normalisation contract — refuse incoherent comparisons. Caveats registry — every cell has a footnote (freshness, confidence, coverage, revision). Replay — every turn is a fixture, re-run on a new model version, diff against the golden. This is what makes the system safe to put in front of an MEC.\",\n  \"Modes and personas. Same panel, same tools, two modes (Twin = decide, Research = explore) and five workflow packs (P1 Municipal Manager, P2 Provincial Economist, P3 Investor/DFI, P4 Researcher, P5 Executive Briefer). The pack curates the rail, sets a default Canvas, tunes the system prompt to the user's vocabulary. The user does not configure the system; the system loads itself for the user.\",\n  \"The Canvas. Where the dashboard answers fixed questions, the Canvas is open — drop a tool, get a tile, arrange tiles into the analytical layout you actually need. 18 tools across 7 families. Two modes (Twin and Research). Six scopes (national, province, district, muni, ward, hex). Three normalisations (native_raw, local_diagnosis, national_comparable). Every tile carries provenance and an evidence panel. The catalogue is a registry — the surface refuses to render an incoherent comparison.\",\n  \"The Workbench. The Canvas is the surface; the Workbench is the verb. Walk the tile lifecycle — DRAFT → LIVE → LINKED → PINNED → EXPORT. A tile is a first-class object: header (tool · scope · year), body, controls, evidence (SQL hash, sources, freshness), caveats, actions (pin, link, duplicate, export, ask AI). Cross-filter = brushing across linked tiles. Persistence = URL state. Ask the AI per-tile. A pinned Canvas seeds the next monthly board pack.\",\n  \"Worked Canvas. Anchor it on a real question — 'where in eThekwini should we site the next industrial incentive?' Walk the six tiles: A priority_surface map (user selects W035), B GDP momentum at the selected ward, C service pressure with a caveat, D analog finder, E opportunity graph, F AI Analyst narrative. Selection broadcasts; tiles re-render in place. 'Explain this Canvas' hands the analyst the layout. Pinned, URL-shareable, exported as a one-page brief — under four minutes from empty Canvas to PDF.\",\n  \"The Econometric Lab. Policy scenarios with uncertainty bands. This is the answer to 'what if we increased EDIP rebates 20%?' or 'what is the GVA impact of a load-shedding stage 6 month?' The lab generates a baseline vs adjusted trajectory.\",\n  \"How a question becomes an answer. Walk an example end-to-end: 'Which wards should we prioritise for industrial CAPEX?' → pull accessibility, ECI, fault counts → cross-tab → output is a ranked list.\",\n  \"Operations. The platform is reproducible — make all-local builds the entire stack from scratch. 1,059 tests. Snapshotted configs. This slide reassures the technical reviewer in the room.\",\n  \"What we need from eThekwini. Three asks: a stable nominated counterpart, monthly access to the consumption feed, and quarterly review cadence. Make these specific.\",\n  \"Risks and gaps. Data masking on FTE for small hexes. External-volume dependency for GHSL/SANLC. Anthropic API dependency for the chat extras. Be transparent.\",\n  \"Roadmap. Two horizons: 90 days and 12 months. Don't promise more than you can ship.\",\n  \"Closing. One slide, three sentences, one CTA. The CTA is: schedule the next working session and confirm the data feed. Leave the room with a date.\"\n]\n  \u003c/script\u003e\n\n  \u003cstyle\u003e\n    body {\n      margin: 0;\n      background: var(--se-bg-muted, #EEF1F6);\n      font-family: var(--se-font-sans);\n      color: var(--se-fg);\n    }\n\n    deck-stage { display: block; width: 100%; height: 100vh; }\n\n    /* Reference-data badge for non-ETH clients on every slide driven by ETH numbers,\n       worked examples, or eThekwini-specific scenarios */\n    body.has-reference-badge section.slide[data-screen-label^=\"09 \"]::before,\n    body.has-reference-badge section.slide[data-screen-label^=\"13 \"]::before,\n    body.has-reference-badge section.slide[data-screen-label^=\"14 \"]::before,\n    body.has-reference-badge section.slide[data-screen-label^=\"15 \"]::before,\n    body.has-reference-badge section.slide[data-screen-label^=\"16 \"]::before,\n    body.has-reference-badge section.slide[data-screen-label^=\"17 \"]::before,\n    body.has-reference-badge section.slide[data-screen-label^=\"19 \"]::before,\n    body.has-reference-badge section.slide[data-screen-label^=\"27 \"]::before,\n    body.has-reference-badge section.slide[data-screen-label^=\"28 \"]::before,\n    body.has-reference-badge section.slide[data-screen-label^=\"29 \"]::before {\n      content: \"REFERENCE · figures shown are eThekwini's pilot implementation\";\n      position: absolute;\n      top: 28px;\n      right: 112px;\n      z-index: 10;\n      padding: 7px 14px;\n      background: var(--se-warm);\n      color: var(--se-fg-strong);\n      border: 1px solid var(--se-warm-strong);\n      border-radius: 999px;\n      font-family: var(--se-font-sans);\n      font-size: 11px;\n      font-weight: 600;\n      letter-spacing: 0.10em;\n      text-transform: uppercase;\n    }\n\n    /* ─────────────── slide chrome ─────────────── */\n    section.slide {\n      width: 1920px;\n      height: 1080px;\n      background: var(--se-bg);\n      color: var(--se-fg);\n      position: relative;\n      overflow: hidden;\n      display: flex;\n      flex-direction: column;\n    }\n\n    .slide-pad {\n      padding: 88px 112px;\n      flex: 1;\n      display: flex;\n      flex-direction: column;\n      gap: 40px;\n    }\n\n    .slide-header {\n      display: flex;\n      align-items: flex-end;\n      justify-content: space-between;\n      border-bottom: 1px solid var(--se-line);\n      padding-bottom: 24px;\n    }\n\n    .slide-eyebrow {\n      font-size: 14px;\n      font-weight: 600;\n      letter-spacing: 0.16em;\n      text-transform: uppercase;\n      color: var(--se-primary);\n      font-family: var(--se-font-sans);\n    }\n    .slide-section-tag {\n      font-size: 13px;\n      letter-spacing: 0.12em;\n      text-transform: uppercase;\n      color: var(--se-fg-3);\n      font-family: var(--se-font-mono);\n    }\n\n    .slide-footer {\n      position: absolute;\n      bottom: 36px;\n      left: 112px;\n      right: 112px;\n      display: flex;\n      justify-content: space-between;\n      align-items: center;\n      font-size: 13px;\n      color: var(--se-fg-3);\n      letter-spacing: 0.04em;\n      font-family: var(--se-font-mono);\n      border-top: 1px solid var(--se-line);\n      padding-top: 16px;\n    }\n    .slide-footer .brand {\n      display: flex; align-items: center;\n      font-family: var(--se-font-display);\n      font-weight: 700;\n      color: var(--se-fg-strong);\n      letter-spacing: 0.02em;\n    }\n    .slide-footer .brand b { color: var(--se-primary); }\n    .slide-footer .brand img { height: 22px; width: auto; display: block; }\n    .title-left .brand-mark img { height: 40px; width: auto; display: block; }\n    .title-left .brand-mark { display: flex; align-items: center; gap: 18px; }\n    .title-left .brand-mark .meta { font-family: var(--se-font-mono); font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--se-fg-3); border-left: 1px solid var(--se-line); padding-left: 18px; line-height: 1.5; }\n\n    h1.slide-title {\n      font-family: var(--se-font-display);\n      font-size: 64px;\n      line-height: 1.05;\n      letter-spacing: -0.02em;\n      font-weight: 700;\n      color: var(--se-fg-strong);\n      margin: 0;\n      max-width: 1400px;\n    }\n    h2.slide-title {\n      font-family: var(--se-font-display);\n      font-size: 52px;\n      line-height: 1.08;\n      letter-spacing: -0.02em;\n      font-weight: 700;\n      color: var(--se-fg-strong);\n      margin: 0;\n      max-width: 1500px;\n    }\n    p.slide-lead {\n      font-size: 24px;\n      line-height: 1.4;\n      color: var(--se-fg-2);\n      max-width: 1200px;\n      margin: 0;\n      font-weight: 400;\n    }\n\n    /* ────── {\n      display: inline-flex; align-items: center;\n      padding: 6px 14px;\n      border: 1px solid var(--se-line);\n      border-radius: 999px;\n      font-size: 13px;\n      color: var(--se-fg-2);\n      font-family: var(--se-font-mono);\n      background: #fff;\n    }\n    .chip.indigo { background: var(--se-primary-50); color: var(--se-primary-700); border-color: var(--se-primary-100); }\n    .chip-row { display:flex; flex-wrap:wrap; gap:10px; }\n\n    .kv { display:grid; grid-template-columns: 220px 1fr; gap: 12px 24px; font-size: 15px; }\n    .kv dt { font-family: var(--se-font-mono); color: var(--se-fg-3); font-size: 13px; letter-spacing: 0.04em; text-transform: uppercase; }\n    .kv dd { margin: 0; color: var(--se-fg); }\n\n    table.spec {\n      width: 100%; border-collapse: collapse; font-size: 15px;\n    }\n    table.spec th, table.spec td {\n      text-align: left; padding: 14px 18px; border-bottom: 1px solid var(--se-line);\n      vertical-align: top;\n    }\n    table.spec th {\n      font-family: var(--se-font-mono); font-size: 12px; letter-spacing: 0.08em;\n      text-transform: uppercase; color: var(--se-fg-3); font-weight: 600;\n      border-bottom: 2px solid var(--se-fg-strong);\n    }\n    table.spec td.mono { font-family: var(--se-font-mono); font-variant-numeric: tabular-nums; }\n    table.spec td .badge {\n      display:inline-block; font-family: var(--se-font-mono); font-size:11px;\n      padding: 2px 8px; border-radius: 4px; background: var(--se-primary-50);\n      color: var(--se-primary-700); letter-spacing: 0.06em;\n    }\n\n    /* full-bleed title slide */\n    section.slide.title-slide { padding: 0; background: var(--se-bg); }\n    .title-grid {\n      display: grid;\n      grid-template-columns: 1.1fr 0.9fr;\n      width: 100%; height: 100%;\n    }\n    .title-left {\n      padding: 88px 96px;\n      display: flex; flex-direction: column; justify-content: space-between;\n      background: var(--se-bg);\n    }\n    .title-right {\n      background: var(--se-primary);\n      color: #fff;\n      padding: 88px 96px;\n      display: flex; flex-direction: column; justify-content: space-between;\n      position: relative; overflow: hidden;\n    }\n    .title-right::before {\n      content: \"\"; position:absolute; inset:0;\n      background: radial-gradient(circle at 80% 20%, rgba(255,255,255,0.10), transparent 60%);\n    }\n    .title-right \u003e * { position: relative; z-index: 1; }\n    .title-display {\n      font-family: var(--se-font-display);\n      font-weight: 800;\n      font-size: 92px;\n      line-height: 0.96;\n      letter-spacing: -0.03em;\n      color: var(--se-fg-strong);\n      margin: 0;\n    }\n    .title-display em { font-style: normal; color: var(--se-primary); }\n    .title-sub {\n      font-size: 22px; line-height: 1.45; color: var(--se-fg-2);\n      max-width: 560px; margin-top: 32px;\n    }\n    .title-meta {\n      display: grid; grid-template-columns: auto 1fr; gap: 8px 24px;\n      font-family: var(--se-font-mono); font-size: 14px;\n      color: var(--se-fg-3);\n    }\n    .title-meta dt { text-transform: uppercase; letter-spacing: 0.08em; }\n    .title-meta dd { margin: 0; color: var(--se-fg-strong); }\n\n    .title-stat {\n      font-family: var(--se-font-display);\n      font-size: 220px; font-weight: 800;\n      line-height: 0.85;\n      letter-spacing: -0.04em;\n      color: #fff;\n    }\n    .title-stat-label {\n      font-family: var(--se-font-mono);\n      font-size: 14px; text-transform: uppercase;\n      letter-spacing: 0.16em; opacity: 0.8;\n    }\n    .title-statgrid { display:grid; grid-template-columns:1fr 1fr; gap:32px 24px; }\n    .title-statgrid .num {\n      font-family: var(--se-font-display); font-size: 88px; font-weight: 800;\n      letter-spacing: -0.03em; color: #fff; line-height: 0.95;\n    }\n    .title-statgrid .lbl {\n      font-family: var(--se-font-mono); font-size: 13px;\n      text-transform: uppercase; letter-spacing: 0.12em;\n      color: rgba(255,255,255,0.78); margin-top: 6px;\n    }\n\n    /* section dividers */\n    section.slide.section-divider {\n      background: var(--se-fg-strong);\n      color: #fff;\n    }\n    section.slide.section-divider .slide-pad { justify-content: center; }\n    .section-num {\n      font-family: var(--se-font-mono);\n      font-size: 18px; letter-spacing: 0.18em;\n      color: var(--se-primary-200);\n      text-transform: uppercase;\n    }\n    .section-title {\n      font-family: var(--se-font-display);\n      font-size: 140px; line-height: 0.95;\n      font-weight: 800; letter-spacing: -0.03em;\n      color: #fff; margin: 24px 0 0; max-width: 1500px;\n    }\n    .section-subtitle {\n      font-size: 26px; max-width: 1200px;\n      color: rgba(255,255,255,0.82);\n      margin-top: 28px; line-height: 1.4;\n    }\n\n    /* model card grid */\n    .model-card {\n      border: 1px solid var(--se-line);\n      border-radius: 14px;\n      padding: 22px 24px;\n      background: #fff;\n      display: flex; flex-direction: column;\n      gap: 8px;\n    }\n    .model-card .id {\n      font-family: var(--se-font-mono);\n      font-weight: 700; color: var(--se-primary);\n      font-size: 14px; letter-spacing: 0.06em;\n    }\n    .model-card h4 { margin: 0; font-family: var(--se-font-display); font-size: 19px; color: var(--se-fg-strong); }\n    .model-card p  { margin: 0; font-size: 14px; line-height: 1.45; color: var(--se-fg-2); }\n    .model-card .out {\n      font-family: var(--se-font-mono); font-size: 12px;\n      color: var(--se-fg-3); letter-spacing: 0.04em;\n      padding-top: 10px; margin-top: auto;\n      border-top: 1px dashed var(--se-line);\n    }\n\n    /* timeline */\n    .timeline { display:flex; gap:0; align-items:stretch; }\n    .timeline .step {\n      flex:1; padding: 20px 22px; border-right: 1px solid var(--se-line);\n      display:flex; flex-direction:column; gap:8px;\n    }\n    .timeline .step:last-child { border-right: none; }\n    .timeline .step .n {\n      font-family: var(--se-font-mono); font-size: 12px; letter-spacing: 0.1em;\n      color: var(--se-primary); font-weight: 600;\n    }\n    .timeline .step h5 { margin:0; font-family:var(--se-font-display); font-size:18px; font-weight:700; color:var(--se-fg-strong);}\n    .timeline .step p  { margin:0; font-size:13px; line-height:1.45; color:var(--se-fg-2); }\n\n    /* big stat block */\n    .bigstat {\n      display:flex; flex-direction:column; gap: 6px;\n      padding: 20px 0;\n    }\n    .bigstat .v {\n      font-family: var(--se-font-display); font-weight: 800;\n      font-size: 96px; letter-spacing: -0.04em; line-height: 0.9;\n      color: var(--se-fg-strong); font-variant-numeric: tabular-nums;\n    }\n    .bigstat .l {\n      font-family: var(--se-font-mono); font-size: 13px;\n      letter-spacing: 0.1em; text-transform: uppercase;\n      color: var(--se-fg-3);\n    }\n    .bigstat.indigo .v { color: var(--se-primary); }\n\n    /* Quote / pull */\n    .pull {\n      font-family: var(--se-font-display);\n      font-weight: 600;\n      font-size: 36px; line-height: 1.25;\n      letter-spacing: -0.01em;\n      color: var(--se-fg-strong);\n      max-width: 1300px;\n    }\n\n    /* legend */\n    .legend { display:flex; gap:18px; flex-wrap:wrap; font-family:var(--se-font-mono); font-size:12px; }\n    .legend .sw { display:flex; align-items:center; gap:8px; color:var(--se-fg-2); }\n    .legend .sw i { width:14px; height:14px; border-radius:3px; display:inline-block; }\n\n    /* density toggle */\n    body[data-density=\"calm\"] .dense-only { display: none; }\n    body[data-density=\"dense\"] .calm-only { display: none; }\n    body[data-density=\"calm\"] .slide-pad { gap: 56px; }\n    body[data-density=\"calm\"] p.slide-lead { font-size: 28px; }\n\n    /* sparkline placeholder rows */\n    .row-list { display:flex; flex-direction:column; gap: 10px; }\n    .row-list .r {\n      display:grid; grid-template-columns: 130px 1fr 90px; gap:18px;\n      align-items:center; padding: 10px 14px; border:1px solid var(--se-line);\n      border-radius: 10px; background:#fff;\n    }\n    .row-list .r .lbl { font-family:var(--se-font-mono); font-size:12px; color:var(--se-fg-3); letter-spacing:0.06em; text-transform:uppercase; }\n    .row-list .r .bar { height:10px; background:var(--se-bg-soft); border-radius:5px; overflow:hidden; }\n    .row-list .r .bar i { display:block; height:100%; background:var(--se-primary); border-radius:5px; }\n    .row-list .r .v { font-family: var(--se-font-mono); font-variant-numeric: tabular-nums; font-size: 14px; color: var(--se-fg-strong); text-align: right; }\n\n    /* small captions */\n    .cap { font-family: var(--se-font-mono); font-size: 12px; color: var(--se-fg-3); letter-spacing: 0.06em; text-transform: uppercase; }\n\n    /* Surface slides 25/26/27 — tighter padding so dense tile grids fit */\n    .slide.compact-surface .slide-pad { padding: 64px 96px 88px; gap: 18px; }\n    .slide.compact-surface .slide-header { margin-bottom: 0; }\n    .slide.compact-surface .slide-title { font-size: 36px !important; line-height: 1.15; }\n    .slide.compact-surface p.slide-lead { font-size: 17.5px !important; line-height: 1.55; }\n\n    .slide.compact-sources .slide-pad { padding-top: 56px; padding-bottom: 96px; gap: 16px; }\n    .slide.compact-sources .slide-header { margin-bottom: 0; }\n    .slide.compact-sources .slide-title { font-size: 36px !important; line-height: 1.15; }\n    .slide.compact-sources .card { padding: 16px 18px !important; gap: 6px; }\n    .slide.compact-sources .card h3 { font-size: 19px; line-height: 1.2; margin: 0; }\n    .slide.compact-sources .card h4 { font-size: 17px; line-height: 1.2; margin: 0; }\n    .slide.compact-sources .card p { font-size: 13.5px; line-height: 1.4; margin: 0; }\n    .slide.compact-sources .card .tag { font-size: 11px; }\n    .slide.compact-sources .card .cap { font-size: 11.5px; letter-spacing: 0.04em; }\n    .slide.compact-sources table.spec td { padding: 5px 6px; font-size: 12.5px; line-height: 1.25; }\n    .slide.compact-sources table.spec .cap { margin-top: 2px !important; font-size: 10.5px; }\n    .slide.compact-sources .badge { font-size: 10px; padding: 2px 6px; }\n\n    /* Slide 08 — 19-model registry: scoped density overrides only on this slide */\n    .slide.compact-registry .slide-pad { padding-top: 56px; padding-bottom: 100px; gap: 20px; }\n    .slide.compact-registry .slide-header { margin-bottom: 0; }\n    .slide.compact-registry .slide-title { font-size: 32px !important; line-height: 1.15; }\n    .slide.compact-registry .model-card { padding: 10px 13px !important; gap: 5px; border-radius: 12px; }\n    .slide.compact-registry .model-card .id { font-size: 11.5px; letter-spacing: 0.05em; }\n    .slide.compact-registry .model-card h4 { font-size: 15.5px; line-height: 1.2; }\n    .slide.compact-registry .model-card p { font-size: 12.5px; line-height: 1.35; }\n    .slide.compact-registry .model-card .out { font-size: 11px; letter-spacing: 0.03em; }\n  \u003c/style\u003e\n\u003c/head\u003e\n\u003cbody data-density=\"dense\" class=\"has-reference-badge\"\u003e\n\n\u003cdeck-stage\u003e\n\n  \u003c!-- 01 — Title --\u003e\n  \u003csection class=\"slide title-slide\" data-screen-label=\"01 Title\"\u003e\n    \u003cdiv class=\"title-grid\"\u003e\n      \u003cdiv class=\"title-left\"\u003e\n        \u003cdiv class=\"brand-mark\"\u003e\n          \u003cimg src=\"f61d8b4db13044019d000e581229ea35\" alt=\"Spatial Economics\"\u003e\n          \u003cspan class=\"meta\"\u003eCity of\u003cbr/\u003eJohannesburg\u003c/span\u003e\n        \u003c/div\u003e\n        \u003cdiv\u003e\n          \u003cdiv class=\"cap\" style=\"color:var(--se-primary); margin-bottom: 28px;\"\u003eONBOARDING — APRIL 2026\u003c/div\u003e\n          \u003ch1 class=\"title-display\"\u003eThe Johannesburg\u003cbr/\u003eSpatial Economic\u003cbr/\u003e\u003cem\u003eIntelligence\u003c/em\u003e Platform.\u003c/h1\u003e\n          \u003cp class=\"title-sub\"\u003eA unified hexagonal model of Johannesburg's economy at 1.2\u0026nbsp;km resolution. Built on a national backbone covering all nine metros, nine provinces, and South Africa — the metro backbone is staged today, with eThekwini as the live, validated pilot. Tiers 1–3 already cover your geography from the national backbone — what's missing is your operational layer (Tier 4). This deck walks you through what we've built, what already runs for your geography on day one, and how a co-designed Tier 4 turns the platform into your operating system.\u003c/p\u003e\n        \u003c/div\u003e\n        \u003cdl class=\"title-meta\"\u003e\n          \u003cdt\u003ePrepared for\u003c/dt\u003e\u003cdd\u003eCity of Johannesburg Metropolitan Municipality\u003c/dd\u003e\n          \u003cdt\u003ePrepared by\u003c/dt\u003e\u003cdd\u003eSpatial Economics\u003c/dd\u003e\n          \u003cdt\u003eVersion\u003c/dt\u003e\u003cdd\u003ev1.0 · 2026-04-29\u003c/dd\u003e\n          \u003cdt\u003eStatus\u003c/dt\u003e\u003cdd\u003eOutreach package \u0026mdash; Johannesburg variant of the eThekwini pilot\u003c/dd\u003e\n        \u003c/dl\u003e\n      \u003c/div\u003e\n      \u003cdiv class=\"title-right\"\u003e\n        \u003cdiv\u003e\n          \u003cdiv class=\"title-stat-label\"\u003ePlatform at a glance\u003c/div\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"title-statgrid\"\u003e\n          \u003cdiv\u003e\u003cdiv class=\"num\"\u003e397\u003c/div\u003e\u003cdiv class=\"lbl\"\u003eHex-7 cells · Johannesburg estimate\u003c/div\u003e\u003c/div\u003e\n          \u003cdiv\u003e\u003cdiv class=\"num\"\u003e135\u003c/div\u003e\u003cdiv class=\"lbl\"\u003eWards · cross-walked to hexes\u003c/div\u003e\u003c/div\u003e\n          \u003cdiv\u003e\u003cdiv class=\"num\"\u003e19\u003c/div\u003e\u003cdiv class=\"lbl\"\u003eIntegrated models · M1–M19\u003c/div\u003e\u003c/div\u003e\n          \u003cdiv\u003e\u003cdiv class=\"num\"\u003e32\u003csmall style=\"font-size:48px; opacity:0.85;\"\u003e+\u003c/small\u003e\u003c/div\u003e\u003cdiv class=\"lbl\"\u003eSource families · 1975 → Feb\u0026nbsp;2026\u003c/div\u003e\u003c/div\u003e\n          \u003cdiv\u003e\u003cdiv class=\"num\"\u003e1000\u003csmall style=\"font-size:48px; opacity:0.85;\"\u003e+\u003c/small\u003e\u003c/div\u003e\u003cdiv class=\"lbl\"\u003eVariables · single panel\u003c/div\u003e\u003c/div\u003e\n          \u003cdiv\u003e\u003cdiv class=\"num\"\u003e500\u003csmall style=\"font-size:48px; opacity:0.85;\"\u003em\u003c/small\u003e\u003c/div\u003e\u003cdiv class=\"lbl\"\u003eSpatial resolution · output raster\u003c/div\u003e\u003c/div\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"title-stat-label\"\u003eHexagonal economic intelligence — sub-city, monthly, validated.\u003c/div\u003e\n      \u003c/div\u003e\n    \u003c/div\u003e\n  \u003c/section\u003e\n\n  \u003c!-- 02 — Three numbers --\u003e\n  \u003csection class=\"slide\" data-screen-label=\"02 The three numbers\"\u003e\n    \u003cdiv class=\"slide-pad\"\u003e\n      \u003cheader class=\"slide-header\"\u003e\n        \u003cdiv\u003e\n          \u003cdiv class=\"slide-eyebrow\"\u003eThe three numbers\u003c/div\u003e\n          \u003ch2 class=\"slide-title\" style=\"margin-top:14px;\"\u003eIf you remember nothing else from this hour, remember these.\u003c/h2\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"slide-section-tag\"\u003e§ 01 · Frame\u003c/div\u003e\n      \u003c/header\u003e\n      \u003cdiv class=\"grid-3\" style=\"gap:32px; flex:1; align-items:stretch;\"\u003e\n        \u003cdiv class=\"card\"\u003e\n          \u003cspan class=\"tag\"\u003eSpatial resolution\u003c/span\u003e\n          \u003cdiv class=\"num\"\u003e429\u003csmall\u003ehex-7\u003c/small\u003e\u003c/div\u003e\n          \u003ch3\u003eSub-ward, uniform geometry\u003c/h3\u003e\n          \u003cp\u003eH3 Level\u0026nbsp;7 hexagons — ~1.2 km edge — tile Johannesburg approximately 397 times; the same grid extends nationally as the staged scope is brought online. Wards are political; hexes are analytical. Every model, map, and forecast in the metro is keyed to this grid.\u003c/p\u003e\n          \u003cdiv class=\"cap\" style=\"margin-top:auto;\"\u003ePrimary key · \u003cspan style=\"color:var(--se-primary);\"\u003ehex7\u003c/span\u003e\u003c/div\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"card\"\u003e\n          \u003cspan class=\"tag\"\u003eTemporal resolution\u003c/span\u003e\n          \u003cdiv class=\"num\"\u003e146\u003csmall\u003emonths\u003c/small\u003e\u003c/div\u003e\n          \u003ch3\u003eMonthly, 2014 → Feb\u0026nbsp;2026\u003c/h3\u003e\n          \u003cp\u003eTwelve full years of monthly observations on every hexagon. Long enough to see the COVID drop, the 2021 unrest, the 2022 floods, and load-shedding stages 4–6 — and recover from each.\u003c/p\u003e\n          \u003cdiv class=\"cap\" style=\"margin-top:auto;\"\u003eComposite key · \u003cspan style=\"color:var(--se-primary);\"\u003ehex7 × year_month\u003c/span\u003e\u003c/div\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"card indigo\"\u003e\n          \u003cspan class=\"tag\"\u003eAnalytical surface\u003c/span\u003e\n          \u003cdiv class=\"num\"\u003e1B\u003csmall style=\"color:rgba(255,255,255,0.7);\"\u003e+ rows\u003c/small\u003e\u003c/div\u003e\n          \u003ch3\u003eOne panel. 1000+ variables.\u003c/h3\u003e\n          \u003cp\u003eEvery signal — FTE, electricity, water, nightlights, faults, valuations, FDI projects, EDIP rebates, GHSL population, SANLC land cover, ward GDP, customs trade, plus all nineteen model outputs — sits on a single primary key. \u003cspan style=\"font-family:var(--se-font-mono);\"\u003ehex7 × year_month\u003c/span\u003e for the eThekwini ready slice; coarser geometry for the staged province and national scopes.\u003c/p\u003e\n          \u003cdiv class=\"cap\" style=\"margin-top:auto; color:rgba(255,255,255,0.75);\"\u003eTable · \u003cspan style=\"color:#fff;\"\u003ehex_panel\u003c/span\u003e\u003c/div\u003e\n        \u003c/div\u003e\n      \u003c/div\u003e\n      \u003cp class=\"slide-lead\"\u003eSub-city, monthly, validated. Built once, queried hundreds of ways.\u003c/p\u003e\n    \u003c/div\u003e\n    \u003cdiv class=\"slide-footer\"\u003e\n      \u003cdiv class=\"brand\"\u003e\u003cimg src=\"f61d8b4db13044019d000e581229ea35\" alt=\"Spatial Economics\"\u003e\u003c/div\u003e\n      \u003cdiv\u003e02 · The three numbers\u003c/div\u003e\n      \u003cdiv\u003e02 / 34\u003c/div\u003e\n    \u003c/div\u003e\n  \u003c/section\u003e\n\n  \u003c!-- 03 — Why hexagons --\u003e\n  \u003csection class=\"slide\" data-screen-label=\"03 Why hexagons\"\u003e\n    \u003cdiv class=\"slide-pad\"\u003e\n      \u003cheader class=\"slide-header\"\u003e\n        \u003cdiv\u003e\n          \u003cdiv class=\"slide-eyebrow\"\u003eWhy hexagons\u003c/div\u003e\n          \u003ch2 class=\"slide-title\" style=\"margin-top:14px;\"\u003eWards explain politics.\u003cbr/\u003eHexagons explain economics.\u003c/h2\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"slide-section-tag\"\u003e§ 01 · Frame\u003c/div\u003e\n      \u003c/header\u003e\n      \u003cdiv class=\"grid-2\" style=\"flex:1; align-items:stretch;\"\u003e\n        \u003cdiv style=\"display:flex; flex-direction:column; gap:24px;\"\u003e\n          \u003cp class=\"slide-lead\"\u003eWards are uneven, politically defined, and re-drawn. Suburbs blur into each other. Pixel grids ignore neighbourhood structure. We needed a uniform analytical surface that respected geography but didn't inherit administrative noise.\u003c/p\u003e\n          \u003cdiv class=\"grid-2\" style=\"gap:20px;\"\u003e\n            \u003cdiv class=\"card soft\"\u003e\n              \u003cspan class=\"tag\"\u003eH3 Level 7\u003c/span\u003e\n              \u003ch4\u003e~1.2 km edge length\u003c/h4\u003e\n              \u003cp\u003eEach cell covers ~5.16 km². Smaller than a ward, larger than a property, comparable across the metro.\u003c/p\u003e\n            \u003c/div\u003e\n            \u003cdiv class=\"card soft\"\u003e\n              \u003cspan class=\"tag\"\u003eLossless aggregation\u003c/span\u003e\n              \u003ch4\u003eRoll up, drill down\u003c/h4\u003e\n              \u003cp\u003eHexes nest cleanly into wards (and out to the metro). Outputs reconcile to ward GDP via Denton-Cholette.\u003c/p\u003e\n            \u003c/div\u003e\n            \u003cdiv class=\"card soft\"\u003e\n              \u003cspan class=\"tag\"\u003eCross-metro comparable\u003c/span\u003e\n              \u003ch4\u003eSame grid, any city\u003c/h4\u003e\n              \u003cp\u003eThe same H3 spec runs the Western Cape Urban Growth Monitors. Johannesburg becomes one node in a national lattice.\u003c/p\u003e\n            \u003c/div\u003e\n            \u003cdiv class=\"card soft\"\u003e\n              \u003cspan class=\"tag\"\u003eEdge-aware\u003c/span\u003e\n              \u003ch4\u003eEconomic activity crosses lines\u003c/h4\u003e\n              \u003cp\u003eA retail corridor can span three wards. Hexes capture the corridor; ward statistics dilute it.\u003c/p\u003e\n            \u003c/div\u003e\n          \u003c/div\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"card\" style=\"padding:0; overflow:hidden; background:var(--se-bg-soft); align-items:stretch;\"\u003e\n          \u003cdiv style=\"padding: 24px 28px; border-bottom:1px solid var(--se-line); display:flex; justify-content:space-between; align-items:baseline;\"\u003e\n            \u003cdiv\u003e\n              \u003cdiv class=\"cap\"\u003eGeometry · schematic\u003c/div\u003e\n              \u003ch4 style=\"margin-top:6px;\"\u003eWard boundary vs H3-7 tiling\u003c/h4\u003e\n            \u003c/div\u003e\n            \u003cdiv class=\"cap\"\u003e397 cells · Johannesburg\u003c/div\u003e\n          \u003c/div\u003e\n          \u003csvg viewBox=\"0 0 600 520\" width=\"100%\" style=\"flex:1; background:#fff;\" preserveAspectRatio=\"xMidYMid meet\"\u003e\n            \u003cdefs\u003e\n              \u003cpattern id=\"hexp\" x=\"0\" y=\"0\" width=\"60\" height=\"52\" patternUnits=\"userSpaceOnUse\"\u003e\n                \u003cpolygon points=\"30,2 58,17 58,47 30,62 2,47 2,17\" fill=\"#fff\" stroke=\"#C9D0DC\" stroke-width=\"1\"/\u003e\n              \u003c/pattern\u003e\n              \u003cpattern id=\"hexp2\" x=\"30\" y=\"26\" width=\"60\" height=\"52\" patternUnits=\"userSpaceOnUse\"\u003e\n                \u003cpolygon points=\"30,2 58,17 58,47 30,62 2,47 2,17\" fill=\"#fff\" stroke=\"#C9D0DC\" stroke-width=\"1\"/\u003e\n              \u003c/pattern\u003e\n            \u003c/defs\u003e\n            \u003cpath d=\"M60,80 L240,40 L420,90 L520,200 L500,360 L380,460 L200,470 L80,380 L40,220 Z\"\n                  fill=\"url(#hexp)\" stroke=\"#594AE3\" stroke-width=\"3\"/\u003e\n            \u003cpath d=\"M60,80 L240,40 L420,90 L520,200 L500,360 L380,460 L200,470 L80,380 L40,220 Z\"\n                  fill=\"url(#hexp2)\" stroke=\"none\" opacity=\"0.5\"/\u003e\n            \u003cg fill=\"#594AE3\" stroke=\"#3A30B0\" stroke-width=\"1\" opacity=\"0.85\"\u003e\n              \u003cpolygon points=\"180,150 208,165 208,195 180,210 152,195 152,165\" /\u003e\n              \u003cpolygon points=\"240,178 268,193 268,223 240,238 212,223 212,193\" opacity=\"0.6\"/\u003e\n              \u003cpolygon points=\"300,150 328,165 328,195 300,210 272,195 272,165\" opacity=\"0.4\"/\u003e\n              \u003cpolygon points=\"360,178 388,193 388,223 360,238 332,223 332,193\" opacity=\"0.7\"/\u003e\n              \u003cpolygon points=\"240,236 268,251 268,281 240,296 212,281 212,251\" opacity=\"0.5\"/\u003e\n              \u003cpolygon points=\"300,264 328,279 328,309 300,324 272,309 272,279\" opacity=\"0.85\"/\u003e\n              \u003cpolygon points=\"360,292 388,307 388,337 360,352 332,337 332,307\" opacity=\"0.6\"/\u003e\n              \u003cpolygon points=\"180,294 208,309 208,339 180,354 152,339 152,309\" opacity=\"0.4\"/\u003e\n            \u003c/g\u003e\n            \u003cg font-family=\"Cascadia Mono, Consolas, monospace\" font-size=\"11\" fill=\"#6B7385\"\u003e\n              \u003ctext x=\"60\" y=\"500\"\u003eCBD \u0026amp; beachfront corridor\u003c/text\u003e\n              \u003ccircle cx=\"305\" cy=\"497\" r=\"3\" fill=\"#594AE3\"/\u003e\u003ctext x=\"315\" y=\"500\"\u003eHigh-activity hex sample\u003c/text\u003e\n            \u003c/g\u003e\n          \u003c/svg\u003e\n        \u003c/div\u003e\n      \u003c/div\u003e\n    \u003c/div\u003e\n    \u003cdiv class=\"slide-footer\"\u003e\n      \u003cdiv class=\"brand\"\u003e\u003cimg src=\"f61d8b4db13044019d000e581229ea35\" alt=\"Spatial Economics\"\u003e\u003c/div\u003e\n      \u003cdiv\u003e03 · Why hexagons\u003c/div\u003e\n      \u003cdiv\u003e03 / 34\u003c/div\u003e\n    \u003c/div\u003e\n  \u003c/section\u003e\n\n  \u003c!-- 04 — Section 2 divider --\u003e\n  \u003csection class=\"slide section-divider\" data-screen-label=\"04 Section · Data\"\u003e\n    \u003cdiv class=\"slide-pad\"\u003e\n      \u003cdiv class=\"section-num\"\u003eSECTION 02 · 04 / 34\u003c/div\u003e\n      \u003ch2 class=\"section-title\"\u003eThe data\u003cbr/\u003espine.\u003c/h2\u003e\n      \u003cp class=\"section-subtitle\"\u003eThirty-plus governed sources. One key. Most municipalities have these in silos. We have them on a single primary key: \u003cspan style=\"font-family:var(--se-font-mono); color:var(--se-primary-200);\"\u003ehex7\u0026nbsp;×\u0026nbsp;year_month\u003c/span\u003e for the Johannesburg metro slice; province / national scopes use coarser geometry from the same registry.\u003c/p\u003e\n    \u003c/div\u003e\n  \u003c/section\u003e\n\n  \u003c!-- 05 — Data sources --\u003e\n  \u003csection class=\"slide compact-sources\" data-screen-label=\"05 Data sources\"\u003e\n    \u003cdiv class=\"slide-pad\"\u003e\n      \u003cheader class=\"slide-header\"\u003e\n        \u003cdiv\u003e\n          \u003cdiv class=\"slide-eyebrow\"\u003eSource registry · governed families\u003c/div\u003e\n          \u003ch2 class=\"slide-title\" style=\"margin-top:14px;\"\u003eThirty-plus feeds, four tiers, one key.\u003c/h2\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"slide-section-tag\"\u003e§ 02 · Data\u003c/div\u003e\n      \u003c/header\u003e\n      \u003cdiv class=\"grid-3\" style=\"gap:18px; flex:1; min-height:0;\"\u003e\n\n        \u003cdiv class=\"card\"\u003e\n          \u003cspan class=\"tag\"\u003eTier 1 · Geography spine\u003c/span\u003e\n          \u003ch3\u003eWhere things are.\u003c/h3\u003e\n          \u003ctable class=\"spec\" style=\"margin-top:10px;\"\u003e\u003ctbody\u003e\n            \u003ctr\u003e\u003ctd\u003e\u003cstrong\u003eSEADSA v6\u003c/strong\u003e\u003cdiv class=\"cap\" style=\"margin-top:4px;\"\u003eSpatial economic accounts\u003c/div\u003e\u003cdiv class=\"cap\" style=\"margin-top:6px; font-family:var(--se-font-mono); color:var(--se-primary); font-size:11px; letter-spacing:0; line-height:1.45; word-break:break-all;\"\u003efte · establishments · total_income · gini\u003c/div\u003e\u003c/td\u003e\u003ctd\u003e\u003cspan class=\"badge\"\u003ehex · muni · prov · nat\u003c/span\u003e\u003c/td\u003e\u003c/tr\u003e\n            \u003ctr\u003e\u003ctd\u003e\u003cstrong\u003eGHSL\u003c/strong\u003e\u003cdiv class=\"cap\" style=\"margin-top:4px;\"\u003eEU JRC built surface · pop\u003c/div\u003e\u003c/td\u003e\u003ctd\u003e\u003cspan class=\"badge\"\u003e100 m raster\u003c/span\u003e\u003c/td\u003e\u003c/tr\u003e\n            \u003ctr\u003e\u003ctd\u003e\u003cstrong\u003eSANLC\u003c/strong\u003e\u003cdiv class=\"cap\" style=\"margin-top:4px;\"\u003eSA National Land Cover\u003c/div\u003e\u003c/td\u003e\u003ctd\u003e\u003cspan class=\"badge\"\u003e20 m raster\u003c/span\u003e\u003c/td\u003e\u003c/tr\u003e\n            \u003ctr\u003e\u003ctd\u003e\u003cstrong\u003eGIS estate\u003c/strong\u003e\u003cdiv class=\"cap\" style=\"margin-top:4px;\"\u003eMounted geometry library\u003c/div\u003e\u003cdiv class=\" color:rgba(255,255,255,0.18);\"\u003eEDIP application-derived investment\u003c/td\u003e\u003c/tr\u003e\n              \u003ctr\u003e\u003ctd style=\"padding:6px 8px; color:rgba(255,255,255,0.95); border-color:rgba(255,255,255,0.18);\" class=\"mono\"\u003e\u003cstrong\u003egva_estimated\u003c/strong\u003e\u003c/td\u003e\u003ctd style=\"padding:6px 8px; color:rgba(255,255,255,0.85); border-color:rgba(255,255,255,0.18);\"\u003eM1 · monthly hex GVA nowcast\u003c/td\u003e\u003c/tr\u003e\n              \u003ctr\u003e\u003ctd style=\"padding:6px 8px; color:rgba(255,255,255,0.95); border-color:rgba(255,255,255,0.18);\" class=\"mono\"\u003eeci · trade_eci\u003c/td\u003e\u003ctd style=\"padding:6px 8px; color:rgba(255,255,255,0.85); border-color:rgba(255,255,255,0.18);\"\u003eM2 · complexity · trade-complexity\u003c/td\u003e\u003c/tr\u003e\n              \u003ctr\u003e\u003ctd style=\"padding:6px 8px; color:rgba(255,255,255,0.95); border-color:rgba(255,255,255,0.18);\" class=\"mono\"\u003eaccessibility_index\u003c/td\u003e\u003ctd style=\"padding:6px 8px; color:rgba(255,255,255,0.85); border-color:rgba(255,255,255,0.18);\"\u003eM3 · gravity job accessibility\u003c/td\u003e\u003c/tr\u003e\n              \u003ctr\u003e\u003ctd style=\"padding:6px 8px; color:rgba(255,255,255,0.95); border-color:rgba(255,255,255,0.18);\" class=\"mono\"\u003eresilience_score\u003c/td\u003e\u003ctd style=\"padding:6px 8px; color:rgba(255,255,255,0.85); border-color:rgba(255,255,255,0.18);\"\u003eM5 · resistance + recovery\u003c/td\u003e\u003c/tr\u003e\n              \u003ctr\u003e\u003ctd style=\"padding:6px 8px; color:rgba(255,255,255,0.95); border-color:rgba(255,255,255,0.18);\" class=\"mono\"\u003edata_quality_score\u003c/td\u003e\u003ctd style=\"padding:6px 8px; color:rgba(255,255,255,0.85); border-color:rgba(255,255,255,0.18);\"\u003eM0 · row-level coverage / freshness\u003c/td\u003e\u003c/tr\u003e\n            \u003c/tbody\u003e\n          \u003c/table\u003e\n        \u003c/div\u003e\n      \u003c/div\u003e\n\n      \u003c!-- Footnote strip --\u003e\n      \u003cdiv class=\"card warm\" style=\"padding:14px 28px;\"\u003e\n        \u003cdiv style=\"display:flex; align-items:center; gap:24px;\"\u003e\n          \u003cspan class=\"tag\" style=\"color:var(--se-fg-strong); flex-shrink:0;\"\u003eConventions\u003c/span\u003e\n          \u003cp style=\"font-size:14px; line-height:1.45; margin:0; color:var(--se-fg-2);\"\u003e\n            Every column carries a \u003cstrong\u003etype\u003c/strong\u003e, a \u003cstrong\u003esource family\u003c/strong\u003e, and a \u003cstrong\u003emasking policy\u003c/strong\u003e for confidentiality (\u003cspan style=\"font-family:var(--se-font-mono); color:var(--se-primary);\"\u003e\u0026lt;10\u003c/span\u003e / \u003cspan style=\"font-family:var(--se-font-mono); color:var(--se-primary);\"\u003e\u0026lt;100\u003c/span\u003e SEADSA strings handled via \u003cspan style=\"font-family:var(--se-font-mono); color:var(--se-primary);\"\u003eunmask_column()\u003c/span\u003e). Around 1000 columns sit on the panel today; this slide shows roughly fifty representative ones grouped by their \u003cstrong\u003erole\u003c/strong\u003e: identity, activity, or output.\n          \u003c/p\u003e\n        \u003c/div\u003e\n      \u003c/div\u003e\n    \u003c/div\u003e\n    \u003cdiv class=\"slide-footer\"\u003e\n      \u003cdiv class=\"brand\"\u003e\u003cimg src=\"f61d8b4db13044019d000e581229ea35\" alt=\"Spatial Economics\"\u003e\u003c/div\u003e\n      \u003cdiv\u003e06 · Variables on the panel\u003c/div\u003e\n      \u003cdiv\u003e06 / 34\u003c/div\u003e\n    \u003c/div\u003e\n  \u003c/section\u003e\n\n  \u003c!-- 07 — Pipeline --\u003e\n  \u003csection class=\"slide\" data-screen-label=\"07 Pipeline architecture\"\u003e\n    \u003cdiv class=\"slide-pad\"\u003e\n      \u003cheader class=\"slide-header\"\u003e\n        \u003cdiv\u003e\n          \u003cdiv class=\"slide-eyebrow\"\u003ePipeline architecture\u003c/div\u003e\n          \u003ch2 class=\"slide-title\" style=\"margin-top:14px;\"\u003eFrom raw data to decision surface in five stages.\u003c/h2\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"slide-section-tag\"\u003e§ 02 · Data\u003c/div\u003e\n      \u003c/header\u003e\n      \u003cdiv class=\"timeline\" style=\"border:1px solid var(--se-line); border-radius:14px; overflow:hidden; background:#fff;\"\u003e\n        \u003cdiv class=\"step\"\u003e\n          \u003cdiv class=\"n\"\u003eSTAGE 01\u003c/div\u003e\n          \u003ch5\u003eIngest\u003c/h5\u003e\n          \u003cp\u003ePer-source loaders for SEADsa, VIIRS, consumption, valuation, faults, FDI, EDIP, GHSL, SANLC, Census.\u003c/p\u003e\n          \u003cdiv class=\"cap\" style=\"margin-top:auto; color:var(--se-primary);\"\u003ejhb ingest\u003c/div\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"step\"\u003e\n          \u003cdiv class=\"n\"\u003eSTAGE 02\u003c/div\u003e\n          \u003ch5\u003eHarmonise\u003c/h5\u003e\n          \u003cp\u003eSpatial \u0026amp; temporal alignment to hex-7 × month. Raster zonal stats, suburb→hex fallback, masking.\u003c/p\u003e\n          \u003cdiv class=\"cap\" style=\"margin-top:auto; color:var(--se-primary);\"\u003eharmonize/\u003c/div\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"step\"\u003e\n          \u003cdiv class=\"n\"\u003eSTAGE 03\u003c/div\u003e\n          \u003ch5\u003eBuild panel\u003c/h5\u003e\n          \u003cp\u003eLEFT-JOIN every source onto the hex × month grid. Outputs \u003cspan style=\"font-family:var(--se-font-mono); color:var(--se-primary);\"\u003ehex_panel\u003c/span\u003e (1000+ vars).\u003c/p\u003e\n          \u003cdiv class=\"cap\" style=\"margin-top:auto; color:var(--se-primary);\"\u003ejhb build-panel\u003c/div\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"step\"\u003e\n          \u003cdiv class=\"n\"\u003eSTAGE 04\u003c/div\u003e\n          \u003ch5\u003eRun models\u003c/h5\u003e\n          \u003cp\u003eNineteen models (M1–M19) read from the panel and write back. Econometric shadow mode for forecasts.\u003c/p\u003e\n          \u003cdiv class=\"cap\" style=\"margin-top:auto; color:var(--se-primary);\"\u003ejhb run-models\u003c/div\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"step\"\u003e\n          \u003cdiv class=\"n\"\u003eSTAGE 05\u003c/div\u003e\n          \u003ch5\u003eValidate \u0026amp; serve\u003c/h5\u003e\n          \u003cp\u003eSix programmatic checks. Dash dashboard, REST API, admin control plane, scenario lab.\u003c/p\u003e\n          \u003cdiv class=\"cap\" style=\"margin-top:auto; color:var(--se-primary);\"\u003evalidate · dashboard · api\u003c/div\u003e\n        \u003c/div\u003e\n      \u003c/div\u003e\n\n      \u003cdiv class=\"grid-3\" style=\"gap:24px;\"\u003e\n        \u003cdiv class=\"card soft\"\u003e\n          \u003cspan class=\"tag\"\u003eIdempotent\u003c/span\u003e\n          \u003ch4\u003eRe-runs are cheap\u003c/h4\u003e\n          \u003cp\u003eEvery stage is checkpointed in DuckDB. Re-running a single stage doesn't invalidate downstream tables unless their inputs changed.\u003c/p\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"card soft\"\u003e\n          \u003cspan class=\"tag\"\u003ePortable\u003c/span\u003e\n          \u003ch4\u003eMac, Linux, Azure\u003c/h4\u003e\n          \u003cp\u003eBootstrap creates the venv, installs extras, seeds env files. Doctor checks portability before deploy.\u003c/p\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"card soft\"\u003e\n          \u003cspan class=\"tag\"\u003eReproducible\u003c/span\u003e\n          \u003ch4\u003eOne command rebuild\u003c/h4\u003e\n          \u003cp\u003e\u003cspan style=\"font-family:var(--se-font-mono); color:var(--se-primary);\"\u003emake all-local\u003c/span\u003e regenerates the panel and all nineteen models from the local data subset, no external volume required.\u003c/p\u003e\n        \u003c/div\u003e\n      \u003c/div\u003e\n    \u003c/div\u003e\n    \u003cdiv class=\"slide-footer\"\u003e\n      \u003cdiv class=\"brand\"\u003e\u003cimg src=\"f61d8b4db13044019d000e581229ea35\" alt=\"Spatial Economics\"\u003e\u003c/div\u003e\n      \u003cdiv\u003e07 · Pipeline architecture\u003c/div\u003e\n      \u003cdiv\u003e07 / 34\u003c/div\u003e\n    \u003c/div\u003e\n  \u003c/section\u003e\n\n\n  \u003c!-- 08 — Resolution ladder --\u003e\n  \u003csection class=\"slide\" data-screen-label=\"08 Resolution ladder\"\u003e\n    \u003cdiv class=\"slide-pad\"\u003e\n      \u003cheader class=\"slide-header\"\u003e\n        \u003cdiv\u003e\n          \u003cdiv class=\"slide-eyebrow\"\u003eResolution · zoom in\u003c/div\u003e\n          \u003ch2 class=\"slide-title\" style=\"margin-top:14px;\"\u003eFive rungs from a national tax record to a 10\u0026nbsp;m pixel.\u003c/h2\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"slide-section-tag\"\u003e§ 02 · Data\u003c/div\u003e\n      \u003c/header\u003e\n\n      \u003cp class=\"slide-lead\" style=\"font-size:20px; max-width:1500px;\"\u003e\n        Most municipal economic data stops at the ward — a polygon containing tens of thousands of people. Our panel descends four further rungs, ending at a single 10\u0026nbsp;m land-cover pixel. Every rung below SEADSA is built; every rung is keyed to \u003cspan style=\"font-family:var(--se-font-mono); color:var(--se-primary);\"\u003ehex7\u0026nbsp;×\u0026nbsp;year_month\u003c/span\u003e so the same query traverses all of them.\n      \u003c/p\u003e\n\n      \u003c!-- Five-panel ladder --\u003e\n      \u003cdiv style=\"display:grid; grid-template-columns: repeat(5, 1fr); gap:18px; flex:1; min-height:0;\"\u003e\n\n        \u003c!-- Rung 1 — SEADSA municipal --\u003e\n        \u003cdiv class=\"card\" style=\"display:flex; flex-direction:column; gap:14px; padding:22px 24px;\"\u003e\n          \u003cspan class=\"tag\"\u003eRung 01 · coarsest\u003c/span\u003e\n          \u003ch3 style=\"font-size:20px;\"\u003eSEADSA municipal\u003c/h3\u003e\n          \u003cdiv style \"\u003e\u003cspan class=\"badge\"\u003eaggregate\u003c/span\u003e\u003c/td\u003e\n              \u003c/tr\u003e\n              \u003ctr\u003e\n                \u003ctd style=\"padding:9px 12px;\"\u003e\u003cstrong\u003eValuation roll · EDIP\u003c/strong\u003e \u003cspan class=\"cap\"\u003e· CV2 16 yrs · rebates\u003c/span\u003e\u003c/td\u003e\n                \u003ctd class=\"mono\" style=\"padding:9px 12px;\"\u003e312 stands · 0 active\u003c/td\u003e\n                \u003ctd style=\"padding:9px 12px;\"\u003eFormally-rated property covers ~38 % of built surface. No incentive footprint.\u003c/td\u003e\n                \u003ctd style=\"padding:9px 12px;\"\u003e\u003cspan class=\"badge\"\u003eunderweight\u003c/span\u003e\u003c/td\u003e\n              \u003c/tr\u003e\n              \u003ctr\u003e\n                \u003ctd style=\"padding:9px 12px;\"\u003e\u003cstrong\u003eGHSL 100\u0026nbsp;m\u003c/strong\u003e \u003cspan class=\"cap\"\u003e· pop density\u003c/span\u003e\u003c/td\u003e\n                \u003ctd class=\"mono\" style=\"padding:9px 12px;\"\u003e14 200 ppl/km²\u003c/td\u003e\n                \u003ctd style=\"padding:9px 12px;\"\u003ePopulation density 2.3× the ward mean. People are \u003cem\u003ehere\u003c/em\u003e.\u003c/td\u003e\n                \u003ctd style=\"padding:9px 12px;\"\u003e\u003cspan class=\"badge\"\u003edense\u003c/span\u003e\u003c/td\u003e\n              \u003c/tr\u003e\n              \u003ctr\u003e\n                \u003ctd style=\"padding:9px 12px;\"\u003e\u003cstrong\u003eSANLC 10\u0026nbsp;m\u003c/strong\u003e \u003cspan class=\"cap\"\u003e· class mix\u003c/span\u003e\u003c/td\u003e\n                \u003ctd class=\"mono\" style=\"padding:9px 12px;\"\u003e61 % built · 22 % informal\u003c/td\u003e\n                \u003ctd style=\"padding:9px 12px;\"\u003e22 % of built surface matches the informal-settlement signature.\u003c/td\u003e\n                \u003ctd style=\"padding:9px 12px;\"\u003e\u003cspan class=\"badge\" style=\"background:#FFE6CC; color:#A55A0E;\"\u003eflagged\u003c/span\u003e\u003c/td\u003e\n              \u003c/tr\u003e\n              \u003ctr\u003e\n                \u003ctd style=\"padding:9px 12px;\"\u003e\u003cstrong\u003eVIIRS\u003c/strong\u003e \u003cspan class=\"cap\"\u003e· nightlights\u003c/span\u003e\u003c/td\u003e\n                \u003ctd class=\"mono\" style=\"padding:9px 12px;\"\u003e+18 % YoY\u003c/td\u003e\n                \u003ctd style=\"padding:9px 12px;\"\u003eRadiance rising faster than ward GVA. Activity is real, just not formal.\u003c/td\u003e\n                \u003ctd style=\"padding:9px 12px;\"\u003e\u003cspan class=\"badge\" style=\"background:#FFE6CC; color:#A55A0E;\"\u003egrowing\u003c/span\u003e\u003c/td\u003e\n              \u003c/tr\u003e\n              \u003ctr\u003e\n                \u003ctd style=\"padding:9px 12px;\"\u003e\u003cstrong\u003eFaults · M4\u003c/strong\u003e \u003cspan class=\"cap\"\u003e· tickets/mo\u003c/span\u003e\u003c/td\u003e\n                \u003ctd class=\"mono\" style=\"padding:9px 12px;\"\u003e7.4 / km² avg\u003c/td\u003e\n                \u003ctd style=\"padding:9px 12px;\"\u003eFault density 3.1× metro mean — informal connections under stress.\u003c/td\u003e\n                \u003ctd style=\"padding:9px 12px;\"\u003e\u003cspan class=\"badge\" style=\"background:#FFE0E0; color:#9B1F1F;\"\u003estressed\u003c/span\u003e\u003c/td\u003e\n              \u003c/tr\u003e\n            \u003c/tbody\u003e\n          \u003c/table\u003e\n        \u003c/div\u003e\n      \u003c/div\u003e\n\n      \u003c!-- Full-width punchline strip --\u003e\n      \u003cdiv class=\"card warm\" style=\"padding:14px 28px; margin-top:0;\"\u003e\n        \u003cdiv style=\"display:flex; align-items:center; gap:24px;\"\u003e\n          \u003cspan class=\"tag\" style=\"color:var(--se-fg-strong); flex-shrink:0;\"\u003eThe reading\u003c/span\u003e\n          \u003ch4 style=\"font-size:18px; line-height:1.35; margin:0; font-weight:600;\"\u003e\n            ~4 000 informal households inside one ward GVA · invisible to municipal accounts · the disagreement \u003cem style=\"color:var(--se-primary); font-style:normal;\"\u003eis\u003c/em\u003e the formal/informal boundary made measurable.\n          \u003c/h4\u003e\n        \u003c/div\u003e\n      \u003c/div\u003e\n    \u003c/div\u003e\n    \u003cdiv class=\"slide-footer\"\u003e\n      \u003cdiv class=\"brand\"\u003e\u003cimg src=\"f61d8b4db13044019d000e581229ea35\" alt=\"Spatial Economics\"\u003e\u003c/div\u003e\n      \u003cdiv\u003e09 · Worked example · informal economy\u003c/div\u003e\n      \u003cdiv\u003e09 / 34\u003c/div\u003e\n    \u003c/div\u003e\n  \u003c/section\u003e\n\n  \u003c!-- 10 — So what --\u003e\n  \u003csection class=\"slide\" data-screen-label=\"10 Hyperlocal · so what\"\u003e\n    \u003cdiv class=\"slide-pad\"\u003e\n      \u003cheader class=\"slide-header\"\u003e\n        \u003cdiv\u003e\n          \u003cdiv class=\"slide-eyebrow\"\u003eHyperlocal · so what\u003c/div\u003e\n          \u003ch2 class=\"slide-title\" style=\"margin-top:14px;\"\u003eHex-level intelligence reveals what ward-level GDP cannot.\u003c/h2\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"slide-section-tag\"\u003e§ 02 · Data\u003c/div\u003e\n      \u003c/header\u003e\n\n      \u003cp class=\"slide-lead\" style=\"max-width:1500px;\"\u003e\n        The ladder is not a technical curiosity. It is the difference between an economic statistic and an economic \u003cem\u003einstrument\u003c/em\u003e — a number that helps the metro decide where, and what, and when.\n      \u003c/p\u003e\n\n      \u003cdiv class=\"grid-3\" style=\"gap:24px; flex:1; min-height:0;\"\u003e\n\n        \u003cdiv class=\"card\" style=\"gap:16px;\"\u003e\n          \u003cspan class=\"tag\"\u003eResolution unlocks · 01\u003c/span\u003e\n          \u003ch3 style=\"font-size:26px;\"\u003eThe informal economy\u003cbr/\u003ebecomes measurable.\u003c/h3\u003e\n          \u003cp\u003eSEADSA cannot see four thousand informal households inside one ward. The ladder can — by triangulating GHSL density, SANLC class signatures, and VIIRS radiance against the absence of valuation-roll and EDIP records.\u003c/p\u003e\n          \u003cdiv style=\"display:flex; gap:12px; margin-top:auto;\"\u003e\n            \u003cdiv class=\"num\" style=\"font-size:48px;\"\u003e~22%\u003c/div\u003e\n            \u003cp style=\"font-size:13px; color:var(--se-fg-3); margin:0; align-self:flex-end;\"\u003eof metro built surface tags as informal · invisible to ward GVA\u003c/p\u003e\n          \u003c/div\u003e\n        \u003c/div\u003e\n\n        \u003cdiv class=\"card\" style=\"gap:16px;\"\u003e\n          \u003cspan class=\"tag\"\u003eResolution unlocks · 02\u003c/span\u003e\n          \u003ch3 style=\"font-size:26px;\"\u003eSub-ward inequality\u003cbr/\u003ebecomes visible.\u003c/h3\u003e\n          \u003cp\u003eOne ward, one number averages the rich half and the poor half together. The ladder splits the same ward into 4–7 hexes, each with its own GVA estimate, accessibility score, and resilience trajectory. The Gini doesn't disappear into the mean.\u003c/p\u003e\n          \u003cdiv style=\"display:flex; gap:12px; margin-top:auto;\"\u003e\n            \u003cdiv class=\"num\" style=\"font-size:48px;\"\u003e7×\u003c/div\u003e\n            \u003cp style=\"font-size:13px; color:var(--se-fg-3); margin:0; align-self:flex-end;\"\u003efiner than ward · ~5.16 km² per cell · monthly cadence\u003c/p\u003e\n          \u003c/div\u003e\n        \u003c/div\u003e\n\n        \u003cdiv class=\"card indigo\" style=\"gap:16px;\"\u003e\n          \u003cspan class=\"tag\"\u003eResolution unlocks · 03\u003c/span\u003e\n          \u003ch3 style=\"font-size:26px;\"\u003eInfrastructure failure\u003cbr/\u003elocalises to economic loss.\u003c/h3\u003e\n          \u003cp\u003eA fault in one hex shows up as a measurable GVA dip in the same hex (M4). At ward scale this is noise. At hex scale it is a coefficient — and a budget argument the metro can defend.\u003c/p\u003e\n          \u003cdiv style=\"display:flex; gap:12px; margin-top:auto;\"\u003e\n            \u003cdiv class=\"num\" style=\"font-size:48px;\"\u003e1 hex\u003c/div\u003e\n            \u003cp style=\"font-size:13px; color:rgba(255,255,255,0.85); margin:0; align-self:flex-end;\"\u003eis the unit at which fault → GVA causality is identifiable\u003c/p\u003e\n          \u003c/div\u003e\n        \u003c/div\u003e\n      \u003c/div\u003e\n\n      \u003cdiv class=\"card warm\" style=\"margin-top:8px; padding:24px 32px;\"\u003e\n        \u003cspan class=\"tag\" style=\"color:var(--se-fg-strong);\"\u003eThe thesis in one line\u003c/span\u003e\n        \u003ch4 style=\"font-size:24px; margin-top:6px; max-width:1500px;\"\u003e\n          Wards tell you \u003cem style=\"color:var(--se-primary); font-style:normal;\"\u003ethat\u003c/em\u003e the economy moved. The ladder tells you \u003cem style=\"color:var(--se-primary); font-style:normal;\"\u003ewhere\u003c/em\u003e, \u003cem style=\"color:var(--se-primary); font-style:normal;\"\u003ewhy\u003c/em\u003e, and \u003cem style=\"color:var(--se-primary); font-style:normal;\"\u003eto whom\u003c/em\u003e.\n        \u003c/h4\u003e\n      \u003c/div\u003e\n    \u003c/div\u003e\n    \u003cdiv class=\"slide-footer\"\u003e\n      \u003cdiv class=\"brand\"\u003e\u003cimg src=\"f61d8b4db13044019d000e581229ea35\" alt=\"Spatial Economics\"\u003e\u003c/div\u003e\n      \u003cdiv\u003e10 · Hyperlocal · so what\u003c/div\u003e\n      \u003cdiv\u003e10 / 34\u003c/div\u003e\n    \u003c/div\u003e\n  \u003c/section\u003e\n\n  \u003c!-- 11 — Section 3 divider --\u003e\n  \u003csection class=\"slide section-divider\" data-screen-label=\"11 Section · Models\"\u003e\n    \u003cdiv class=\"slide-pad\"\u003e\n      \u003cdiv class=\"section-num\"\u003eSECTION 03 · 11 / 34\u003c/div\u003e\n      \u003ch2 class=\"section-title\"\u003eNineteen models.\u003cbr/\u003eOne panel.\u003c/h2\u003e\n      \u003cp class=\"section-subtitle\"\u003eM1 nowcasts the economy month by month. M2 measures complexity. M3 quantifies the apartheid spatial legacy. M4 links infrastructure to GVA. M5 measures resilience to named shocks. M6–M19 extend coverage to property, growth, land, trade, labour, climate, firms, fiscal health, inclusion, informal economy, and governance — every one of them reads from \u003cspan style=\"font-family:var(--se-font-mono);\"\u003ehex_panel\u003c/span\u003e and writes back into it.\u003c/p\u003e\n    \u003c/div\u003e\n  \u003c/section\u003e\n\n  \u003c!-- 12 — Nineteen models registry --\u003e\n  \u003csection class=\"slide compact-registry\" data-screen-label=\"12 Nineteen models grid\"\u003e\n    \u003cdiv class=\"slide-pad\"\u003e\n      \u003cheader class=\"slide-header\"\u003e\n        \u003cdiv\u003e\n          \u003cdiv class=\"slide-eyebrow\"\u003eThe model menu\u003c/div\u003e\n          \u003ch2 class=\"slide-title\" style=\"margin-top:14px;\"\u003eEach model answers one question. All nineteen share the panel.\u003c/h2\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"slide-section-tag\"\u003e§ 03 · Models\u003c/div\u003e\n      \u003c/header\u003e\n      \u003cdiv style=\"display:grid; grid-template-columns:repeat(5,1fr); gap:14px; flex:1;\"\u003e\n        \u003cdiv class=\"model-card\"\u003e\u003cdiv class=\"id\"\u003eM1 · NOWCASTING\u003c/div\u003e\u003ch4\u003eMonthly hex GVA\u003c/h4\u003e\u003cp\u003eProxy regression on FTE, electricity, water, nightlights — calibrated to ward GDP via Denton-Cholette.\u003c/p\u003e\u003cdiv class=\"out\"\u003e→ gva_estimated\u003c/div\u003e\u003c/div\u003e\n        \u003cdiv class=\"model-card\"\u003e\u003cdiv class=\"id\"\u003eM2 · COMPLEXITY\u003c/div\u003e\u003ch4\u003eHidalgo–Hausmann ECI\u003c/h4\u003e\u003cp\u003eRevealed comparative advantage and complexity at intra-city scale. First African application.\u003c/p\u003e\u003cdiv class=\"out\"\u003e→ eci · diversification\u003c/div\u003e\u003c/div\u003e\n        \u003cdiv class=\"model-card\"\u003e\u003cdiv class=\"id\"\u003eM3 · ACCESSIBILITY\u003c/div\u003e\u003ch4\u003eGravity job access\u003c/h4\u003e\u003cp\u003eThe apartheid spatial legacy as one index per hex. Gradient across former group areas is the headline.\u003c/p\u003e\u003cdiv class=\"out\"\u003e→ accessibility_index\u003c/div\u003e\u003c/div\u003e\n        \u003cdiv class=\"model-card\"\u003e\u003cdiv class=\"id\"\u003eM4 · INFRASTRUCTURE\u003c/div\u003e\u003ch4\u003eFault → GVA\u003c/h4\u003e\u003cp\u003ePanel regression of fault tickets and repair hours against GVA. Causal coefficient per fault hour.\u003c/p\u003e\u003cdiv class=\"out\"\u003e→ predicted_gva_loss\u003c/div\u003e\u003c/div\u003e\n        \u003cdiv class=\"model-card\"\u003e\u003cdiv class=\"id\"\u003eM5 · RESILIENCE\u003c/div\u003e\u003ch4\u003eShock recovery\u003c/h4\u003e\u003cp\u003eCOVID, KZN floods, July 2021 unrest, load-shedding. Resistance + recovery months per hex.\u003c/p\u003e\u003cdiv class=\"out\"\u003e→ resilience_score\u003c/div\u003e\u003c/div\u003e\n\n        \u003cdiv class=\"model-card\"\u003e\u003cdiv class=\"id\"\u003eM6 · HEDONIC\u003c/div\u003e\u003ch4\u003e16-year property model\u003c/h4\u003e\u003cp\u003eHedonic regression on the valuation roll — value vs amenity, access, infrastructure.\u003c/p\u003e\u003cdiv class=\"out\"\u003e→ value_premium\u003c/div\u003e\u003c/div\u003e\n        \u003cdiv class=\"model-card\"\u003e\u003cdiv class=\"id\"\u003eM7 · URBAN GROWTH\u003c/div\u003e\u003ch4\u003e50-year typology\u003c/h4\u003e\u003cp\u003eGHSL built-surface change (1975–2030) classified into growth typologies per hex.\u003c/p\u003e\u003cdiv class=\"out\"\u003e→ growth_typology\u003c/div\u003e\u003c/div\u003e\n        \u003cdiv class=\"model-card\"\u003e\u003cdiv class=\"id\"\u003eM8 · LAND ECONOMY\u003c/div\u003e\u003ch4\u003eSANLC transitions\u003c/h4\u003e\u003cp\u003eDominant land-use classification linked to economic outcomes (cropland → built, etc.).\u003c/p\u003e\u003cdiv class=\"out\"\u003e→ dominant_landuse\u003c/div\u003e\u003c/div\u003e\n        \u003cdiv class=\"model-card\"\u003e\u003cdiv class=\"id\"\u003eM9 · TRADE\u003c/div\u003e\u003ch4\u003eCustoms gravity\u003c/h4\u003e\u003cp\u003eSARS hex×SIC×country trade rolled into dependency and supply-chain risk per hex.\u003c/p\u003e\u003cdiv class=\"out\"\u003e→ trade_dependency · supply_chain_risk\u003c/div\u003e\u003c/div\u003e\n        \u003cdiv class=\"model-card\"\u003e\u003cdiv class=\"id\"\u003eM10 · LABOUR\u003c/div\u003e\u003ch4\u003eSpatial mismatch\u003c/h4\u003e\u003cp\u003eWhere the jobs are vs where the workers live. Mismatch + exclusion scores per hex.\u003c/p\u003e\u003cdiv class=\"out\"\u003e→ spatial_mismatch · exclusion\u003c/div\u003e\u003c/div\u003e\n\n        \u003cdiv class=\"model-card\"\u003e\u003cdiv class=\"id\"\u003eM11 · CLIMATE\u003c/div\u003e\u003ch4\u003eHazard exposure\u003c/h4\u003e\u003cp\u003eFlood, heat, sea-level risk overlaid with economic activity. Adaptation priority ranking.\u003c/p\u003e\u003cdiv class=\"out\"\u003e→ climate_risk · adaptation_priority\u003c/div\u003e\u003c/div\u003e\n        \u003cdiv class=\"model-card\"\u003e\u003cdiv class=\"id\"\u003eM12 · CGE / SAM\u003c/div\u003e\u003ch4\u003eSectoral SAM\u003c/h4\u003e\u003cp\u003eSEAD-SA-derived social accounting matrix. Sector ⇄ sector multipliers feeding scenario runs.\u003c/p\u003e\u003cdiv class=\"out\"\u003e→ sectoral multipliers\u003c/div\u003e\u003c/div\u003e\n        \u003cdiv class=\"model-card\"\u003e\u003cdiv class=\"id\"\u003eM13 · FIRMS\u003c/div\u003e\u003ch4\u003eFirm dynamics\u003c/h4\u003e\u003cp\u003eBirth, death, and entry rates by hex. Where the startup ecosystems are forming.\u003c/p\u003e\u003cdiv class=\"out\"\u003e→ startup_ecosystem · entry_rate\u003c/div\u003e\u003c/div\u003e\n        \u003cdiv class=\"model-card\"\u003e\u003cdiv class=\"id\"\u003eM14 · COMPOSITE\u003c/div\u003e\u003ch4\u003eIndex rollups\u003c/h4\u003e\u003cp\u003eCross-model composite indices for dashboard layers and the pilot package.\u003c/p\u003e\u003cdiv class=\"out\"\u003e→ composite layers\u003c/div\u003e\u003c/div\u003e\n        \u003cdiv class=\"model-card\"\u003e\u003cdiv class=\"id\"\u003eM15 · PULSE\u003c/div\u003e\u003ch4\u003eActivity nowcast\u003c/h4\u003e\u003cp\u003eHigh-frequency pulse from VIIRS + utilities. Anomaly flags when the city is off-trend.\u003c/p\u003e\u003cdiv class=\"out\"\u003e→ activity_index · anomaly_flag\u003c/div\u003e\u003c/div\u003e\n\n        \u003cdiv class=\"model-card\"\u003e\u003cdiv class=\"id\"\u003eM16 · FISCAL\u003c/div\u003e\u003ch4\u003eMunicipal health\u003c/h4\u003e\u003cp\u003eCouncil SDBIP and rates base. Liquidity, revenue mix, and capex execution at municipal level.\u003c/p\u003e\u003cdiv class=\"out\"\u003e→ fiscal scorecard\u003c/div\u003e\u003c/div\u003e\n        \u003cdiv class=\"model-card\"\u003e\u003cdiv class=\"id\"\u003eM17 · INEQUALITY\u003c/div\u003e\u003ch4\u003eInclusion index\u003c/h4\u003e\u003cp\u003eIncome, access, and service distribution across hexes. Who the economy is leaving behind.\u003c/p\u003e\u003cdiv class=\"out\"\u003e→ inclusion_index\u003c/div\u003e\u003c/div\u003e\n        \u003cdiv class=\"model-card\"\u003e\u003cdiv class=\"id\"\u003eM18 · INFORMAL\u003c/div\u003e\u003ch4\u003eInformal economy\u003c/h4\u003e\u003cp\u003eEstimates the informal share per hex and the formalisation potential.\u003c/p\u003e\u003cdiv class=\"out\"\u003e→ informal_share · formalisation\u003c/div\u003e\u003c/div\u003e\n        \u003cdiv class=\"model-card\"\u003e\u003cdiv class=\"id\"\u003eM19 · GOVERNANCE\u003c/div\u003e\u003ch4\u003eService delivery\u003c/h4\u003e\u003cp\u003eFaults, SDBIP, and council ops fused into a governance quality score.\u003c/p\u003e\u003cdiv class=\"out\"\u003e→ governance_quality · service_trend\u003c/div\u003e\u003c/div\u003e\n        \u003cdiv class=\"model-card\" style=\"background:linear-gradient(135deg, color-mix(in oklch, var(--se-primary) 12%, transparent), color-mix(in oklch, var(--se-primary) 4%, transparent)); border-color:color-mix(in oklch, var(--se-primary) 35%, var(--se-line)); justify-content:center;\"\u003e\u003cdiv class=\"id\" style=\"color:var(--se-primary);\"\u003eDEEP-DIVE →\u003c/div\u003e\u003ch4 style=\"color:var(--se-fg-strong);\"\u003eThree of nineteen\u003c/h4\u003e\u003cp\u003eThe next three slides go deep on M1 nowcasting, M3 accessibility, M5 resilience — then a tour of the other sixteen.\u003c/p\u003e\u003c/div\u003e\n      \u003c/div\u003e\n    \u003c/div\u003e\n    \u003cdiv class=\"slide-footer\"\u003e\n      \u003cdiv class=\"brand\"\u003e\u003cimg src=\"f61d8b4db13044019d000e581229ea35\" alt=\"Spatial Economics\"\u003e\u003c/div\u003e\n      \u003cdiv\u003e12 · Nineteen models\u003c/div\u003e\n      \u003cdiv\u003e12 / 34\u003c/div\u003e\n    \u003c/div\u003e\n  \u003c/section\u003e\n\n  \u003c!-- 13 — M1 --\u003e\n  \u003csection class=\"slide\" data-screen-label=\"13 M1 Nowcasting\"\u003e\n    \u003cdiv class=\"slide-pad\"\u003e\n      \u003cheader class=\"slide-header\"\u003e\n        \u003cdiv\u003e\n          \u003cdiv class=\"slide-eyebrow\"\u003eM1 · Nowcasting\u003c/div\u003e\n          \u003ch2 class=\"slide-title\" style=\"margin-top:14px;\"\u003eMunicipal GDPNow — every hex, every month.\u003c/h2\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"slide-section-tag\"\u003e§ 03 · Models\u003c/div\u003e\n      \u003c/header\u003e\n      \u003cdiv class=\"grid-2\" style=\"gap:40px; flex:1;\"\u003e\n        \u003cdiv style=\"display:flex; flex-direction:column; gap:20px;\"\u003e\n          \u003cp class=\"slide-lead\"\u003eNational GDP arrives quarterly with a six-week lag. Our nowcaster produces a hex-level GVA estimate every month, calibrated to the ward GDP pipeline so totals reconcile.\u003c/p\u003e\n          \u003cdiv class=\"card soft\"\u003e\n            \u003cspan class=\"tag\"\u003eMethod\u003c/span\u003e\n            \u003ch4\u003eProxy regression → Denton-Cholette\u003c/h4\u003e\n            \u003cp\u003eStep 1 — fit log-GVA against FTE, electricity, water, and nightlight intensity at the hex level on a calibration window. Step 2 — Denton-Cholette temporal disaggregation reconciles the monthly hex series back to the ward-quarter GDP target.\u003c/p\u003e\n          \u003c/div\u003e\n          \u003cdiv class=\"grid-2\" style=\"gap:16px;\"\u003e\n            \u003cdiv class=\"card\"\u003e\u003cspan class=\"tag\"\u003eInputs\u003c/span\u003e\u003cp style=\"font-family:var(--se-font-mono); font-size:13px; line-height:1.5;\"\u003efte · elec_kwh ·\u003cbr/\u003ewater_kl · nightlight_mean\u003c/p\u003e\u003c/div\u003e\n            \u003cdiv class=\"card\"\u003e\u003cspan class=\"tag\"\u003eOutput\u003c/span\u003e\u003cp style=\"font-family:var(--se-font-mono); font-size:13px; line-height:1.5;\"\u003egva_estimated\u003cbr/\u003e(R · monthly · per hex)\u003c/p\u003e\u003c/div\u003e\n            \u003cdiv class=\"card\"\u003e\u003cspan class=\"tag\"\u003eCalibration\u003c/span\u003e\u003cp style=\"font-family:var(--se-font-mono); font-size:13px; line-height:1.5;\"\u003eWard GDP pipeline\u003cbr/\u003e2014–Feb 2026\u003c/p\u003e\u003c/div\u003e\n            \u003cdiv class=\"card\"\u003e\u003cspan class=\"tag\"\u003eValidation\u003c/span\u003e\u003cp style=\"font-family:var(--se-font-mono); font-size:13px; line-height:1.5;\"\u003e∑hex_gva ≈ ward_gdp\u003cbr/\u003er \u0026gt; 0.95 (target)\u003c/p\u003e\u003c/div\u003e\n          \u003c/div\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"card\" style=\"padding:0; overflow:hidden;\"\u003e\n          \u003cdiv style=\"padding: 24px 28px; border-bottom:1px solid var(--se-line);\"\u003e\n            \u003cdiv class=\"cap\"\u003eIllustrative · monthly hex-level GVA (Berea ward sample)\u003c/div\u003e\n            \u003ch4 style=\"margin-top:6px;\"\u003eNowcast vs ward target\u003c/h4\u003e\n          \u003c/div\u003e\n          \u003csvg viewBox=\"0 0 700 380\" wi
