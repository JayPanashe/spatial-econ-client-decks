 monospace\" font-size=\"9\" fill=\"#2F8FE3\" text-anchor=\"middle\"\u003eFLOODS\u003c/text\u003e\n            \u003cpath d=\"M60,210 L100,200 L140,196 L180,190 L220,180 L260,170 L300,162 L332,160 L354,210 L390,180 L408,200 L422,170 L442,210 L456,180 L500,165 L540,150 L580,140 L620,130 L660,122 L680,118\"\n                  fill=\"none\" stroke=\"#0F1525\" stroke-width=\"3\" stroke-linecap=\"round\"/\u003e\n            \u003cpath d=\"M60,212 L80,208 L100,202 L120,206 L140,196 L160,200 L180,188 L200,194 L220,178 L240,184 L260,168 L280,176 L300,160 L320,166 L332,158 L344,200 L354,212 L370,188 L390,178 L400,194 L408,202 L416,176 L422,168 L432,200 L442,212 L450,188 L460,178 L478,170 L500,164 L520,154 L540,148 L560,144 L580,138 L600,134 L620,128 L640,124 L660,120 L680,116\"\n                  fill=\"none\" stroke=\"#594AE3\" stroke-width=\"2\" stroke-linecap=\"round\"/\u003e\n            \u003cg font-family=\"Cascadia Mono, Consolas, monospace\" font-size=\"11\"\u003e\n              \u003cline x1=\"500\" y1=\"364\" x2=\"520\" y2=\"364\" stroke=\"#0F1525\" stroke-width=\"3\"/\u003e\n              \u003ctext x=\"526\" y=\"368\" fill=\"#3A4256\"\u003eWard GDP (target)\u003c/text\u003e\n              \u003cline x1=\"620\" y1=\"364\" x2=\"640\" y2=\"364\" stroke=\"#594AE3\" stroke-width=\"2\"/\u003e\n              \u003ctext x=\"646\" y=\"368\" fill=\"#3A4256\"\u003eHex nowcast (∑)\u003c/text\u003e\n            \u003c/g\u003e\n          \u003c/svg\u003e\n          \u003cdiv class=\"cap\" style=\"padding: 12px 28px 20px;\"\u003eIllustrative chart based on the modelled relationship — replace with real ward output once exported.\u003c/div\u003e\n        \u003c/div\u003e\n      \u003c/div\u003e\n    \u003c/div\u003e\n    \u003cdiv class=\"slide-footer\"\u003e\n      \u003cdiv class=\"brand\"\u003e\u003cimg src=\"f61d8b4db13044019d000e581229ea35\" alt=\"Spatial Economics\"\u003e\u003c/div\u003e\n      \u003cdiv\u003e13 · M1 Nowcasting\u003c/div\u003e\n      \u003cdiv\u003e13 / 34\u003c/div\u003e\n    \u003c/div\u003e\n  \u003c/section\u003e\n\n  \u003c!-- 14 — M3 --\u003e\n  \u003csection class=\"slide\" data-screen-label=\"14 M3 Accessibility\"\u003e\n    \u003cdiv class=\"slide-pad\"\u003e\n      \u003cheader class=\"slide-header\"\u003e\n        \u003cdiv\u003e\n          \u003cdiv class=\"slide-eyebrow\"\u003eM3 · Accessibility\u003c/div\u003e\n          \u003ch2 class=\"slide-title\" style=\"margin-top:14px;\"\u003eA single number for the apartheid spatial legacy.\u003c/h2\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"slide-section-tag\"\u003e§ 03 · Models\u003c/div\u003e\n      \u003c/header\u003e\n      \u003cdiv class=\"grid-2\" style=\"gap:40px; flex:1;\"\u003e\n        \u003cdiv style=\"display:flex; flex-direction:column; gap:20px;\"\u003e\n          \u003cp class=\"slide-lead\"\u003eA gravity-based job accessibility index per hex — the weighted sum of every other hex's employment count, discounted by travel time. Numbers are interesting; the gradient across former group areas is the headline.\u003c/p\u003e\n          \u003cdiv class=\"card warm\"\u003e\n            \u003cspan class=\"tag\" style=\"color:var(--se-fg-strong);\"\u003ePull quote\u003c/span\u003e\n            \u003cp class=\"pull\" style=\"font-size:30px;\"\u003eTwo hexes 14 km apart. One sits at index 0.84 — within reach of half the metro's employment. The other sits at 0.21. The line between them was drawn in 1950.\u003c/p\u003e\n          \u003c/div\u003e\n          \u003cdiv class=\"kv\"\u003e\n            \u003cdt\u003eMethod\u003c/dt\u003e\u003cdd\u003eGravity model · accessibility = Σⱼ employment_j · f(travel_time_ij)\u003c/dd\u003e\n            \u003cdt\u003eDecay function\u003c/dt\u003e\u003cdd\u003eNegative exponential, β calibrated against revealed commute distances\u003c/dd\u003e\n            \u003cdt\u003eInput network\u003c/dt\u003e\u003cdd\u003eOSM road network · public transport schedules where available\u003c/dd\u003e\n            \u003cdt\u003eOutput range\u003c/dt\u003e\u003cdd\u003e0–1 normalised across the 429 hexes\u003c/dd\u003e\n          \u003c/div\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"card\" style=\"padding:0; overflow:hidden;\"\u003e\n          \u003cdiv style=\"padding: 24px 28px; border-bottom:1px solid var(--se-line);\"\u003e\n            \u003cdiv class=\"cap\"\u003eIllustrative · accessibility deciles\u003c/div\u003e\n            \u003ch4 style=\"margin-top:6px;\"\u003eSample hexes ranked low → high\u003c/h4\u003e\n          \u003c/div\u003e\n          \u003cdiv style=\"padding:24px 28px; display:flex; flex-direction:column; gap:14px;\"\u003e\n            \u003cdiv class=\"row-list\"\u003e\n              \u003cdiv class=\"r\"\u003e\u003cspan class=\"lbl\"\u003eD10 · CBD\u003c/span\u003e\u003cdiv class=\"bar\"\u003e\u003ci style=\"width:92%; background:#594AE3;\"\u003e\u003c/i\u003e\u003c/div\u003e\u003cspan class=\"v\"\u003e0.84\u003c/span\u003e\u003c/div\u003e\n              \u003cdiv class=\"r\"\u003e\u003cspan class=\"lbl\"\u003eD9 · Berea\u003c/span\u003e\u003cdiv class=\"bar\"\u003e\u003ci style=\"width:84%; background:#594AE3;\"\u003e\u003c/i\u003e\u003c/div\u003e\u003cspan class=\"v\"\u003e0.78\u003c/span\u003e\u003c/div\u003e\n              \u003cdiv class=\"r\"\u003e\u003cspan class=\"lbl\"\u003eD8 · Umhlanga\u003c/span\u003e\u003cdiv class=\"bar\"\u003e\u003ci style=\"width:76%; background:#7064E8;\"\u003e\u003c/i\u003e\u003c/div\u003e\u003cspan class=\"v\"\u003e0.71\u003c/span\u003e\u003c/div\u003e\n              \u003cdiv class=\"r\"\u003e\u003cspan class=\"lbl\"\u003eD7 · Pinetown\u003c/span\u003e\u003cdiv class=\"bar\"\u003e\u003ci style=\"width:64%; background:#8A80EE;\"\u003e\u003c/i\u003e\u003c/div\u003e\u003cspan class=\"v\"\u003e0.59\u003c/span\u003e\u003c/div\u003e\n              \u003cdiv class=\"r\"\u003e\u003cspan class=\"lbl\"\u003eD5 · Phoenix\u003c/span\u003e\u003cdiv class=\"bar\"\u003e\u003ci style=\"width:46%; background:#A8A0F2;\"\u003e\u003c/i\u003e\u003c/div\u003e\u003cspan class=\"v\"\u003e0.43\u003c/span\u003e\u003c/div\u003e\n              \u003cdiv class=\"r\"\u003e\u003cspan class=\"lbl\"\u003eD3 · Inanda\u003c/span\u003e\u003cdiv class=\"bar\"\u003e\u003ci style=\"width:30%; background:#C5C0F6;\"\u003e\u003c/i\u003e\u003c/div\u003e\u003cspan class=\"v\"\u003e0.28\u003c/span\u003e\u003c/div\u003e\n              \u003cdiv class=\"r\"\u003e\u003cspan class=\"lbl\"\u003eD2 · KwaMashu\u003c/span\u003e\u003cdiv class=\"bar\"\u003e\u003ci style=\"width:24%; background:#D8D5F8;\"\u003e\u003c/i\u003e\u003c/div\u003e\u003cspan class=\"v\"\u003e0.21\u003c/span\u003e\u003c/div\u003e\n              \u003cdiv class=\"r\"\u003e\u003cspan class=\"lbl\"\u003eD1 · Umzinto\u003c/span\u003e\u003cdiv class=\"bar\"\u003e\u003ci style=\"width:14%; background:#E5E3FB;\"\u003e\u003c/i\u003e\u003c/div\u003e\u003cspan class=\"v\"\u003e0.12\u003c/span\u003e\u003c/div\u003e\n            \u003c/div\u003e\n            \u003cdiv class=\"cap\"\u003eIllustrative ranking — replace with the actual hex export from \u003cspan style=\"color:var(--se-primary);\"\u003eaccessibility_index\u003c/span\u003e.\u003c/div\u003e\n          \u003c/div\u003e\n        \u003c/div\u003e\n      \u003c/div\u003e\n    \u003c/div\u003e\n    \u003cdiv class=\"slide-footer\"\u003e\n      \u003cdiv class=\"brand\"\u003e\u003cimg src=\"f61d8b4db13044019d000e581229ea35\" alt=\"Spatial Economics\"\u003e\u003c/div\u003e\n      \u003cdiv\u003e14 · M3 Accessibility\u003c/div\u003e\n      \u003cdiv\u003e14 / 34\u003c/div\u003e\n    \u003c/div\u003e\n  \u003c/section\u003e\n\n  \u003c!-- 15 — M5 --\u003e\n  \u003csection class=\"slide\" data-screen-label=\"15 M5 Resilience\"\u003e\n    \u003cdiv class=\"slide-pad\"\u003e\n      \u003cheader class=\"slide-header\"\u003e\n        \u003cdiv\u003e\n          \u003cdiv class=\"slide-eyebrow\"\u003eM5 · Resilience\u003c/div\u003e\n          \u003ch2 class=\"slide-title\" style=\"margin-top:14px;\"\u003eThree named shocks. Resistance and recovery, per hex.\u003c/h2\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"slide-section-tag\"\u003e§ 03 · Models\u003c/div\u003e\n      \u003c/header\u003e\n      \u003cdiv class=\"grid-3\" style=\"gap:24px;\"\u003e\n        \u003cdiv class=\"card\"\u003e\u003cspan class=\"tag\" style=\"color:#D5436A;\"\u003eShock 01\u003c/span\u003e\u003ch3\u003eCOVID-19\u003c/h3\u003e\u003cp\u003eLockdown peak: Q2 2020. Differential resistance varied by sector mix; hospitality hexes dropped \u0026gt;30%, light-industrial dropped ~12%.\u003c/p\u003e\u003cdiv class=\"cap\" style=\"margin-top:auto;\"\u003eWindow · 2020-03 → 2021-12\u003c/div\u003e\u003c/div\u003e\n        \u003cdiv class=\"card\"\u003e\u003cspan class=\"tag\" style=\"color:#E5A33C;\"\u003eShock 02\u003c/span\u003e\u003ch3\u003eJuly 2021 unrest\u003c/h3\u003e\u003cp\u003eConcentrated, severe, recoverable. Retail and warehousing hexes along the N3 corridor took the largest hit.\u003c/p\u003e\u003cdiv class=\"cap\" style=\"margin-top:auto;\"\u003eWindow · 2021-07 → 2022-06\u003c/div\u003e\u003c/div\u003e\n        \u003cdiv class=\"card\"\u003e\u003cspan class=\"tag\" style=\"color:#2F8FE3;\"\u003eShock 03\u003c/span\u003e\u003ch3\u003eKZN floods · 2022\u003c/h3\u003e\u003cp\u003eSpatially concentrated along low-lying corridors. Infrastructure damage drives a multi-month tail in faults and recovery.\u003c/p\u003e\u003cdiv class=\"cap\" style=\"margin-top:auto;\"\u003eWindow · 2022-04 → 2023-03\u003c/div\u003e\u003c/div\u003e\n      \u003c/div\u003e\n\n      \u003cdiv class=\"grid-2\" style=\"gap:32px; flex:1;\"\u003e\n        \u003cdiv class=\"card soft\"\u003e\n          \u003cspan class=\"tag\"\u003eDefinition\u003c/span\u003e\n          \u003ch4\u003eResistance\u003c/h4\u003e\n          \u003cp\u003eThe depth of the GVA drop relative to the pre-shock baseline. Measured as \u003cspan style=\"font-family:var(--se-font-mono); color:var(--se-primary);\"\u003e1 − min(gva_t)/baseline\u003c/span\u003e. Lower is better.\u003c/p\u003e\n          \u003cdiv style=\"display:flex; gap:24px; margin-top:14px;\"\u003e\n            \u003cdiv class=\"bigstat\" style=\"padding:0;\"\u003e\u003cdiv class=\"v\"\u003e0.18\u003c/div\u003e\u003cdiv class=\"l\"\u003eMedian resistance · post-COVID hexes\u003c/div\u003e\u003c/div\u003e\n            \u003cdiv class=\"bigstat\" style=\"padding:0;\"\u003e\u003cdiv class=\"v\"\u003e0.34\u003c/div\u003e\u003cdiv class=\"l\"\u003eWorst-decile resistance\u003c/div\u003e\u003c/div\u003e\n          \u003c/div\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"card soft\"\u003e\n          \u003cspan class=\"tag\"\u003eDefinition\u003c/span\u003e\n          \u003ch4\u003eRecovery\u003c/h4\u003e\n          \u003cp\u003eMonths to return to within ±2% of the pre-shock baseline. Measured per hex per shock; varies dramatically across the metro.\u003c/p\u003e\n          \u003cdiv style=\"display:flex; gap:24px; margin-top:14px;\"\u003e\n            \u003cdiv class=\"bigstat\" style=\"padding:0;\"\u003e\u003cdiv class=\"v\"\u003e11\u003csmall style=\"font-size:24px;color:var(--se-fg-3);\"\u003emo\u003c/small\u003e\u003c/div\u003e\u003cdiv class=\"l\"\u003eMedian recovery · CBD hexes\u003c/div\u003e\u003c/div\u003e\n            \u003cdiv class=\"bigstat\" style=\"padding:0;\"\u003e\u003cdiv class=\"v\"\u003e21\u003csmall style=\"font-size:24px;color:var(--se-fg-3);\"\u003emo\u003c/small\u003e\u003c/div\u003e\u003cdiv class=\"l\"\u003eMedian recovery · low-accessibility hexes\u003c/div\u003e\u003c/div\u003e\n          \u003c/div\u003e\n        \u003c/div\u003e\n      \u003c/div\u003e\n      \u003cdiv class=\"cap\"\u003eNumbers above are illustrative defaults. Replace with hex_panel exports once production validation passes.\u003c/div\u003e\n    \u003c/div\u003e\n    \u003cdiv class=\"slide-footer\"\u003e\n      \u003cdiv class=\"brand\"\u003e\u003cimg src=\"f61d8b4db13044019d000e581229ea35\" alt=\"Spatial Economics\"\u003e\u003c/div\u003e\n      \u003cdiv\u003e15 · M5 Resilience\u003c/div\u003e\n      \u003cdiv\u003e15 / 34\u003c/div\u003e\n    \u003c/div\u003e\n  \u003c/section\u003e\n\n  \u003c!-- 16 — The other sixteen models --\u003e\n  \u003csection class=\"slide\" data-screen-label=\"16 The other sixteen\"\u003e\n    \u003cdiv class=\"slide-pad\"\u003e\n      \u003cheader class=\"slide-header\"\u003e\n        \u003cdiv\u003e\n          \u003cdiv class=\"slide-eyebrow\"\u003eM6 · M7 · M8 · M9 · M10 · M11 · M12 · M13 · M14 · M15 · M16 · M17 · M18 · M19\u003c/div\u003e\n          \u003ch2 class=\"slide-title\" style=\"margin-top:14px;\"\u003eThe other sixteen — grouped by what they answer.\u003c/h2\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"slide-section-tag\"\u003e§ 03 · Models\u003c/div\u003e\n      \u003c/header\u003e\n      \u003cdiv class=\"grid-4\" style=\"gap:20px; flex:1;\"\u003e\n\n        \u003cdiv class=\"card\"\u003e\n          \u003cspan class=\"tag\"\u003ePlace \u0026amp; growth\u003c/span\u003e\n          \u003ch3\u003eHow the city is built and changing.\u003c/h3\u003e\n          \u003cul style=\"list-style:none; padding:0; margin:14px 0 0 0; display:flex; flex-direction:column; gap:10px; font-size:13.5px; line-height:1.45;\"\u003e\n            \u003cli\u003e\u003cstrong style=\"font-family:var(--se-font-mono); color:var(--se-primary);\"\u003eM6\u003c/strong\u003e \u0026nbsp;Hedonic property — 16-year valuation roll → \u003cspan style=\"color:var(--se-fg-3);\"\u003evalue_premium\u003c/span\u003e\u003c/li\u003e\n            \u003cli\u003e\u003cstrong style=\"font-family:var(--se-font-mono); color:var(--se-primary);\"\u003eM7\u003c/strong\u003e \u0026nbsp;Urban growth — 50-year GHSL → \u003cspan style=\"color:var(--se-fg-3);\"\u003egrowth_typology\u003c/span\u003e\u003c/li\u003e\n            \u003cli\u003e\u003cstrong style=\"font-family:var(--se-font-mono); color:var(--se-primary);\"\u003eM8\u003c/strong\u003e \u0026nbsp;Land economy — SANLC → \u003cspan style=\"color:var(--se-fg-3);\"\u003edominant_landuse\u003c/span\u003e\u003c/li\u003e\n            \u003cli\u003e\u003cstrong style=\"font-family:var(--se-font-mono); color:var(--se-primary);\"\u003eM14\u003c/strong\u003e\u0026nbsp;Composite — cross-model index rollups\u003c/li\u003e\n          \u003c/ul\u003e\n        \u003c/div\u003e\n\n        \u003cdiv class=\"card\"\u003e\n          \u003cspan class=\"tag\"\u003eFlows \u0026amp; markets\u003c/span\u003e\n          \u003ch3\u003eWhat moves through the city.\u003c/h3\u003e\n          \u003cul style=\"list-style:none; padding:0; margin:14px 0 0 0; display:flex; flex-direction:column; gap:10px; font-size:13.5px; line-height:1.45;\"\u003e\n            \u003cli\u003e\u003cstrong style=\"font-family:var(--se-font-mono); color:var(--se-primary);\"\u003eM9\u003c/strong\u003e \u0026nbsp;Trade gravity — SARS hex × SIC × country → \u003cspan style=\"color:var(--se-fg-3);\"\u003etrade_dependency\u003c/span\u003e\u003c/li\u003e\n            \u003cli\u003e\u003cstrong style=\"font-family:var(--se-font-mono); color:var(--se-primary);\"\u003eM12\u003c/strong\u003e\u0026nbsp;CGE / SAM — sector multipliers driving scenario runs\u003c/li\u003e\n            \u003cli\u003e\u003cstrong style=\"font-family:var(--se-font-mono); color:var(--se-primary);\"\u003eM13\u003c/strong\u003e\u0026nbsp;Firm dynamics — birth, death, entry → \u003cspan style=\"color:var(--se-fg-3);\"\u003estartup_ecosystem\u003c/span\u003e\u003c/li\u003e\n            \u003cli\u003e\u003cstrong style=\"font-family:var(--se-font-mono); color:var(--se-primary);\"\u003eM18\u003c/strong\u003e\u0026nbsp;Informal economy — share per hex → \u003cspan style=\"color:var(--se-fg-3);\"\u003einformal_share\u003c/span\u003e\u003c/li\u003e\n          \u003c/ul\u003e\n        \u003c/div\u003e\n\n        \u003cdiv class=\"card\"\u003e\n          \u003cspan class=\"tag\"\u003eShocks \u0026amp; spillovers\u003c/span\u003e\n          \u003ch3\u003eWhat knocks the economy off-trend.\u003c/h3\u003e\n          \u003cul style=\"list-style:none; padding:0; margin:14px 0 0 0; display:flex; flex-direction:column; gap:10px; font-size:13.5px; line-height:1.45;\"\u003e\n            \u003cli\u003e\u003cstrong style=\"font-family:var(--se-font-mono); color:var(--se-primary);\"\u003eM10\u003c/strong\u003e\u0026nbsp;Labour mismatch — jobs vs workers → \u003cspan style=\"color:var(--se-fg-3);\"\u003espatial_mismatch\u003c/span\u003e\u003c/li\u003e\n            \u003cli\u003e\u003cstrong style=\"font-family:var(--se-font-mono); color:var(--se-primary);\"\u003eM11\u003c/strong\u003e\u0026nbsp;Climate risk — flood, heat, sea-level → \u003cspan style=\"color:var(--se-fg-3);\"\u003eclimate_risk\u003c/span\u003e\u003c/li\u003e\n            \u003cli\u003e\u003cstrong style=\"font-family:var(--se-font-mono); color:var(--se-primary);\"\u003eM15\u003c/strong\u003e\u0026nbsp;Pulse — VIIRS+utilities anomaly flags → \u003cspan style=\"color:var(--se-fg-3);\"\u003eactivity_index\u003c/span\u003e\u003c/li\u003e\n          \u003c/ul\u003e\n        \u003c/div\u003e\n\n        \u003cdiv class=\"card\"\u003e\n          \u003cspan class=\"tag\"\u003eDistribution \u0026amp; institutions\u003c/span\u003e\n          \u003ch3\u003eWho is being served, and how well.\u003c/h3\u003e\n          \u003cul style=\"list-style:none; padding:0; margin:14px 0 0 0; display:flex; flex-direction:column; gap:10px; font-size:13.5px; line-height:1.45;\"\u003e\n            \u003cli\u003e\u003cstrong style=\"font-family:var(--se-font-mono); color:var(--se-primary);\"\u003eM16\u003c/strong\u003e\u0026nbsp;Fiscal health — SDBIP, rates base → municipal scorecard\u003c/li\u003e\n            \u003cli\u003e\u003cstrong style=\"font-family:var(--se-font-mono); color:var(--se-primary);\"\u003eM17\u003c/strong\u003e\u0026nbsp;Inclusion — income / service distribution → \u003cspan style=\"color:var(--se-fg-3);\"\u003einclusion_index\u003c/span\u003e\u003c/li\u003e\n            \u003cli\u003e\u003cstrong style=\"font-family:var(--se-font-mono); color:var(--se-primary);\"\u003eM19\u003c/strong\u003e\u0026nbsp;Governance — faults + ops fused → \u003cspan style=\"color:var(--se-fg-3);\"\u003egovernance_quality\u003c/span\u003e\u003c/li\u003e\n          \u003c/ul\u003e\n        \u003c/div\u003e\n\n      \u003c/div\u003e\n      \u003cp class=\"slide-lead\" style=\"margin-top:0;\"\u003eAll sixteen read from \u003cspan style=\"font-family:var(--se-font-mono);\"\u003ehex_panel\u003c/span\u003e and write back into it. M12 SAM, M14 composite, and M16 fiscal write municipality-scoped rollups instead of hex columns — they consume the panel rather than extend it.\u003c/p\u003e\n    \u003c/div\u003e\n    \u003cdiv class=\"slide-footer\"\u003e\n      \u003cdiv class=\"brand\"\u003e\u003cimg src=\"f61d8b4db13044019d000e581229ea35\" alt=\"Spatial Economics\"\u003e\u003c/div\u003e\n      \u003cdiv\u003e16 · The other sixteen\u003c/div\u003e\n      \u003cdiv\u003e16 / 34\u003c/div\u003e\n    \u003c/div\u003e\n  \u003c/section\u003e\n\n  \u003c!-- 17 — Validation --\u003e\n  \u003csection class=\"slide\" data-screen-label=\"17 Validation\"\u003e\n    \u003cdiv class=\"slide-pad\"\u003e\n      \u003cheader class=\"slide-header\"\u003e\n        \u003cdiv\u003e\n          \u003cdiv class=\"slide-eyebrow\"\u003eValidation\u003c/div\u003e\n          \u003ch2 class=\"slide-title\" style=\"margin-top:14px;\"\u003eSix checks. Run on every build. Fail loud.\u003c/h2\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"slide-section-tag\"\u003e§ 03 · Models\u003c/div\u003e\n      \u003c/header\u003e\n      \u003cdiv class=\"grid-2\" style=\"gap:32px;\"\u003e\n        \u003cdiv class=\"card soft\"\u003e\n          \u003cspan class=\"tag\"\u003eWhy programmatic\u003c/span\u003e\n          \u003ch4\u003eFace validity, automated\u003c/h4\u003e\n          \u003cp\u003e\"Industrial-zone hexes have higher ECI\" should be true every build. We don't trust ourselves to remember to check — the test harness does it on every model run, in CI, and blocks deploy on regression.\u003c/p\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"card warm\"\u003e\n          \u003cspan class=\"tag\" style=\"color:var(--se-fg-strong);\"\u003eTest surface\u003c/span\u003e\n          \u003ch4\u003e1,059 tests · 6 cross-model checks\u003c/h4\u003e\n          \u003cp\u003eUnit tests for utilities and individual models, integration tests for the pipeline, and a validation suite that exercises the cross-model relationships specifically.\u003c/p\u003e\n        \u003c/div\u003e\n      \u003c/div\u003e\n      \u003ctable class=\"spec\" style=\"margin-top:8px;\"\u003e\n        \u003cthead\u003e\n          \u003ctr\u003e\u003cth style=\"width:80px;\"\u003e#\u003c/th\u003e\u003cth\u003eCheck\u003c/th\u003e\u003cth\u003eMethod\u003c/th\u003e\u003cth\u003eTolerance\u003c/th\u003e\u003c/tr\u003e\n        \u003c/thead\u003e\n        \u003ctbody\u003e\n          \u003ctr\u003e\u003ctd class=\"mono\"\u003e\u003cspan class=\"badge\"\u003eV1\u003c/span\u003e\u003c/td\u003e\u003ctd\u003e\u003cstrong\u003eM1 aggregation\u003c/strong\u003e\u003cdiv class=\"cap\" style=\"margin-top:4px;\"\u003eHex nowcasts roll up to ward GDP\u003c/div\u003e\u003c/td\u003e\u003ctd\u003e∑hex_gva by ward, correlate against ward-GDP target series\u003c/td\u003e\u003ctd class=\"mono\"\u003er \u0026gt; 0.95\u003c/td\u003e\u003c/tr\u003e\n          \u003ctr\u003e\u003ctd class=\"mono\"\u003e\u003cspan class=\"badge\"\u003eV2\u003c/span\u003e\u003c/td\u003e\u003ctd\u003e\u003cstrong\u003eM2 face validity\u003c/strong\u003e\u003cdiv class=\"cap\" style=\"margin-top:4px;\"\u003eIndustrial hexes have higher ECI\u003c/div\u003e\u003c/td\u003e\u003ctd\u003eCompare ECI distribution in industrial-zoned hexes vs metro median\u003c/td\u003e\u003ctd class=\"mono\"\u003e∆ \u0026gt; 1σ\u003c/td\u003e\u003c/tr\u003e\n          \u003ctr\u003e\u003ctd class=\"mono\"\u003e\u003cspan class=\"badge\"\u003eV3\u003c/span\u003e\u003c/td\u003e\u003ctd\u003e\u003cstrong\u003eM3 income correlation\u003c/strong\u003e\u003cdiv class=\"cap\" style=\"margin-top:4px;\"\u003eAccessibility tracks employment\u003c/div\u003e\u003c/td\u003e\u003ctd\u003eaccessibility_index vs FTE per hex\u003c/td\u003e\u003ctd class=\"mono\"\u003er \u0026gt; 0.55\u003c/td\u003e\u003c/tr\u003e\n          \u003ctr\u003e\u003ctd class=\"mono\"\u003e\u003cspan class=\"badge\"\u003eV4\u003c/span\u003e\u003c/td\u003e\u003ctd\u003e\u003cstrong\u003eM5 shock visibility\u003c/strong\u003e\u003cdiv class=\"cap\" style=\"margin-top:4px;\"\u003eUnrest months show measurable GVA drop\u003c/div\u003e\u003c/td\u003e\u003ctd\u003eJuly 2021 vs same-month-prior-year, paired hex test\u003c/td\u003e\u003ctd class=\"mono\"\u003edrop ≥ 5%\u003c/td\u003e\u003c/tr\u003e\n          \u003ctr\u003e\u003ctd class=\"mono\"\u003e\u003cspan class=\"badge\"\u003eV5\u003c/span\u003e\u003c/td\u003e\u003ctd\u003e\u003cstrong\u003eM7 typology diversity\u003c/strong\u003e\u003cdiv class=\"cap\" style=\"margin-top:4px;\"\u003eGrowth classification produces ≥3 distinct types\u003c/div\u003e\u003c/td\u003e\u003ctd\u003eDistinct growth typology values across 429 hexes\u003c/td\u003e\u003ctd class=\"mono\"\u003e≥ 3\u003c/td\u003e\u003c/tr\u003e\n          \u003ctr\u003e\u003ctd class=\"mono\"\u003e\u003cspan class=\"badge\"\u003eV6\u003c/span\u003e\u003c/td\u003e\u003ctd\u003e\u003cstrong\u003eCross-model consistency\u003c/strong\u003e\u003cdiv class=\"cap\" style=\"margin-top:4px;\"\u003eGVA correlates with ECI and accessibility\u003c/div\u003e\u003c/td\u003e\u003ctd\u003ePairwise correlation matrix across primary outputs\u003c/td\u003e\u003ctd class=\"mono\"\u003er \u0026gt; 0.4\u003c/td\u003e\u003c/tr\u003e\n        \u003c/tbody\u003e\n      \u003c/table\u003e\n    \u003c/div\u003e\n    \u003cdiv class=\"slide-footer\"\u003e\n      \u003cdiv class=\"brand\"\u003e\u003cimg src=\"f61d8b4db13044019d000e581229ea35\" alt=\"Spatial Economics\"\u003e\u003c/div\u003e\n      \u003cdiv\u003e17 · Validation\u003c/div\u003e\n      \u003cdiv\u003e17 / 34\u003c/div\u003e\n    \u003c/div\u003e\n  \u003c/section\u003e\n\n  \u003c!-- 18 — Section 4 divider --\u003e\n  \u003csection class=\"slide section-divider\" data-screen-label=\"18 Section · Surface\"\u003e\n    \u003cdiv class=\"slide-pad\"\u003e\n      \u003cdiv class=\"section-num\"\u003eSECTION 04 · 18 / 34\u003c/div\u003e\n      \u003ch2 class=\"section-title\"\u003eWhat you'll\u003cbr/\u003etouch.\u003c/h2\u003e\n      \u003cp class=\"section-subtitle\"\u003eThe dashboard, the Econometric Lab, and the API are the surfaces you'll use day-to-day. Everything else is plumbing.\u003c/p\u003e\n    \u003c/div\u003e\n  \u003c/section\u003e\n\n  \u003c!-- 19 — Dashboard --\u003e\n  \u003csection class=\"slide\" data-screen-label=\"19 Dashboard\"\u003e\n    \u003cdiv class=\"slide-pad\"\u003e\n      \u003cheader class=\"slide-header\"\u003e\n        \u003cdiv\u003e\n          \u003cdiv class=\"slide-eyebrow\"\u003eThe dashboard\u003c/div\u003e\n          \u003ch2 class=\"slide-title\" style=\"margin-top:14px;\"\u003eEvery column on the panel. 146 months. Two clicks to the answer.\u003c/h2\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"slide-section-tag\"\u003e§ 04 · Surface\u003c/div\u003e\n      \u003c/header\u003e\n      \u003cdiv class=\"grid-2\" style=\"gap:32px; flex:1;\"\u003e\n        \u003cdiv class=\"card\" style=\"padding:0; overflow:hidden;\"\u003e\n          \u003cdiv style=\"padding: 22px 28px; border-bottom:1px solid var(--se-line); display:flex; justify-content:space-between; align-items:baseline;\"\u003e\n            \u003ch4 style=\"margin:0;\"\u003eHex choropleth · GVA · 2025-Q3\u003c/h4\u003e\n            \u003cspan class=\"cap\"\u003eMock\u003c/span\u003e\n          \u003c/div\u003e\n          \u003csvg viewBox=\"0 0 600 380\" width=\"100%\" style=\"background:#F7F8FB;\"\u003e\n            \u003cg stroke=\"#fff\" stroke-width=\"1.5\"\u003e\n              \u003cpolygon poi stroke-dasharray=\"4 4\" opacity=\"0.5\"/\u003e\n            \u003ctext x=\"540\" y=\"60\" font-family=\"Cascadia Mono, Consolas, monospace\" font-size=\"11\" fill=\"#2F8FE3\"\u003eIndian Ocean\u003c/text\u003e\n          \u003c/svg\u003e\n          \u003cdiv style=\"padding:14px 28px 18px;\"\u003e\n            \u003cdiv class=\"legend\"\u003e\n              \u003cspan class=\"cap\" style=\"color:var(--se-fg-2);\"\u003eGVA / hex (R, monthly)\u003c/span\u003e\n              \u003cspan class=\"sw\"\u003e\u003ci style=\"background:#E5E3FB;\"\u003e\u003c/i\u003e0.5–1.5M\u003c/span\u003e\n              \u003cspan class=\"sw\"\u003e\u003ci style=\"background:#A8A0F2;\"\u003e\u003c/i\u003e1.5–4M\u003c/span\u003e\n              \u003cspan class=\"sw\"\u003e\u003ci style=\"background:#594AE3;\"\u003e\u003c/i\u003e4–9M\u003c/span\u003e\n              \u003cspan class=\"sw\"\u003e\u003ci style=\"background:#3A30B0;\"\u003e\u003c/i\u003e9M+\u003c/span\u003e\n            \u003c/div\u003e\n          \u003c/div\u003e\n        \u003c/div\u003e\n        \u003cdiv style=\"display:flex; flex-direction:column; gap:20px;\"\u003e\n          \u003cdiv class=\"card soft\"\u003e\n            \u003cspan class=\"tag\"\u003eVariable selector\u003c/span\u003e\n            \u003ch4\u003eEvery panel column.\u003c/h4\u003e\n            \u003cp\u003eFTE · GVA · ECI · accessibility · resilience · property values · nightlights · growth rate · dominant land use · faults · CAPEX · EDIP · FDI flow · population · built surface · infrastructure quality · service-delivery urgency.\u003c/p\u003e\n          \u003c/div\u003e\n          \u003cdiv class=\"card soft\"\u003e\n            \u003cspan class=\"tag\"\u003eTime control\u003c/span\u003e\n            \u003ch4\u003eMonthly slider · 2014 → Feb\u0026nbsp;2026\u003c/h4\u003e\n            \u003cp\u003eDrag through 146 months. The hex map and click-detail time series animate together.\u003c/p\u003e\n          \u003c/div\u003e\n          \u003cdiv class=\"card soft\"\u003e\n            \u003cspan class=\"tag\"\u003eComparison\u003c/span\u003e\n            \u003ch4\u003eSide-by-side maps\u003c/h4\u003e\n            \u003cp\u003ePin two variables for the same month, or pin one variable across two months. Directly answers \"what changed\".\u003c/p\u003e\n          \u003c/div\u003e\n          \u003cdiv class=\"card soft\"\u003e\n            \u003cspan class=\"tag\"\u003eAggregation\u003c/span\u003e\n            \u003ch4\u003eWard toggle\u003c/h4\u003e\n            \u003cp\u003eFlip from hex-level to ward-average for executive views. Underlying data unchanged.\u003c/p\u003e\n          \u003c/div\u003e\n        \u003c/div\u003e\n      \u003c/div\u003e\n    \u003c/div\u003e\n    \u003cdiv class=\"slide-footer\"\u003e\n      \u003cdiv class=\"brand\"\u003e\u003cimg src=\"f61d8b4db13044019d000e581229ea35\" alt=\"Spatial Economics\"\u003e\u003c/div\u003e\n      \u003cdiv\u003e19 · Dashboard\u003c/div\u003e\n      \u003cdiv\u003e19 / 34\u003c/div\u003e\n    \u003c/div\u003e\n  \u003c/section\u003e\n\n  \n  \u003c!-- 20 — AI Analyst --\u003e\n  \u003csection class=\"slide\" data-screen-label=\"20 AI Analyst\"\u003e\n    \u003cdiv class=\"slide-pad\"\u003e\n      \u003cheader class=\"slide-header\"\u003e\n        \u003cdiv\u003e\n          \u003cdiv class=\"slide-eyebrow\"\u003eThe AI analyst\u003c/div\u003e\n          \u003ch2 class=\"slide-title\" style=\"margin-top:14px;\"\u003eAsk in English. Get a sourced answer with charts and caveats.\u003c/h2\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"slide-section-tag\"\u003e§ 04 · Surface\u003c/div\u003e\n      \u003c/header\u003e\n      \u003cp class=\"slide-lead\"\u003eA Claude-powered \u003cspan style=\"font-family:var(--se-font-mono); color:var(--se-primary);\"\u003eChatAgent\u003c/span\u003e sits over the same DuckDB store as the dashboard. It is read-only, scope-aware, and instrumented — every answer carries the SQL it ran, the tools it called, the freshness of each source, and the caveats the data quality registry attached. It is not a chat skin; it is the model's tool-use surface, exposed.\u003c/p\u003e\n      \u003cdiv class=\"grid-2\" style=\"gap:32px; flex:1;\"\u003e\n        \u003cdiv style=\"display:flex; flex-direction:column; gap:18px;\"\u003e\n          \u003cdiv class=\"card\"\u003e\n            \u003cspan class=\"tag\"\u003eHow a turn runs\u003c/span\u003e\n            \u003ch4 style=\"margin-top:10px;\"\u003eThree phases · one tool-use loop\u003c/h4\u003e\n            \u003col style=\"padding-left:18px; margin:14px 0 0; line-height:1.7;\"\u003e\n              \u003cli\u003e\u003cb\u003ePre-setup.\u003c/b\u003e Resolve user role and scope, pick the workflow pack, build the system prompt, pre-load context.\u003c/li\u003e\n              \u003cli\u003e\u003cb\u003eTool loop.\u003c/b\u003e Anthropic tool-use iterates: call a tool, read the result, decide the next call, terminate when it has the answer or hits the iteration cap.\u003c/li\u003e\n              \u003cli\u003e\u003cb\u003ePost-synthesise.\u003c/b\u003e Assemble Markdown answer + Plotly / MapLibre / Mermaid artefacts + caveats + source list. Persist to the conversation store.\u003c/li\u003e\n            \u003c/ol\u003e\n          \u003c/div\u003e\n          \u003cdiv class=\"card warm\"\u003e\n            \u003cspan class=\"tag\" style=\"color:var(--se-fg-strong);\"\u003eTermination contract\u003c/span\u003e\n            \u003cp style=\"font-family:var(--se-font-mono); font-size:13px; line-height:1.7; margin-top:8px;\"\u003e\n              tool_loop_terminated_reason ∈ {\u003cbr/\u003e\n              \u0026nbsp;\u0026nbsp;\"final\",\u003cbr/\u003e\n              \u0026nbsp;\u0026nbsp;\"max_tokens\",\u003cbr/\u003e\n              \u0026nbsp;\u0026nbsp;\"user_cancel\",\u003cbr/\u003e\n              \u0026nbsp;\u0026nbsp;\"tool_error\"\u003cbr/\u003e\n              }\n            \u003c/p\u003e\n          \u003c/div\u003e\n        \u003c/div\u003e\n        \u003cdiv style=\"display:flex; flex-direction:column; gap:18px;\"\u003e\n          \u003cdiv class=\"card\" style=\"padding:0; overflow:hidden;\"\u003e\n            \u003cdiv style=\"padding:18px 24px; border-bottom:1px solid var(--se-line); display:flex; justify-content:space-between; align-items:baseline;\"\u003e\n              \u003ch4 style=\"margin:0;\"\u003eAnalyst transcript · sample\u003c/h4\u003e\n              \u003cspan class=\"cap\"\u003eMock\u003c/span\u003e\n            \u003c/div\u003e\n            \u003cdiv style=\"padding:20px 24px; font-family:var(--se-font-mono); font-size:12.5px; line-height:1.65; background:#FAFAF7;\"\u003e\n              \u003cdiv style=\"color:#6B7385;\"\u003eYou ▸\u003c/div\u003e\n              \u003cdiv style=\"color:var(--se-fg-strong); margin-bottom:14px;\"\u003eWhich 5 wards have rising GVA momentum and elevated service pressure?\u003c/div\u003e\n              \u003cdiv style=\"color:#6B7385;\"\u003eAnalyst ▸ thinking…\u003c/div\u003e\n              \u003cdiv style=\"color:var(--se-fg-2); margin:6px 0;\"\u003e[tool: gdp_momentum scope=ward limit=20]\u003c/div\u003e\n              \u003cdiv style=\"color:var(--se-fg-2); margin:6px 0;\"\u003e[tool: service_pressure scope=ward]\u003c/div\u003e\n              \u003cdiv style=\"color:var(--se-fg-2); margin:6px 0;\"\u003e[tool: rank metric=composite]\u003c/div\u003e\n              \u003cdiv style=\"color:var(--se-fg-strong); margin-top:10px;\"\u003eTop 5: W035, W098, W018, W067, W110.\u003c/div\u003e\n              \u003cdiv style=\"color:var(--se-fg-strong);\"\u003eMomentum +3.2 to +5.1 ppt YoY; pressure 0.71–0.84.\u003c/div\u003e\n              \u003cdiv style=\"color:#B85C2A; margin-top:10px;\"\u003e⚠ Caveats: M1 nowcast confidence 0.82 for W110.\u003c/div\u003e\n              \u003cdiv style=\"color:var(--se-primary); margin-top:6px;\"\u003e[Tools: gdp_momentum, service_pressure, rank]\u003c/div\u003e\n            \u003c/div\u003e\n          \u003c/div\u003e\n          \u003cdiv class=\"grid-3\" style=\"gap:14px;\"\u003e\n            \u003cdiv class=\"card\"\u003e\u003cspan class=\"tag\"\u003eRead-only\u003c/span\u003e\u003cp\u003eAgent uses a read-only DuckDB handle. No mutation tools.\u003c/p\u003e\u003c/div\u003e\n            \u003cdiv class=\"card\"\u003e\u003cspan class=\"tag\"\u003eSQL guard\u003c/span\u003e\u003cp\u003eEvery query routed through \u003cspan style=\"font-family:var(--se-font-mono);\"\u003esql_guard\u003c/span\u003e: allow-listed tables, row caps, plan inspection.\u003c/p\u003e\u003c/div\u003e\n            \u003cdiv class=\"card\"\u003e\u003cspan class=\"tag\"\u003eReplay\u003c/span\u003e\u003cp\u003eEvery turn captured for replay + golden-output diffing across model versions.\u003c/p\u003e\u003c/div\u003e\n          \u003c/div\u003e\n        \u003c/div\u003e\n      \u003c/div\u003e\n    \u003c/div\u003e\n    \u003cdiv class=\"slide-footer\"\u003e\n      \u003cdiv class=\"brand\"\u003e\u003cimg src=\"f61d8b4db13044019d000e581229ea35\" alt=\"Spatial Economics\"\u003e\u003c/div\u003e\n      \u003cdiv\u003e20 · AI Analyst\u003c/div\u003e\n      \u003cdiv\u003e20 / 34\u003c/div\u003e\n    \u003c/div\u003e\n  \u003c/section\u003e\n\n  \u003c!-- 21 — How the model thinks --\u003e\n  \u003csection class=\"slide compact-surface\" data-screen-label=\"21 How the model thinks\"\u003e\n    \u003cdiv class=\"slide-pad\"\u003e\n      \u003cheader class=\"slide-header\"\u003e\n        \u003cdiv\u003e\n          \u003cdiv class=\"slide-eyebrow\"\u003eHow the AI works\u003c/div\u003e\n          \u003ch2 class=\"slide-title\" style=\"margin-top:14px;\"\u003eThe model is a panel. The AI is a tool-user.\u003cbr/\u003eIt doesn't reason about the city — it queries it.\u003c/h2\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"slide-section-tag\"\u003e§ 04 · Surface\u003c/div\u003e\n      \u003c/header\u003e\n      \u003cp class=\"slide-lead\"\u003eOur AI is not a chatbot bolted onto a dashboard, and it is not a forecasting black box. It is a frontier-LLM \u003cspan style=\"font-family:var(--se-font-mono); color:var(--se-primary);\"\u003etool-use loop\u003c/span\u003e — Anthropic's \u003cb\u003eClaude Opus 4.7\u003c/b\u003e and OpenAI's \u003cb\u003eGPT‑5.5\u003c/b\u003e, swappable per workload — that sits over the same governed panel everything else reads from. When you ask a question, the agent does not invent a number — it picks tools, runs SQL, calls a model endpoint, reads the result, and decides what to call next, until it has enough evidence to answer.\u003c/p\u003e\n\n      \u003cdiv class=\"grid-2\" style=\"gap:32px; flex:1;\"\u003e\n        \u003cdiv class=\"card\" style=\"padding:0; overflow:hidden;\"\u003e\n          \u003cdiv style=\"padding:18px 24px; border-bottom:1px solid var(--se-line); display:flex; justify-content:space-between; align-items:baseline;\"\u003e\n            \u003ch4 style=\"margin:0;\"\u003eArchitecture · one turn\u003c/h4\u003e\n            \u003cspan class=\"cap\"\u003eRead-only\u003c/span\u003e\n          \u003c/div\u003e\n          \u003csvg viewBox=\"0 0 720 360\" width=\"100%\" style=\"background:#FAFAF7;\"\u003e\n            \u003cdefs\u003e\n              \u003cmarker id=\"arr\" viewBox=\"0 0 10 10\" refX=\"9\" refY=\"5\" markerWidth=\"7\" markerHeight=\"7\" orient=\"auto\"\u003e\n                \u003cpath d=\"M0,0 L10,5 L0,10 z\" fill=\"#594AE3\"/\u003e\n              \u003c/marker\u003e\n            \u003c/defs\u003e\n            \u003cg font-family=\"Segoe UI, system-ui, sans-serif\" font-size=\"12\"\u003e\n              \u003c!-- Question --\u003e\n              \u003crect x=\"20\" y=\"30\" width=\"140\" height=\"46\" rx=\"8\" fill=\"#fff\" stroke=\"#594AE3\" stroke-width=\"1.4\"/\u003e\n              \u003ctext x=\"90\" y=\"50\" text-anchor=\"middle\" font-weight=\"600\" fill=\"#0F1525\"\u003eUser question\u003c/text\u003e\n              \u003ctext x=\"90\" y=\"66\" text-anchor=\"middle\" fill=\"#6B7385\" font-size=\"11\"\u003eEnglish · scope\u003c/text\u003e\n\n              \u003c!-- Pre-setup --\u003e\n              \u003crect x=\"200\" y=\"30\" width=\"160\" height=\"46\" rx=\"8\" fill=\"#594AE3\" stroke=\"#594AE3\"/\u003e\n              \u003ctext x=\"280\" y=\"50\" text-anchor=\"middle\" fill=\"#fff\" font-weight=\"600\"\u003ePre-setup\u003c/text\u003e\n              \u003ctext x=\"280\" y=\"66\" text-anchor=\"middle\" fill=\"rgba(255,255,255,0.85)\" font-size=\"11\"\u003erole · pack · sysprompt\u003c/text\u003e\n\n              \u003c!-- Tool loop core --\u003e\n              \u003crect x=\"400\" y=\"20\" width=\"300\" height=\"200\" rx=\"12\" fill=\"#F4F3EE\" stroke=\"#DAD9D0\" stroke-dasharray=\"4 3\"/\u003e\n              \u003ctext x=\"550\" y=\"44\" text-anchor=\"middle\" font-family=\"Cascadia Mono, Consolas, monospace\" font-size=\"11\" fill=\"#594AE3\" letter-spacing=\"2\"\u003eTOOL-USE LOOP\u003c/text\u003e\n\n              \u003crect x=\"416\" y=\"60\" width=\"120\" height=\"38\" rx=\"6\" fill=\"#fff\" stroke=\"#594AE3\"/\u003e\n              \u003ctext x=\"476\" y=\"79\" text-anchor=\"middle\" font-weight=\"600\" fill=\"#0F1525\" font-size=\"11\"\u003eLLM picks\u003c/text\u003e\n              \u003ctext x=\"476\" y=\"91\" text-anchor=\"middle\" fill=\"#6B7385\" font-size=\"9.5\" font-family=\"Cascadia Mono, Consolas, monospace\"\u003eOpus 4.7 · GPT-5.5\u003c/text\u003e\n\n              \u003crect x=\"564\" y=\"60\" width=\"120\" height=\"38\" rx=\"6\" fill=\"#fff\" stroke=\"#0F1525\"/\u003e\n              \u003ctext x=\"624\" y=\"84\" text-anchor=\"middle\" font-weight=\"600\" fill=\"#0F1525\"\u003eTool runs\u003c/text\u003e\n\n              \u003crect x=\"416\" y=\"118\" width=\"120\" height=\"38\" rx=\"6\" fill=\"#fff\" stroke=\"#0F1525\"/\u003e\n              \u003ctext x=\"476\" y=\"142\" text-anchor=\"middle\" font-weight=\"600\" fill=\"#0F1525\"\u003eResult back\u003c/text\u003e\n\n              \u003crect x=\"564\" y=\"118\" width=\"120\" height=\"38\" rx=\"6\" fill=\"#fff\" stroke=\"#594AE3\"/\u003e\n              \u003ctext x=\"624\" y=\"142\" text-anchor=\"middle\" font-weight=\"600\" fill=\"#0F1525\"\u003eNext call?\u003c/text\u003e\n\n              \u003crect x=\"490\" y=\"176\" width=\"120\" height=\"32\" rx=\"6\" fill=\"#0F1525\"/\u003e\n              \u003ctext x=\"550\" y=\"196\" text-anchor=\"middle\" fill=\"#fff\" font-weight=\"600\"\u003eTerminate\u003c/text\u003e\n\n              \u003cpath d=\"M536,79 L564,79\" stroke=\"#594AE3\" stroke-width=\"1.6\" marker-end=\"url(#arr)\" fill=\"none\"/\u003e\n              \u003cpath d=\"M624,98 L624,118\" stroke=\"#594AE3\" stroke-width=\"1.6\" marker-end=\"url(#arr)\" fill=\"none\"/\u003e\n              \u003cpath d=\"M564,137 L536,137\" stroke=\"#594AE3\" stroke-width=\"1.6\" marker-end=\"url(#arr)\" fill=\"none\"/\u003e\n              \u003cpath d=\"M476,98 L476,118\" stroke=\"#594AE3\" stroke-width=\"1.6\" marker-end=\"url(#arr)\" fill=\"none\"/\u003e\n              \u003cpath d=\"M624,156 L624,170 L610,180\" stroke=\"#594AE3\" stroke-width=\"1.6\" marker-end=\"url(#arr)\" fill=\"none\"/\u003e\n              \u003cpath d=\"M476,156 L476,170 L490,180\" stroke=\"#0F1525\" stroke-width=\"1.2\" stroke-dasharray=\"3 3\" fill=\"none\"/\u003e\n              \u003ctext x=\"442\" y=\"172\" font-size=\"10\" fill=\"#6B7385\" font-family=\"Cascadia Mono, Consolas, monospace\"\u003ecap reached\u003c/text\u003e\n\n              \u003c!-- Post-synth --\u003e\n              \u003crect x=\"400\" y=\"248\" width=\"160\" height=\"46\" rx=\"8\" fill=\"#594AE3\"/\u003e\n              \u003ctext x=\"480\" y=\"268\" text-anchor=\"middle\" fill=\"#fff\" font-weight=\"600\"\u003ePost-synthesise\u003c/text\u003e\n              \u003ctext x=\"480\" y=\"284\" text-anchor=\"middle\" fill=\"rgba(255,255,255,0.85)\" font-size=\"11\"\u003eMarkdown · charts · caveats\u003c/text\u003e\n\n              \u003crect x=\"580\" y=\"248\" width=\"120\" height=\"46\" rx=\"8\" fill=\"#fff\" stroke=\"#0F1525\"/\u003e\n              \u003ctext x=\"640\" y=\"268\" text-anchor=\"middle\" font-weight=\"600\" fill=\"#0F1525\"\u003eAnswer\u003c/text\u003e\n              \u003ctext x=\"640\" y=\"284\" text-anchor=\"middle\" fill=\"#6B7385\" font-size=\"11\"\u003e+ provenance\u003c/text\u003e\n\n              \u003c!-- panel ground --\u003e\n              \u003crect x=\"20\" y=\"310\" width=\"680\" height=\"40\" rx=\"8\" fill=\"#fff\" stroke=\"#594AE3\" stroke-width=\"1.4\"/\u003e\n              \u003ctext x=\"42\" y=\"335\" font-weight=\"700\" fill=\"#594AE3\" font-family=\"Cascadia Mono, Consolas, monospace\" letter-spacing=\"2\"\u003eDUCKDB · HEX_PANEL · 57,330 ROWS · READ-ONLY\u003c/text\u003e\n\n              \u003c!-- arrows --\u003e\n              \u003cpath d=\"M160,53 L200,53\" stroke=\"#594AE3\" stroke-width=\"1.8\" marker-end=\"url(#arr)\" fill=\"none\"/\u003e\n              \u003cpath d=\"M360,53 L400,53\" stroke=\"#594AE3\" stroke-width=\"1.8\" marker-end=\"url(#arr)\" fill=\"none\"/\u003e\n              \u003cpath d=\"M550,222 L482,248\" stroke=\"#594AE3\" stroke-width=\"1.8\" marker-end=\"url(#arr)\" fill=\"none\"/\u003e\n              \u003cpath d=\"M560,271 L580,271\" stroke=\"#594AE3\" stroke-width=\"1.8\" marker-end=\"url(#arr)\" fill=\"none\"/\u003e\n\n              \u003c!-- panel reads --\u003e\n              \u003cpath d=\"M280,76 L280,310\" stroke=\"#0F1525\" stroke-width=\"0.8\" stroke-dasharray=\"2 3\" fill=\"none\"/\u003e\n              \u003cpath d=\"M624,222 L624,310\" stroke=\"#0F1525\" stroke-width=\"0.8\" stroke-dasharray=\"2 3\" fill=\"none\"/\u003e\n              \u003ctext x=\"288\" y=\"305\" font-size=\"10\" fill=\"#6B7385\" font-family=\"Cascadia Mono, Consolas, monospace\"\u003ereads\u003c/text\u003e\n            \u003c/g\u003e\n          \u003c/svg\u003e\n        \u003c/div\u003e\n\n        \u003cdiv style=\"display:flex; flex-direction:column; gap:18px;\"\u003e\n          \u003cdiv class=\"card warm\"\u003e\n            \u003cspan class=\"tag\" style=\"color:var(--se-fg-strong);\"\u003eThe contract\u003c/span\u003e\n            \u003ch4 style=\"margin-top:8px;\"\u003eWhat the AI is allowed to do\u003c/h4\u003e\n            \u003cul style=\"margin:10px 0 0; padding-left:18px; line-height:1.7; font-size:14.5px;\"\u003e\n              \u003cli\u003eRead the panel through allow-listed tools.\u003c/li\u003e\n              \u003cli\u003eCompose tools — output of one is input to the next.\u003c/li\u003e\n              \u003cli\u003eCite every number with the SQL or model endpoint that produced it.\u003c/li\u003e\n              \u003cli\u003eRefuse out-of-scope or out-of-evidence questions.\u003c/li\u003e\n            \u003c/ul\u003e\n            \u003cp style=\"margin-top:10px; font-family:var(--se-font-mono); font-size:12.5px; color:var(--se-fg-strong);\"\u003eIt cannot mutate, cannot fabricate, cannot reach the open web.\u003c/p\u003e\n          \u003c/div\u003e\n          \u003cdiv class=\"grid-3\" style=\"gap:12px;\"\u003e\n            \u003cdiv class=\"card\"\u003e\u003cspan class=\"tag\"\u003eBrain\u003c/span\u003e\u003ch4 style=\"margin-top:6px; font-size:16px;\"\u003eClaude · GPT\u003c/h4\u003e\u003cp style=\"font-size:12.5px;\"\u003eClaude Opus 4.7 \u0026amp; GPT‑5.5 · tool-use APIs · streaming · iteration cap.\u003c/p\u003e\u003c/div\u003e\n            \u003cdiv class=\"card\"\u003e\u003cspan class=\"tag\"\u003eHands\u003c/span\u003e\u003ch4 style=\"margin-top:6px; font-size:16px;\"\u003e18 tools\u003c/h4\u003e\u003cp style=\"font-size:12.5px;\"\u003eDatasets, models, spatial ops, scenarios — all declared with JSON Schema.\u003c/p\u003e\u003c/div\u003e\n            \u003cdiv class=\"card\"\u003e\u003cspan class=\"tag\"\u003eMemory\u003c/span\u003e\u003ch4 style=\"margin-top:6px; font-size:16px;\"\u003ePanel\u003c/h4\u003e\u003cp style=\"font-size:12.5px;\"\u003eDuckDB-backed hex_panel + model outputs. The single source of truth.\u003c/p\u003e\u003c/div\u003e\n          \u003c/div\u003e\n        \u003c/div\u003e\n      \u003c/div\u003e\n    \u003c/div\u003e\n    \u003cdiv class=\"slide-footer\"\u003e\n      \u003cdiv class=\"brand\"\u003e\u003cimg src=\"f61d8b4db13044019d000e581229ea35\" alt=\"Spatial Economics\"\u003e\u003c/div\u003e\n      \u003cdiv\u003e21 · How the model thinks\u003c/div\u003e\n      \u003cdiv\u003e21 / 34\u003c/div\u003e\n    \u003c/div\u003e\n  \u003c/section\u003e\n\n  \u003c!-- 22 — The 18 tools, declared --\u003e\n  \u003csection class=\"slide compact-surface\" data-screen-label=\"22 The 18 tools\"\u003e\n    \u003cdiv class=\"slide-pad\"\u003e\n      \u003cheader class=\"slide-header\"\u003e\n        \u003cdiv\u003e\n          \u003cdiv class=\"slide-eyebrow\"\u003eThe tool registry\u003c/div\u003e\n          \u003ch2 class=\"slide-title\" style=\"margin-top:14px;\"\u003eEighteen tools. Seven families. Every one declared, typed, and replayable.\u003c/h2\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"slide-section-tag\"\u003e§ 04 · Surface\u003c/div\u003e\n      \u003c/header\u003e\n      \u003cp class=\"slide-lead\" style=\"margin-bottom:8px;\"\u003eThe Canvas, the AI Analyst, and the Workbench all draw from the same registry. A tool is a contract: declared name, JSON-Schema input, typed output, supported scopes and modes, normalisation it accepts, and the data quality it reads. Add a tool to the registry and it appears, simultaneously, on the Canvas rail and in the AI Analyst's allow-list.\u003c/p\u003e\n\n      \u003cdiv class=\"grid-2\" style=\"gap:28px; flex:1;\"\u003e\n        \u003ctable class=\"spec\" style=\"font-size:12.5px;\"\u003e\n          \u003cthead\u003e\n            \u003ctr\u003e\u003cth\u003eFamily\u003c/th\u003e\u003cth\u003eTools\u003c/th\u003e\u003cth class=\"mono\"\u003eScopes\u003c/th\u003e\u003c/tr\u003e\n          \u003c/thead\u003e\n          \u003ctbody\u003e\n            \u003ctr\u003e\u003ctd\u003e\u003cb\u003eDatasets · Macro\u003c/b\u003e\u003cdiv style=\"font-size:11px; color:var(--se-fg-3);\"\u003e5 tools\u003c/div\u003e\u003c/td\u003e\u003ctd class=\"mono\" style=\"font-size:11.5px;\"\u003ecatalogue_browse · priority_surface · gdp_momentum · rank · compare\u003c/td\u003e\u003ctd class=\"mono\" style=\"font-size:11.5px;\"\u003eall\u003c/td\u003e\u003c/tr\u003e\n            \u003ctr\u003e\u003ctd\u003e\u003cb\u003eLabour \u0026amp; services\u003c/b\u003e\u003cdiv style=\"font-size:11px; color:var(--se-fg-3);\"\u003e2 tools\u003c/div\u003e\u003c/td\u003e\u003ctd class=\"mono\" style=\"font-size:11.5px;\"\u003eservice_pressure · equity_lens\u003c/td\u003e\u003ctd class=\"mono\" style=\"font-size:11.5px;\"\u003emuni · ward · hex\u003c/td\u003e\u003c/tr\u003e\n            \u003ctr\u003e\u003ctd\u003e\u003cb\u003eProperty \u0026amp; land\u003c/b\u003e\u003cdiv style=\"font-size:11px; color:var(--se-fg-3);\"\u003e2 tools\u003c/div\u003e\u003c/td\u003e\u003ctd class=\"mono\" style=\"font-size:11.5px;\"\u003eland_cover_change · transitions\u003c/td\u003e\u003ctd class=\"mono\" style=\"font-size:11.5px;\"\u003emuni · ward · hex\u003c/td\u003e\u003c/tr\u003e\n            \u003ctr\u003e\u003ctd\u003e\u003cb\u003eSpatial\u003c/b\u003e\u003cdiv style=\"font-size:11px; color:var(--se-fg-3);\"\u003e2 tools\u003c/div\u003e\u003c/td\u003e\u003ctd class=\"mono\" style=\"font-size:11.5px;\"\u003eflow_explorer · morans_i\u003c/td\u003e\u003ctd class=\"mono\" style=\"font-size:11.5px;\"\u003edistrict · muni · ward\u003c/td\u003e\u003c/tr\u003e\n            \u003ctr\u003e\u003ctd\u003e\u003cb\u003eTrade \u0026amp; complexity\u003c/b\u003e\u003cdiv style=\"font-size:11px; color:var(--se-fg-3);\"\u003e2 tools\u003c/div\u003e\u003c/td\u003e\u003ctd class=\"mono\" style=\"font-size:11.5px;\"\u003eanalog_finder · opportunity_graph\u003c/td\u003e\u003ctd class=\"mono\" style=\"font-size:11.5px;\"\u003emuni · district · province\u003c/td\u003e\u003c/tr\u003e\n            \u003ctr\u003e\u003ctd\u003e\u003cb\u003eScenarios\u003c/b\u003e\u003cdiv style=\"font-size:11px; color:var(--se-fg-3);\"\u003e3 tools\u003c/div\u003e\u003c/td\u003e\u003ctd class=\"mono\" style=\"font-size:11.5px;\"\u003etrade_off_frontier · intervention_cockpit · annual_pack_studio\u003c/td\u003e\u003ctd class=\"mono\" style=\"font-size:11.5px;\"\u003emuni · district\u003c/td\u003e\u003c/tr\u003e\n            \u003ctr\u003e\u003ctd\u003e\u003cb\u003eDiagnostics\u003c/b\u003e\u003cdiv style=\"font-size:11px; color:var(--se-fg-3);\"\u003e2 tools\u003c/div\u003e\u003c/td\u003e\u003ctd class=\"mono\" style=\"font-size:11.5px;\"\u003edata_quality_inspector · provenance_trace\u003c/td\u003e\u003ctd class=\"mono\" style=\"font-size:11.5px;\"\u003eall\u003c/td\u003e\u003c/tr\u003e\n          \u003c/tbody\u003e\n        \u003c/table\u003e\n\n        \u003cdiv style=\"display:flex; flex-direction:column; gap:14px;\"\u003e\n          \u003cdiv class=\"card\" style=\"padding:0; overflow:hidden;\"\u003e\n            \u003cdiv style=\"padding:14px 22px; border-bottom:1px solid var(--se-line); display:flex; justify-content:space-between; align-items:baseline;\"\u003e\n              \u003ch4 style=\"margin:0; font-size:18px;\"\u003eA tool, declared\u003c/h4\u003e\n              \u003cspan class=\"cap\"\u003epriority_surface\u003c/span\u003e\n            \u003c/div\u003e\n            \u003cdiv style=\"padding:14px 22px; font-family:var(--se-font-mono); font-size:11.5px; line-height:1.65; background:#FAFAF7; color:var(--se-fg-strong);\"\u003e\n\u003cspan style=\"color:#6B7385;\"\u003e// JSON-Schema, abbreviated\u003c/span\u003e\u003cbr/\u003e\n{\u003cbr/\u003e\n\u0026nbsp;\u0026nbsp;\u003cspan style=\"color:var(--se-primary);\"\u003e\"name\"\u003c/span\u003e: \"priority_surface\",\u003cbr/\u003e\n\u0026nbsp;\u0026nbsp;\u003cspan style=\"color:var(--se-primary);\"\u003e\"family\"\u003c/span\u003e: \"datasets.macro\",\u003cbr/\u003e\n\u0026nbsp;\u0026nbsp;\u003cspan style=\"color:var(--se-primary);\"\u003e\"scopes\"\u003c/span\u003e: [\"national\",\"province\",\"district\",\"muni\",\"ward\",\"hex\"],\u003cbr/\u003e\n\u0026nbsp;\u0026nbsp;\u003cspan style=\"color:var(--se-primary);\"\u003e\"modes\"\u003c/span\u003e: [\"twin\",\"research\"],\u003cbr/\u003e\n\u0026nbsp;\u0026nbsp;\u003cspan style=\"color:var(--se-primary);\"\u003e\"normalisation\"\u003c/span\u003e: [\"local_diagnosis\",\"national_comparable\"],\u003cbr/\u003e\n\u0026nbsp;\u0026nbsp;\u003cspan style=\"color:var(--se-primary);\"\u003e\"reads\"\u003c/span\u003e: [\"hex_panel\",\"model_priority\"],\u003cbr/\u003e\n\u0026nbsp;\u0026nbsp;\u003cspan style=\"color:var(--se-primary);\"\u003e\"input\"\u003c/span\u003e: {scope, year, weights?},\u003cbr/\u003e\n\u0026nbsp;\u0026nbsp;\u003cspan style=\"color:var(--se-primary);\"\u003e\"output\"\u003c/span\u003e: { surface, score, confidence, caveats }\u003cbr/\u003e\n}\n            \u003c/div\u003e\n          \u003c/div\u003e\n          \u003cdiv class=\"grid-2\" style=\"gap:12px;\"\u003e\n            \u003cdiv class=\"card\" style=\"padding:18px 20px;\"\u003e\u003cspan class=\"tag\"\u003eWhy declared\u003c/span\u003e\u003cp style=\"font-size:13px; line-height:1.45;\"\u003eSurfaces refuse to render incoherent comparisons. A ward-only tool cannot be invoked at province scope.\u003c/p\u003e\u003c/div\u003e\n            \u003cdiv class=\"card\" style=\"padding:18px 20px;\"\u003e\u003cspan class=\"tag\"\u003eWhy typed\u003c/span\u003e\u003cp style=\"font-size:13px; line-height:1.45;\"\u003eThe AI Analyst gets schema-validated outputs; broken contracts fail loudly at dev time, not in front of the MEC.\u003c/p\u003e\u003c/div\u003e\n          \u003c/div\u003e\n        \u003c/div\u003e\n      \u003c/div\u003e\n    \u003c/div\u003e\n    \u003cdiv class=\"slide-footer\"\u003e\n      \u003cdiv class=\"brand\"\u003e\u003cimg src=\"f61d8b4db13044019d000e581229ea35\" alt=\"Spatial Economics\"\u003e\u003c/div\u003e\n      \u003cdiv\u003e22 · The 18 tools\u003c/div\u003e\n      \u003cdiv\u003e22 / 34\u003c/div\u003e\n    \u003c/div\u003e\n  \u003c/section\u003e\n\n  \u003c!-- 23 — Guardrails \u0026 evidence --\u003e\n  \u003csection class=\"slide\" data-screen-label=\"23 Guardrails and evidence\"\u003e\n    \u003cdiv class=\"slide-pad\"\u003e\n      \u003cheader class=\"slide-header\"\u003e\n        \u003cdiv\u003e\n          \u003cdiv class=\"slide-eyebrow\"\u003eGuardrails\u003c/div\u003e\n          \u003ch2 class=\"slide-title\" style=\"margin-top:14px;\"\u003eEvery answer carries the receipts.\u003cbr/\u003eEvery query passes the gate.\u003c/h2\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"slide-section-tag\"\u003e§ 04 · Surface\u003c/div\u003e\n      \u003c/header\u003e\n      \u003cp class=\"slide-lead\"\u003eAn AI that can write SQL is an AI that can produce confident nonsense. We close that gap with four mechanisms — a SQL gate, a scope \u0026amp; normalisation contract, a caveats registry, and turn-by-turn replay. Together they turn \"the AI said so\" into \"here is the SQL, here is the data, here are the caveats, here is the prior turn.\"\u003c/p\u003e\n\n      \u003cdiv class=\"grid-2\" style=\"gap:32px; flex:1;\"\u003e\n        \u003cdiv style=\"display:flex; flex-direction:column; gap:16px;\"\u003e\n          \u003cdiv class=\"card\"\u003e\n            \u003cspan class=\"tag\"\u003eMechanism 01 · SQL guard\u003c/span\u003e\n            \u003ch4 style=\"margin-top:6px;\"\u003eAllow-list before plan\u003c/h4\u003e\n            \u003cp style=\"font-family:var(--se-font-mono); font-size:12.5px; line-height:1.7; margin-top:6px; color:var(--se-fg-strong);\"\u003e\n              sql_guard.check(query) →\u003cbr/\u003e\n              \u0026nbsp;\u0026nbsp;✓ tables ∈ allow_list\u003cbr/\u003e\n              \u0026nbsp;\u0026nbsp;✓ no DDL · no DML\u003cbr/\u003e\n              \u0026nbsp;\u0026nbsp;✓ rows ≤ 100,000\u003cbr/\u003e\n              \u0026nbsp;\u0026nbsp;✓ plan inspected · no Cartesian\n            \u003c/p\u003e\n          \u003c/div\u003e\n          \u003cdiv class=\"card\"\u003e\n            \u003cspan class=\"tag\"\u003eMechanism 02 · Scope \u0026amp; normalisation\u003c/span\u003e\n            \u003ch4 style=\"margin-top:6px;\"\u003eRefuse incoherent comparisons\u003c/h4\u003e\n            \u003cp style=\"margin-top:6px;\"\u003eEvery tool declares its scope. The model refuses to chart \u003cspan style=\"font-family:var(--se-font-mono);\"\u003enative_raw\u003c/span\u003e next to \u003cspan style=\"font-family:var(--se-font-mono);\"\u003enational_comparable\u003c/span\u003e. A ward tool cannot answer a province question.\u003c/p\u003e\n          \u003c/div\u003e\n        \u003c/div\u003e\n\n        \u003cdiv style=\"display:flex; flex-direction:column; gap:16px;\"\u003e\n          \u003cdiv class=\"card warm\"\u003e\n            \u003cspan class=\"tag\" style=\"color:var(--se-fg-strong);\"\u003eMechanism 03 · Caveats registry\u003c/span\u003e\n            \u003ch4 style=\"margin-top:6px;\"\u003eEvery cell has a footnote\u003c/h4\u003e\n            \u003cdiv style=\"margin-top:10px; display:grid; grid-template-columns:auto 1fr; gap:8px 14px; font-family:var(--se-font-mono); font-size:12.5px; line-height:1.5;\"\u003e\n              \u003cdiv style=\"color:#B85C2A;\"\u003e⚠ freshness\u003c/div\u003e\u003cdiv\u003eVIIRS ≥ 60d stale → flag\u003c/div\u003e\n              \u003cdiv style=\"color:#B85C2A;\"\u003e⚠ confidence\u003c/div\u003e\u003cdiv\u003enowcast σ \u0026gt; threshold → flag\u003c/div\u003e\n              \u003cdiv style=\"color:#B85C2A;\"\u003e⚠ coverage\u003c/div\u003e\u003cdiv\u003ehex sample \u0026lt; 30 → flag\u003c/div\u003e\n              \u003cdiv style=\"color:#B85C2A;\"\u003e⚠ revision\u003c/div\u003e\u003cdiv\u003eStatsSA reweight pending → flag\u003c/div\u003e\n            \u003c/div\u003e\n          \u003c/div\u003e\n          \u003cdiv class=\"card\"\u003e\n            \u003cspan class=\"tag\"\u003eMechanism 04 · Replay\u003c/span\u003e\n            \u003ch4 style=\"margin-top:6px;\"\u003eEvery turn is a fixture\u003c/h4\u003e\n            \u003cp style=\"margin-top:6px;\"\u003eEach turn captures the prompt, the tool calls, the SQL, the outputs, and the rendered answer. Re-run on a new model version and diff against the golden — regressions are caught before the room sees them.\u003c/p\u003e\n          \u003c/div\u003e\n        \u003c/div\u003e\n      \u003c/div\u003e\n    \u003c/div\u003e\n    \u003cdiv class=\"slide-footer\"\u003e\n      \u003cdiv class=\"brand\"\u003e\u003cimg src=\"f61d8b4db13044019d000e581229ea35\" alt=\"Spatial Economics\"\u003e\u003c/div\u003e\n      \u003cdiv\u003e23 · Guardrails \u0026amp; evidence\u003c/div\u003e\n      \u003cdiv\u003e23 / 34\u003c/div\u003e\n    \u003c/div\u003e\n  \u003c/section\u003e\n\n  \u003c!-- 24 — Modes \u0026 personas --\u003e\n  \u003csection class=\"slide\" data-screen-label=\"24 Modes and personas\"\u003e\n    \u003cdiv class=\"slide-pad\"\u003e\n      \u003cheader class=\"slide-header\"\u003e\n        \u003cdiv\u003e\n          \u003cdiv class=\"slide-eyebrow\"\u003eModes \u0026amp; personas\u003c/div\u003e\n          \u003ch2 class=\"slide-title\" style=\"margin-top:14px;\"\u003eSame panel. Same tools. Two modes,\u003cbr/\u003efive workflow packs.\u003c/h2\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"slide-section-tag\"\u003e§ 04 · Surface\u003c/div\u003e\n      \u003c/header\u003e\n      \u003cp class=\"slide-lead\"\u003eA municipal manager planning a refuse-collection rebid does not want the same first screen as a researcher exploring complexity scores. The system loads a \u003cb\u003eworkflow pack\u003c/b\u003e per role — same registry, same data, but a curated tool rail, a default Canvas layout, and a system prompt tuned to the user's question vocabulary.\u003c/p\u003e\n\n      \u003cdiv class=\"grid-2\" style=\"gap:32px; flex:1;\"\u003e\n        \u003cdiv class=\"card\" style=\"padding:0; overflow:hidden;\"\u003e\n          \u003cdiv style=\"padding:18px 24px; border-bottom:1px solid var(--se-line); display:flex; justify-content:space-between; align-items:baseline;\"\u003e\n            \u003ch4 style=\"margin:0;\"\u003eModes — the orientation\u003c/h4\u003e\n            \u003cspan class=\"cap\"\u003eDefault · Twin\u003c/span\u003e\n          \u003c/div\u003e\n          \u003cdiv style=\"display:grid; grid-template-columns:1fr 1fr; gap:0;\"\u003e\n            \u003cdiv style=\"padding:24px; border-right:1px solid var(--se-line);\"\u003e\n              \u003cdiv style=\"font-family:var(--se-font-mono); font-size:11px; color:var(--se-primary); letter-spacing:0.12em;\"\u003eTWIN MODE\u003c/div\u003e\n              \u003ch5 style=\"font-family:var(--se-font-display); font-size:22px; margin:8px 0 12px; color:var(--se-fg-strong);\"\u003eDecide\u003c/h5\u003e\n              \u003cp style=\"font-size:13.5px; line-height:1.55; color:var(--se-fg-2);\"\u003eCurated rail. Defaults to muni or ward scope. Caveats inline. Annual-pack studio one click away.\u003c/p\u003e\n              \u003cdiv style=\"margin-top:14px; font-family:var(--se-font-mono); font-size:11.5px; color:var(--se-fg-3); line-height:1.7;\"\u003e\n                priority_surface · gdp_momentum\u003cbr/\u003e\n                service_pressure · intervention_cockpit\u003cbr/\u003e\n                annual_pack_studio\n              \u003c/div\u003e\n            \u003c/div\u003e\n            \u003cdiv style=\"padding:24px; background:#FAFAF7;\"\u003e\n              \u003cdiv style=\"font-family:var(--se-font-mono); font-size:11px; color:var(--se-primary); letter-spacing:0.12em;\"\u003eRESEARCH MODE\u003c/div\u003e\n              \u003ch5 style=\"font-family:var(--se-font-display); font-size:22px; margin:8px 0 12px; color:var(--se-fg-strong);\"\u003eExplore\u003c/h5\u003e\n              \u003cp style=\"font-size:13.5px; line-height:1.55; color:var(--se-fg-2);\"\u003eFull registry. Hex scope unlocked. Diagnostics surface in every tile. Provenance always on.\u003c/p\u003e\n              \u003cdiv style=\"margin-top:14px; font-family:var(--se-font-mono); font-size:11.5px; color:var(--se-fg-3); line-height:1.7;\"\u003e\n                all 18 tools · all 6 scopes\u003cbr/\u003e\n                Moran's I · flow_explorer\u003cbr/\u003e\n                provenance_trace · QA inspector\n              \u003c/div\u003e\n            \u003c/div\u003e\n          \u003c/div\u003e\n        \u003c/div\u003e\n\n        \u003cdiv style=\"display:flex; flex-direction:column; gap:14px;\"\u003e\n          \u003cdiv style=\"font-family:var(--se-font-mono); font-size:11px; color:var(--se-primary); letter-spacing:0.12em;\"\u003ePACKS · 5\u003c/div\u003e\n          \u003cdiv class=\"grid-2\" style=\"gap:12px;\"\u003e\n            \u003cdiv class=\"card\"\u003e\u003cspan class=\"tag\"\u003eP1 · Municipal manager\u003c/span\u003e\u003cp style=\"font-size:13px; margin-top:4px;\"\u003eTwin · muni default · service-pressure dashboard · monthly review pack.\u003c/p\u003e\u003c/div\u003e\n            \u003cdiv class=\"card\"\u003e\u003cspan class=\"tag\"\u003eP2 · Provincial economist\u003c/span\u003e\u003cp style=\"font-size:13px; margin-top:4px;\"\u003eTwin · district default · GDP momentum · trade-off frontier.\u003c/p\u003e\u003c/div\u003e\n            \u003cdiv class=\"card\"\u003e\u003cspan class=\"tag\"\u003eP3 · Investor / DFI\u003c/span\u003e\u003cp style=\"font-size:13px; margin-top:4px;\"\u003eResearch · analog finder · opportunity graph · resilience overlay.\u003c/p\u003e\u003c/div\u003e\n            \u003cdiv class=\"card\"\u003e\u003cspan class=\"tag\"\u003eP4 · Researcher\u003c/span\u003e\u003cp style=\"font-size:13px; margin-top:4px;\"\u003eResearch · hex scope · Moran's I · custom SQL via guard.\u003c/p\u003e\u003c/div\u003e\n            \u003cdiv class=\"card\" style=\"grid-column:1 / -1;\"\u003e\u003cspan class=\"tag\"\u003eP5 · Executive briefer\u003c/span\u003e\u003cp style=\"font-size:13px; margin-top:4px;\"\u003eTwin · single-page board view · annual pack studio · auto-narrative with caveats.\u003c/p\u003e\u003c/div\u003 cs\"\u003e\u003c/div\u003e\n      \u003cdiv\u003e25 · Canvas\u003c/div\u003e\n      \u003cdiv\u003e25 / 34\u003c/div\u003e\n    \u003c/div\u003e\n  \u003c/section\u003e\n\n  \u003c!-- 26 — Workbench (authoring + lifecycle) --\u003e\n  \u003csection class=\"slide compact-surface\" data-screen-label=\"26 Workbench\"\u003e\n    \u003cdiv class=\"slide-pad\"\u003e\n      \u003cheader class=\"slide-header\"\u003e\n        \u003cdiv\u003e\n          \u003cdiv class=\"slide-eyebrow\"\u003eThe Workbench\u003c/div\u003e\n          \u003ch2 class=\"slide-title\" style=\"margin-top:14px;\"\u003eA tile is a question. The Workbench is where you arrange them.\u003c/h2\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"slide-section-tag\"\u003e§ 04 · Surface\u003c/div\u003e\n      \u003c/header\u003e\n      \u003cp class=\"slide-lead\" style=\"margin-bottom:10px;\"\u003eThe Canvas is the surface; the \u003cb\u003eWorkbench\u003c/b\u003e is the verb. Drop a tool from the rail, configure once, and it becomes a tile — a self-contained, provenance-bearing visualisation at a fixed scope and normalisation. Tiles are first-class objects: pin them, duplicate them, link them so a click on one filters the others, share the layout as a URL, export the arrangement as a one-page brief.\u003c/p\u003e\n\n      \u003cdiv class=\"grid-2\" style=\"gap:28px; flex:1;\"\u003e\n        \u003cdiv class=\"card\" style=\"padding:0; overflow:hidden;\"\u003e\n          \u003cdiv style=\"padding:18px 24px; border-bottom:1px solid var(--se-line); display:flex; justify-content:space-between; align-items:baseline;\"\u003e\n            \u003ch4 style=\"margin:0;\"\u003eTile lifecycle\u003c/h4\u003e\n            \u003cspan class=\"cap\"\u003e5 states\u003c/span\u003e\n          \u003c/div\u003e\n          \u003cdiv style=\"padding:24px;\"\u003e\n            \u003cdiv class=\"timeline\" style=\"border:1px solid var(--se-line); border-radius:10px; overflow:hidden;\"\u003e\n              \u003cdiv class=\"st
