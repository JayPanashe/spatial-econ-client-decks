u003e\n              \u003ctext x=\"520\" y=\"350\" fill=\"#3A4256\"\u003e90% CI band\u003c/text\u003e\n            \u003c/g\u003e\n          \u003c/svg\u003e\n        \u003c/div\u003e\n      \u003c/div\u003e\n    \u003c/div\u003e\n    \u003cdiv class=\"slide-footer\"\u003e\n      \u003cdiv class=\"brand\"\u003e\u003cimg src=\"f61d8b4db13044019d000e581229ea35\" alt=\"Spatial Economics\"\u003e\u003c/div\u003e\n      \u003cdiv\u003e28 · Econometric Lab\u003c/div\u003e\n      \u003cdiv\u003e28 / 34\u003c/div\u003e\n    \u003c/div\u003e\n  \u003c/section\u003e\n\n  \u003c!-- 21 — Worked example --\u003e\n  \u003csection class=\"slide\" data-screen-label=\"29 Worked example\"\u003e\n    \u003cdiv class=\"slide-pad\"\u003e\n      \u003cheader class=\"slide-header\"\u003e\n        \u003cdiv\u003e\n          \u003cdiv class=\"slide-eyebrow\"\u003eWorked example\u003c/div\u003e\n          \u003ch2 class=\"slide-title\" style=\"margin-top:14px;\"\u003eFrom a question to a ranked list, in five steps.\u003c/h2\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"slide-section-tag\"\u003e§ 04 · Surface\u003c/div\u003e\n      \u003c/header\u003e\n      \u003cdiv class=\"card warm\" style=\"padding:30px 36px;\"\u003e\n        \u003cspan class=\"tag\" style=\"color:var(--se-fg-strong);\"\u003eQuestion · IDP / SDF inputs · Q3 2025\u003c/span\u003e\n        \u003cp class=\"pull\" style=\"font-size:34px;\"\u003e\"Which 25 wards should we prioritise for industrial CAPEX over the next planning cycle?\"\u003c/p\u003e\n      \u003c/div\u003e\n      \u003cdiv class=\"timeline\" style=\"border:1px solid var(--se-line); border-radius:14px; overflow:hidden; background:#fff;\"\u003e\n        \u003cdiv class=\"step\"\u003e\u003cdiv class=\"n\"\u003eSTEP 01 · SCOPE\u003c/div\u003e\u003ch5\u003eTranslate to features\u003c/h5\u003e\u003cp\u003e\"Industrial CAPEX impact\" → high \u003cspan style=\"font-family:var(--se-font-mono); color:var(--se-primary);\"\u003eaccessibility_index\u003c/span\u003e, mid-to-high \u003cspan style=\"font-family:var(--se-font-mono); color:var(--se-primary);\"\u003eeci\u003c/span\u003e, elevated \u003cspan style=\"font-family:var(--se-font-mono); color:var(--se-primary);\"\u003efault_count\u003c/span\u003e, and growing \u003cspan style=\"font-family:var(--se-font-mono); color:var(--se-primary);\"\u003egrowth_rate\u003c/span\u003e.\u003c/p\u003e\u003c/div\u003e\n        \u003cdiv class=\"step\"\u003e\u003cdiv class=\"n\"\u003eSTEP 02 · QUERY\u003c/div\u003e\u003ch5\u003ePull the panel\u003c/h5\u003e\u003cp\u003eSingle SQL on \u003cspan style=\"font-family:var(--se-font-mono); color:var(--se-primary);\"\u003ehex_panel\u003c/span\u003e, filter to last 24 months, project the four features per hex.\u003c/p\u003e\u003c/div\u003e\n        \u003cdiv class=\"step\"\u003e\u003cdiv class=\"n\"\u003eSTEP 03 · SCORE\u003c/div\u003e\u003ch5\u003eComposite ranking\u003c/h5\u003e\u003cp\u003eMin-max each feature within the metro; weight per planning intent (default 0.35 / 0.30 / 0.20 / 0.15); aggregate to ward.\u003c/p\u003e\u003c/div\u003e\n        \u003cdiv class=\"step\"\u003e\u003cdiv class=\"n\"\u003eSTEP 04 · VALIDATE\u003c/div\u003e\u003ch5\u003eCross-check\u003c/h5\u003e\u003cp\u003eTop-25 ward list inspected against M5 resilience and M7 growth typology — flag any wards where the model would over-promise.\u003c/p\u003e\u003c/div\u003e\n        \u003cdiv class=\"step\"\u003e\u003cdiv class=\"n\"\u003eSTEP 05 · DELIVER\u003c/div\u003e\u003ch5\u003eDecision pack\u003c/h5\u003e\u003cp\u003eRanked CSV + interactive dashboard view + single-page PDF with assumptions, weights, and caveats.\u003c/p\u003e\u003c/div\u003e\n      \u003c/div\u003e\n      \u003cp class=\"slide-lead\"\u003eTime elapsed, ingest to deliverable: \u003cstrong style=\"color:var(--se-fg-strong);\"\u003eimmediate\u003c/strong\u003e — a question of this shape runs against the current panel in real time, no rebuild required.\u003c/p\u003e\n    \u003c/div\u003e\n    \u003cdiv class=\"slide-footer\"\u003e\n      \u003cdiv class=\"brand\"\u003e\u003cimg src=\"f61d8b4db13044019d000e581229ea35\" alt=\"Spatial Economics\"\u003e\u003c/div\u003e\n      \u003cdiv\u003e29 · Worked example\u003c/div\u003e\n      \u003cdiv\u003e29 / 34\u003c/div\u003e\n    \u003c/div\u003e\n  \u003c/section\u003e\n\n  \u003c!-- 22 — Operations --\u003e\n  \u003csection class=\"slide\" data-screen-label=\"30 Operations\"\u003e\n    \u003cdiv class=\"slide-pad\"\u003e\n      \u003cheader class=\"slide-header\"\u003e\n        \u003cdiv\u003e\n          \u003cdiv class=\"slide-eyebrow\"\u003eOperations\u003c/div\u003e\n          \u003ch2 class=\"slide-title\" style=\"margin-top:14px;\"\u003eReproducible. Tested. Deployable.\u003c/h2\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"slide-section-tag\"\u003e§ 05 · Operations\u003c/div\u003e\n      \u003c/header\u003e\n      \u003cdiv class=\"grid-4\" style=\"gap:20px;\"\u003e\n        \u003cdiv class=\"card\"\u003e\u003cspan class=\"tag\"\u003eReproducibility\u003c/span\u003e\u003cdiv class=\"num\"\u003e1\u003csmall\u003ecmd\u003c/small\u003e\u003c/div\u003e\u003cp\u003e\u003cspan style=\"font-family:var(--se-font-mono); color:var(--se-primary);\"\u003emake all-local\u003c/span\u003e rebuilds the panel and all nineteen models without the external volume.\u003c/p\u003e\u003c/div\u003e\n        \u003cdiv class=\"card\"\u003e\u003cspan class=\"tag\"\u003eTest surface\u003c/span\u003e\u003cdiv class=\"num\"\u003e1,059\u003c/div\u003e\u003cp\u003eUnit, integration, and validation tests. CI runs the full suite on every change.\u003c/p\u003e\u003c/div\u003e\n        \u003cdiv class=\"card\"\u003e\u003cspan class=\"tag\"\u003eDeployments\u003c/span\u003e\u003cdiv class=\"num\"\u003e3\u003c/div\u003e\u003cp\u003eLocal · Azure App Service · admin control plane (port 8100). Deployment runbook ships in \u003cspan style=\"font-family:var(--se-font-mono);\"\u003edocs/deployment.md\u003c/span\u003e.\u003c/p\u003e\u003c/div\u003e\n        \u003cdiv class=\"card\"\u003e\u003cspan class=\"tag\"\u003eSnapshotting\u003c/span\u003e\u003cdiv class=\"num\"\u003e∞\u003c/div\u003e\u003cp\u003e\u003cspan style=\"font-family:var(--se-font-mono); color:var(--se-primary);\"\u003emake snapshot-configs\u003c/span\u003e writes timestamped config copies for rollback and review.\u003c/p\u003e\u003c/div\u003e\n      \u003c/div\u003e\n      \u003cdiv class=\"grid-2\" style=\"gap:32px;\"\u003e\n        \u003cdiv class=\"card soft\"\u003e\u003cspan class=\"tag\"\u003eREST API · auth\u003c/span\u003e\u003ch4\u003eX-API-Key on every route\u003c/h4\u003e\u003cp\u003eHealth is open. Everything else requires a key. Optional per-IP and per-key rate limits. Echoed X-Request-ID for tracing. Errors land in a single envelope shape.\u003c/p\u003e\u003c/div\u003e\n        \u003cdiv class=\"card soft\"\u003e\u003cspan class=\"tag\"\u003ePrivacy\u003c/span\u003e\u003ch4\u003eHMAC-SHA256 owner hashing\u003c/h4\u003e\u003cp\u003eNo MD5 fallback. Hashing key required at runtime. FTE values are masked under a per-hex small-cell threshold to prevent re-identification.\u003c/p\u003e\u003c/div\u003e\n      \u003c/div\u003e\n    \u003c/div\u003e\n    \u003cdiv class=\"slide-footer\"\u003e\n      \u003cdiv class=\"brand\"\u003e\u003cimg src=\"f61d8b4db13044019d000e581229ea35\" alt=\"Spatial Economics\"\u003e\u003c/div\u003e\n      \u003cdiv\u003e30 · Operations\u003c/div\u003e\n      \u003cdiv\u003e30 / 34\u003c/div\u003e\n    \u003c/div\u003e\n  \u003c/section\u003e\n\n  \u003c!-- 23 — Asks --\u003e\n  \u003csection class=\"slide\" data-screen-label=\"31 What we need\"\u003e\n    \u003cdiv class=\"slide-pad\"\u003e\n      \u003cheader class=\"slide-header\"\u003e\n        \u003cdiv\u003e\n          \u003cdiv class=\"slide-eyebrow\"\u003eWhat we need from Johannesburg\u003c/div\u003e\n          \u003ch2 class=\"slide-title\" style=\"margin-top:14px;\"\u003eThree commitments to keep the platform live.\u003c/h2\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"slide-section-tag\"\u003e§ 06 · Programme\u003c/div\u003e\n      \u003c/header\u003e\n      \n      \u003cdiv class=\"grid-3\" style=\"gap:28px; flex:1;\"\u003e\n        \u003cdiv class=\"card indigo\"\u003e\u003cspan class=\"tag\"\u003eAsk 01\u003c/span\u003e\u003cdiv class=\"num\"\u003e1\u003c/div\u003e\u003ch3\u003eNominated counterpart\u003c/h3\u003e\u003cp\u003eA named, stable lead from your office — single point for Tier 4 data scoping, validation sign-off, and quarterly review.\u003c/p\u003e\u003cdiv class=\"cap\" style=\"margin-top:auto; color:rgba(255,255,255,0.75);\"\u003eTime commitment · ~4 hrs / month\u003c/div\u003e\u003c/div\u003e\n        \u003cdiv class=\"card\"\u003e\u003cspan class=\"tag\"\u003eAsk 02\u003c/span\u003e\u003cdiv class=\"num\"\u003e4\u003c/div\u003e\u003ch3\u003eTier 4 onboarding workshop\u003c/h3\u003e\u003cp\u003eOne half-day with your data, finance, infrastructure, and economic-development leads to scope the Johannesburg operational layer (consumption, faults, valuation, incentives, firm registry).\u003c/p\u003e\u003cdiv class=\"cap\" style=\"margin-top:auto;\"\u003eOutput · co-designed Tier 4 schema\u003c/div\u003e\u003c/div\u003e\n        \u003cdiv class=\"card\"\u003e\u003cspan class=\"tag\"\u003eAsk 03\u003c/span\u003e\u003cdiv class=\"num\"\u003e4\u003c/div\u003e\u003ch3\u003eQuarterly review cadence\u003c/h3\u003e\u003cp\u003eOne 90-minute review per quarter. Walk through validation results, confirm the policy questions in flight, and re-prioritise the roadmap.\u003c/p\u003e\u003cdiv class=\"cap\" style=\"margin-top:auto;\"\u003eOutput · signed validation memo\u003c/div\u003e\u003c/div\u003e\n      \u003c/div\u003e\n      \u003cp class=\"slide-lead\"\u003eIn return: Tiers 1–3 of the platform refreshed against the Johannesburg backbone from day one; Tier 4 brought online together with full reproducibility and source code access — the same surface eThekwini runs today.\u003c/p\u003e\n      \n    \u003c/div\u003e\n    \u003cdiv class=\"slide-footer\"\u003e\n      \u003cdiv class=\"brand\"\u003e\u003cimg src=\"f61d8b4db13044019d000e581229ea35\" alt=\"Spatial Economics\"\u003e\u003c/div\u003e\n      \u003cdiv\u003e31 · What we need\u003c/div\u003e\n      \u003cdiv\u003e31 / 34\u003c/div\u003e\n    \u003c/div\u003e\n  \u003c/section\u003e\n\n  \u003c!-- 24 — Risks --\u003e\n  \u003csection class=\"slide\" data-screen-label=\"32 Risks\"\u003e\n    \u003cdiv class=\"slide-pad\"\u003e\n      \u003cheader class=\"slide-header\"\u003e\n        \u003cdiv\u003e\n          \u003cdiv class=\"slide-eyebrow\"\u003eRisks \u0026amp; gaps\u003c/div\u003e\n          \u003ch2 class=\"slide-title\" style=\"margin-top:14px;\"\u003eWhat we are watching, and what could break.\u003c/h2\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"slide-section-tag\"\u003e§ 06 · Programme\u003c/div\u003e\n      \u003c/header\u003e\n      \u003ctable class=\"spec\"\u003e\n        \u003cthead\u003e\n          \u003ctr\u003e\u003cth style=\"width:240px;\"\u003eRisk\u003c/th\u003e\u003cth\u003eWhy it matters\u003c/th\u003e\u003cth\u003eMitigation\u003c/th\u003e\u003cth style=\"width:120px;\"\u003eStatus\u003c/th\u003e\u003c/tr\u003e\n        \u003c/thead\u003e\n        \u003ctbody\u003e\n          \u003ctr\u003e\u003ctd\u003e\u003cstrong\u003eFTE small-cell masking\u003c/strong\u003e\u003cdiv class=\"cap\" style=\"margin-top:4px;\"\u003ePrivacy\u003c/div\u003e\u003c/td\u003e\u003ctd\u003eHexes with very few employees are masked to prevent re-identification. M1 calibration must work around the masked rows.\u003c/td\u003e\u003ctd\u003eCalibration uses ward-level totals as anchor; downstream models tolerate masked inputs and surface them in the dashboard.\u003c/td\u003e\u003ctd\u003e\u003cspan class=\"badge\" style=\"background:#E5F5EC; color:#1F8F5A;\"\u003eMITIGATED\u003c/span\u003e\u003c/td\u003e\u003c/tr\u003e\n          \u003ctr\u003e\u003ctd\u003e\u003cstrong\u003eExternal volume dependency\u003c/strong\u003e\u003cdiv class=\"cap\" style=\"margin-top:4px;\"\u003e/Volumes/SpatialEcon\u003c/div\u003e\u003c/td\u003e\u003ctd\u003eGHSL rasters and SANLC live on the external volume. Without it, M7 and M8 cannot rebuild from raw.\u003c/td\u003e\u003ctd\u003ePre-built derived tables live in DuckDB. Pipeline runs \u003cspan style=\"font-family:var(--se-font-mono);\"\u003e--skip-external\u003c/span\u003e gracefully.\u003c/td\u003e\u003ctd\u003e\u003cspan class=\"badge\" style=\"background:#FFF1DA; color:#B26A00;\"\u003eWATCHING\u003c/span\u003e\u003c/td\u003e\u003c/tr\u003e\n          \u003ctr\u003e\u003ctd\u003e\u003cstrong\u003eAnthropic API for chat / report export\u003c/strong\u003e\u003c/td\u003e\u003ctd\u003eThe conversational extras and DOCX report export require credentials at request time. Non-AI routes are unaffected.\u003c/td\u003e\u003ctd\u003eAPI startup no longer requires Anthropic credentials. AI routes degrade gracefully when the key is absent.\u003c/td\u003e\u003ctd\u003e\u003cspan class=\"badge\" style=\"background:#E5F5EC; color:#1F8F5A;\"\u003eMITIGATED\u003c/span\u003e\u003c/td\u003e\u003c/tr\u003e\n          \u003ctr\u003e\u003ctd\u003e\u003cstrong\u003eConsumption feed lag\u003c/strong\u003e\u003c/td\u003e\u003ctd\u003eUtility consumption data arrives with a 2–6 week lag. Recent-month nowcasts widen confidence bands.\u003c/td\u003e\u003ctd\u003eDashboard surfaces freshness per variable; recent-month estimates explicitly tagged as provisional.\u003c/td\u003e\u003ctd\u003e\u003cspan class=\"badge\" style=\"background:#FFF1DA; color:#B26A00;\"\u003eWATCHING\u003c/span\u003e\u003c/td\u003e\u003c/tr\u003e\n          \u003ctr\u003e\u003ctd\u003e\u003cstrong\u003eCalibration window drift\u003c/strong\u003e\u003c/td\u003e\u003ctd\u003eLong-running structural shifts (load-shedding regime, hybrid work) can detune M1's proxy regression.\u003c/td\u003e\u003ctd\u003eRetraining cadence is quarterly; validation harness fails the build if M1's r² drops below threshold.\u003c/td\u003e\u003ctd\u003e\u003cspan class=\"badge\" style=\"background:#E5F5EC; color:#1F8F5A;\"\u003eMONITORED\u003c/span\u003e\u003c/td\u003e\u003c/tr\u003e\n          \u003ctr\u003e\u003ctd\u003e\u003cstrong\u003eMethodology novelty\u003c/strong\u003e\u003cdiv class=\"cap\" style=\"margin-top:4px;\"\u003eM2 at sub-city scale\u003c/div\u003e\u003c/td\u003e\u003ctd\u003eHidalgo-Hausmann at intra-city resolution is novel. Peer-review and validation surfaces are still maturing.\u003c/td\u003e\u003ctd\u003eFace-validity checks (V2) plus a published methodology paper from the research loop.\u003c/td\u003e\u003ctd\u003e\u003cspan class=\"badge\" style=\"background:#FCE7EA; color:#C5283D;\"\u003eRESEARCH\u003c/span\u003e\u003c/td\u003e\u003c/tr\u003e\n        \u003c/tbody\u003e\n      \u003c/table\u003e\n    \u003c/div\u003e\n    \u003cdiv class=\"slide-footer\"\u003e\n      \u003cdiv class=\"brand\"\u003e\u003cimg src=\"f61d8b4db13044019d000e581229ea35\" alt=\"Spatial Economics\"\u003e\u003c/div\u003e\n      \u003cdiv\u003e32 · Risks \u0026amp; gaps\u003c/div\u003e\n      \u003cdiv\u003e32 / 34\u003c/div\u003e\n    \u003c/div\u003e\n  \u003c/section\u003e\n\n  \u003c!-- 25 — Roadmap --\u003e\n  \u003csection class=\"slide\" data-screen-label=\"33 Roadmap\"\u003e\n    \u003cdiv class=\"slide-pad\"\u003e\n      \u003cheader class=\"slide-header\"\u003e\n        \u003cdiv\u003e\n          \u003cdiv class=\"slide-eyebrow\"\u003eRoadmap\u003c/div\u003e\n          \u003ch2 class=\"slide-title\" style=\"margin-top:14px;\"\u003eTwo horizons. 90 days. 12 months.\u003c/h2\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"slide-section-tag\"\u003e§ 06 · Programme\u003c/div\u003e\n      \u003c/header\u003e\n      \u003cdiv class=\"grid-2\" style=\"gap:32px; flex:1; align-items:stretch;\"\u003e\n        \u003cdiv class=\"card\" style=\"padding:34px 36px; gap:18px;\"\u003e\n          \u003cspan class=\"tag\"\u003eHorizon 1 · 90 days\u003c/span\u003e\n          \u003ch3\u003ePilot package — sign-off \u0026amp; embed\u003c/h3\u003e\n          \u003cul style=\"margin:0; padding-left:18px; color:var(--se-fg-2); font-size:16px; line-height:1.55; display:flex; flex-direction:column; gap:8px;\"\u003e\n            \u003cli\u003eConfirm validated nowcast for 2024-Q4 against ward GDP\u003c/li\u003e\n            \u003cli\u003eLand 2 pilot policy questions through the Econometric Lab end-to-end\u003c/li\u003e\n            \u003cli\u003eStand up read-only dashboard access for IDP / SDF planning leads\u003c/li\u003e\n            \u003cli\u003eSign quarterly review memo template and confirm cadence\u003c/li\u003e\n            \u003cli\u003eLock the consumption-feed contract and SFTP path\u003c/li\u003e\n          \u003c/ul\u003e\n          \u003cdiv class=\"cap\" style=\"margin-top:auto; color:var(--se-primary);\"\u003eOwner · Spatial Economics + nominated counterpart\u003c/div\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"card warm\" style=\"padding:34px 36px; gap:18px;\"\u003e\n          \u003cspan class=\"tag\" style=\"color:var(--se-fg-strong);\"\u003eHorizon 2 · 12 months\u003c/span\u003e\n          \u003ch3\u003eCommercial package — operate \u0026amp; extend\u003c/h3\u003e\n          \u003cul style=\"margin:0; padding-left:18px; color:var(--se-fg-2); font-size:16px; line-height:1.55; display:flex; flex-direction:column; gap:8px;\"\u003e\n            \u003cli\u003eProduction deployment on Azure App Service with admin control plane\u003c/li\u003e\n            \u003cli\u003eQuarterly model re-training; published validation memos\u003c/li\u003e\n            \u003cli\u003eM9 — service-delivery urgency index (in development)\u003c/li\u003e\n            \u003cli\u003eNational lattice: bind Johannesburg outputs into the existing eThekwini pilot + Western Cape urban-growth-monitor cohort\u003c/li\u003e\n            \u003cli\u003ePublic-facing leave-behind report (annual)\u003c/li\u003e\n          \u003c/ul\u003e\n          \u003cdiv class=\"cap\" style=\"margin-top:auto; color:var(--se-primary);\"\u003eTrigger · pilot sign-off + signed commercial-package SoW\u003c/div\u003e\n        \u003c/div\u003e\n      \u003c/div\u003e\n    \u003c/div\u003e\n    \u003cdiv class=\"slide-footer\"\u003e\n      \u003cdiv class=\"brand\"\u003e\u003cimg src=\"f61d8b4db13044019d000e581229ea35\" alt=\"Spatial Economics\"\u003e\u003c/div\u003e\n      \u003cdiv\u003e33 · Roadmap\u003c/div\u003e\n      \u003cdiv\u003e33 / 34\u003c/div\u003e\n    \u003c/div\u003e\n  \u003c/section\u003e\n\n  \u003c!-- 26 — Closing --\u003e\n  \u003csection class=\"slide title-slide\" data-screen-label=\"34 Close\"\u003e\n    \u003cdiv class=\"title-grid\"\u003e\n      \u003cdiv class=\"title-left\"\u003e\n        \u003cdiv class=\"brand-mark\"\u003e\n          \u003cimg src=\"f61d8b4db13044019d000e581229ea35\" alt=\"Spatial Economics\"\u003e\n          \u003cspan class=\"meta\"\u003eClosing\u003c/span\u003e\n        \u003c/div\u003e\n        \u003cdiv\u003e\n          \u003cdiv class=\"cap\" style=\"color:var(--se-primary); margin-bottom: 28px;\"\u003eNEXT WORKING SESSION\u003c/div\u003e\n          \u003ch1 class=\"title-display\"\u003eSub-city.\u003cbr/\u003eMonthly.\u003cbr/\u003e\u003cem\u003eValidated.\u003c/em\u003e\u003c/h1\u003e\n          \u003cp class=\"title-sub\"\u003eeThekwini already runs the live, validated slice of the platform — built once, tested 1,059 ways, queried hundreds of times. Johannesburg can have the same surface from the national backbone today; the next working session co-designs the Tier 4 data feed, names the counterpart, and locks the review cadence so the platform runs as a service, not a project.\u003c/p\u003e\n        \u003c/div\u003e\n        \u003cdl class=\"title-meta\"\u003e\n          \u003cdt\u003eAction 01\u003c/dt\u003e\u003cdd\u003eConfirm nominated counterpart by 2026-05-09\u003c/dd\u003e\n          \u003cdt\u003eAction 02\u003c/dt\u003e\u003cdd\u003eSFTP path + monthly cadence locked by 2026-05-16\u003c/dd\u003e\n          \u003cdt\u003eAction 03\u003c/dt\u003e\u003cdd\u003eFirst quarterly review · 2026-Q3\u003c/dd\u003e\n        \u003c/dl\u003e\n      \u003c/div\u003e\n      \u003cdiv class=\"title-right\"\u003e\n        \u003cdiv class=\"title-stat-label\"\u003eContact \u0026amp; handover\u003c/div\u003e\n        \u003cdiv\u003e\n          \u003cdiv class=\"title-stat\" style=\"font-size: 110px;\"\u003eLet's\u003cbr/\u003ebuild.\u003c/div\u003e\n          \u003cp class=\"title-sub\" style=\"color:rgba(255,255,255,0.85); max-width:520px; margin-top: 28px;\"\u003eAll material in this deck reflects the v1.0 pilot package. Code, validation, and the full data dictionary are available on request.\u003c/p\u003e\n        \u003c/div\u003e\n        \u003cdl class=\"title-meta\" style=\"color:rgba(255,255,255,0.7);\"\u003e\n          \u003cdt style=\"color:rgba(255,255,255,0.6);\"\u003eEmail\u003c/dt\u003e\u003cdd style=\"color:#fff;\"\u003einsights@spatialecon.co.za\u003c/dd\u003e\n          \u003cdt style=\"color:rgba(255,255,255,0.6);\"\u003eCode\u003c/dt\u003e\u003cdd style=\"color:#fff;\"\u003eEThekwini-Spatial-Economic-Model\u003c/dd\u003e\n          \u003cdt style=\"color:rgba(255,255,255,0.6);\"\u003eVersion\u003c/dt\u003e\u003cdd style=\"color:#fff;\"\u003ev1.0 · 2026-04-27\u003c/dd\u003e\n        \u003c/dl\u003e\n      \u003c/div\u003e\n    \u003c/div\u003e\n  \u003c/section\u003e\n\n\u003c/deck-stage\u003e\n\n\u003cscript type=\"text/babel\" src=\"tweaks-panel.jsx\"\u003e\u003c/script\u003e\n\u003cscript type=\"text/babel\"\u003e\n  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{\n    \"density\": \"dense\",\n    \"variation\": \"consultancy\"\n  }/*EDITMODE-END*/;\n\n  const { TweaksPanel, useTweaks, TweakSection, TweakRadio } = window;\n\n  function App() {\n    const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);\n\n    React.useEffect(() =\u003e {\n      document.body.dataset.density = tweaks.density;\n    }, [tweaks.density]);\n\n    React.useEffect(() =\u003e {\n      document.body.dataset.variation = tweaks.variation;\n    }, [tweaks.variation]);\n\n    return (\n      \u003cTweaksPanel title=\"Tweaks\"\u003e\n        \u003cTweakSection title=\"Density\"\u003e\n          \u003cTweakRadio\n            value={tweaks.density}\n            onChange={(v) =\u003e setTweak('density', v)}\n            options={[\n              { value: 'dense', label: 'Dense' },\n              { value: 'calm',  label: 'Calm' },\n            ]}\n          /\u003e\n        \u003c/TweakSection\u003e\n        \u003cTweakSection title=\"Variation\"\u003e\n          \u003cTweakRadio\n            value={tweaks.variation}\n            onChange={(v) =\u003e setTweak('variation', v)}\n            options={[\n              { value: 'editorial',    label: 'Editorial' },\n              { value: 'consultancy',  label: 'Consultancy' },\n              { value: 'data-led',     label: 'Data-led' },\n            ]}\n          /\u003e\n        \u003c/TweakSection\u003e\n      \u003c/TweaksPanel\u003e\n    );\n  }\n\n  const root = document.createElement('div');\n  document.body.appendChild(root);\n  ReactDOM.createRoot(root).render(\u003cApp /\u003e);\n\u003c/script\u003e\n\n\u003c/body\u003e\n\u003c/html\u003e"</script>
