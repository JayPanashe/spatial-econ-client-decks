/* Spatial Economics — Colors & Type
 *
 * Brand inputs (confirmed by user):
 *   - Primary purple    #594AE3
 *   - Warm-grey neutral #E8E7DF
 *   - Type family       Segoe UI (system stack)
 *
 * Voice: spatial econometrics & GIS / urban economies — crisp, light,
 * research-publication. One saturated indigo accent on a warm-paper canvas.
 * No webfonts; the entire system is set in Segoe UI off the system stack.
 */

:root {
  /* ───────────────────────────────────────── PRIMARY (BRAND) ── */
  /* The single saturated colour in the system. */
  --se-primary:        #594AE3;
  --se-primary-600:    #4A3DD0;   /* hover */
  --se-primary-700:    #3A30B0;   /* active / press */
  --se-primary-50:     #EEEBFD;   /* tint chips & callouts */
  --se-primary-100:    #DDD7FB;
  --se-primary-200:    #BBB1F7;

  /* ───────────────────────────────────────── NEUTRALS ── */
  /* The warm grey #E8E7DF anchors panels and dividers. The page itself
     stays paper-white; #E8E7DF appears as soft bands, card edges, and
     the body of the trusted-by strip. Text is a cool near-black ink. */
  --se-bg:             #FFFFFF;
  --se-bg-soft:        #F4F3EE;   /* soft warm panel (lighter than --warm) */
  --se-warm:           #E8E7DF;   /* signature warm-grey */
  --se-warm-strong:    #D9D7CC;   /* warm-grey hairline / divider */

  --se-bg-cool:        #F7F8FB;   /* alternate cool panel for data UIs */
  --se-line:           #E3E3DC;   /* default hairline (warm tilt) */
  --se-line-strong:    #C9C8BF;

  --se-fg:             #0F1525;   /* body ink */
  --se-fg-strong:      #060914;   /* headings */
  --se-fg-2:           #3A4256;   /* secondary copy */
  --se-fg-3:           #6B7385;   /* tertiary / labels */
  --se-fg-4:           #9AA0AE;   /* disabled / captions */

  /* ───────────────────────────────────────── SEMANTIC ── */
  --se-success:        #1F8F5A;
  --se-success-bg:     #E5F5EC;
  --se-warning:        #B26A00;
  --se-warning-bg:     #FFF1DA;
  --se-danger:         #C5283D;
  --se-danger-bg:      #FCE7EA;
  --se-info:           var(--se-primary);
  --se-info-bg:        var(--se-primary-50);

  /* ───────────────────────────────────────── DATA-VIZ ── */
  /* Map / chart palette tuned for choropleths and ranked categories. */
  --se-data-1:         #594AE3;   /* indigo (brand) */
  --se-data-2:         #2F8FE3;   /* sky */
  --se-data-3:         #18B4A7;   /* teal */
  --se-data-4:         #E5A33C;   /* amber */
  --se-data-5:         #D5436A;   /* magenta */
  --se-data-6:         #2A2F45;   /* graphite */

  /* ───────────────────────────────────────── ELEVATION ── */
  --se-shadow-xs: 0 1px 2px rgba(15, 21, 37, 0.04);
  --se-shadow-sm: 0 2px 6px rgba(15, 21, 37, 0.06);
  --se-shadow-md: 0 8px 24px rgba(15, 21, 37, 0.08);
  --se-shadow-lg: 0 24px 48px -12px rgba(15, 21, 37, 0.18);
  --se-ring:      0 0 0 3px rgba(89, 74, 227, 0.22);

  /* ───────────────────────────────────────── RADII ── */
  --se-radius-xs: 4px;
  --se-radius-sm: 6px;
  --se-radius-md: 10px;
  --se-radius-lg: 14px;
  --se-radius-xl: 20px;
  --se-radius-pill: 999px;

  /* ───────────────────────────────────────── SPACING (4-base) ── */
  --se-space-1:  4px;
  --se-space-2:  8px;
  --se-space-3:  12px;
  --se-space-4:  16px;
  --se-space-5:  24px;
  --se-space-6:  32px;
  --se-space-7:  48px;
  --se-space-8:  64px;
  --se-space-9:  96px;

  /* ───────────────────────────────────────── TYPE FAMILIES ── */
  /* No webfonts. Segoe UI off the system stack — same family for display,
     UI, and editorial. For numerical / tabular content we still call
     `--se-font-mono` so figures sit in columns; it falls back to Consolas /
     SF Mono which ship on Segoe-host systems. */
  --se-font-display: "Segoe UI", "Segoe UI Variable Display", system-ui, -apple-system, "Helvetica Neue", Arial, sans-serif;
  --se-font-sans:    "Segoe UI", "Segoe UI Variable Text", system-ui, -apple-system, "Helvetica Neue", Arial, sans-serif;
  --se-font-mono:    "Cascadia Mono", "Consolas", ui-monospace, "SF Mono", Menlo, monospace;

  /* ───────────────────────────────────────── TYPE SCALE ── */
  /* 1.250 (major third), base 16px */
  --se-fs-xs:   12px;
  --se-fs-sm:   14px;
  --se-fs-base: 16px;
  --se-fs-md:   18px;
  --se-fs-lg:   20px;
  --se-fs-xl:   24px;
  --se-fs-2xl:  30px;
  --se-fs-3xl:  38px;
  --se-fs-4xl:  48px;
  --se-fs-5xl:  60px;
  --se-fs-6xl:  76px;

  --se-lh-tight:   1.1;
  --se-lh-snug:    1.25;
  --se-lh-normal:  1.5;
  --se-lh-relaxed: 1.65;

  /* Segoe UI is friendlier with slightly less aggressive tracking than
     a geometric display font would take. */
  --se-tracking-tight:  -0.015em;
  --se-tracking-snug:   -0.005em;
  --se-tracking-normal: 0;
  --se-tracking-wide:   0.02em;
  --se-tracking-wider:  0.08em;   /* eyebrows / overlines */

  /* ───────────────────────────────────────── MOTION ── */
  --se-ease-out:    cubic-bezier(0.2, 0.8, 0.2, 1);
  --se-ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);
  --se-dur-fast: 120ms;
  --se-dur:      200ms;
  --se-dur-slow: 360ms;
}

/* ─────────────────────────────────────────── BASE ── */

html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
body {
  font-family: var(--se-font-sans);
  font-size: var(--se-fs-base);
  line-height: var(--se-lh-relaxed);
  color: var(--se-fg);
  background: var(--se-bg);
}

/* ─────────────────────────────────────────── SEMANTIC TYPE ── */
/* Apply these classes (or copy the rules) wherever you'd otherwise reach
   for ad-hoc font-size declarations. Headings track tight, body tracks
   normal, eyebrows track wide. Display uses Segoe UI Semibold (600) for
   weight; Segoe Bold (700) for top-of-page hero only. */

.se-eyebrow,
[data-se="eyebrow"] {
  font-family: var(--se-font-sans);
  font-size: var(--se-fs-xs);
  font-weight: 600;
  letter-spacing: var(--se-tracking-wider);
  text-transform: uppercase;
  color: var(--se-primary);
}

.se-h1, [data-se="h1"] {
  font-family: var(--se-font-display);
  font-size: clamp(40px, 5vw, var(--se-fs-5xl));
  font-weight: 700;
  line-height: var(--se-lh-tight);
  letter-spacing: var(--se-tracking-tight);
  color: var(--se-fg-strong);
}

.se-h2, [data-se="h2"] {
  font-family: var(--se-font-display);
  font-size: clamp(28px, 3.4vw, var(--se-fs-3xl));
  font-weight: 600;
  line-height: var(--se-lh-snug);
  letter-spacing: var(--se-tracking-snug);
  color: var(--se-fg-strong);
}

.se-h3, [data-se="h3"] {
  font-family: var(--se-font-display);
  font-size: var(--se-fs-xl);
  font-weight: 600;
  line-height: var(--se-lh-snug);
  letter-spacing: var(--se-tracking-snug);
  color: var(--se-fg-strong);
}

.se-h4, [data-se="h4"] {
  font-family: var(--se-font-display);
  font-size: var(--se-fs-lg);
  font-weight: 600;
  line-height: var(--se-lh-snug);
  color: var(--se-fg-strong);
}

.se-lead, [data-se="lead"] {
  font-family: var(--se-font-sans);
  font-size: var(--se-fs-lg);
  font-weight: 400;
  line-height: var(--se-lh-relaxed);
  color: var(--se-fg-2);
}

.se-body, [data-se="body"] {
  font-family: var(--se-font-sans);
  font-size: var(--se-fs-base);
  font-weight: 400;
  line-height: var(--se-lh-relaxed);
  color: var(--se-fg);
}

.se-small, [data-se="small"] {
  font-family: var(--se-font-sans);
  font-size: var(--se-fs-sm);
  line-height: var(--se-lh-normal);
  color: var(--se-fg-3);
}

.se-mono, [data-se="mono"] {
  font-family: var(--se-font-mono);
  font-size: var(--se-fs-sm);
  letter-spacing: 0;
  font-feature-settings: "tnum" 1;
}

.se-quote, [data-se="quote"] {
  font-family: var(--se-font-sans);   /* italic Segoe — no serif option */
  font-size: var(--se-fs-2xl);
  font-style: italic;
  font-weight: 400;
  line-height: var(--se-lh-snug);
  color: var(--se-fg-strong);
}

/* Tabular figures — use anywhere you render a number (KPIs, ward counts).
   Segoe UI supports tnum natively. */
.se-tnum { font-variant-numeric: tabular-nums; font-feature-settings: "tnum" 1; }

  <style>
    body {
      margin: 0;
      background: var(--se-bg-muted, #EEF1F6);
      font-family: var(--se-font-sans);
      color: var(--se-fg);
    }

    deck-stage { display: block; width: 100%; height: 100vh; }

    /* Reference-data badge for non-ETH clients on every slide driven by ETH numbers,
       worked examples, or eThekwini-specific scenarios */
    body.has-reference-badge section.slide[data-screen-label^="09 "]::before,
    body.has-reference-badge section.slide[data-screen-label^="13 "]::before,
    body.has-reference-badge section.slide[data-screen-label^="14 "]::before,
    body.has-reference-badge section.slide[data-screen-label^="15 "]::before,
    body.has-reference-badge section.slide[data-screen-label^="16 "]::before,
    body.has-reference-badge section.slide[data-screen-label^="17 "]::before,
    body.has-reference-badge section.slide[data-screen-label^="19 "]::before,
    body.has-reference-badge section.slide[data-screen-label^="27 "]::before,
    body.has-reference-badge section.slide[data-screen-label^="28 "]::before,
    body.has-reference-badge section.slide[data-screen-label^="29 "]::before {
      content: "REFERENCE · figures shown are eThekwini's pilot implementation";
      position: absolute;
      top: 28px;
      right: 112px;
      z-index: 10;
      padding: 7px 14px;
      background: var(--se-warm);
      color: var(--se-fg-strong);
      border: 1px solid var(--se-warm-strong);
      border-radius: 999px;
      font-family: var(--se-font-sans);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.10em;
      text-transform: uppercase;
    }

    /* ─────────────── slide chrome ─────────────── */
    section.slide {
      width: 1920px;
      height: 1080px;
      background: var(--se-bg);
      color: var(--se-fg);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .slide-pad {
      padding: 88px 112px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 40px;
    }

    .slide-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      border-bottom: 1px solid var(--se-line);
      padding-bottom: 24px;
    }

    .slide-eyebrow {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--se-primary);
      font-family: var(--se-font-sans);
    }
    .slide-section-tag {
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--se-fg-3);
      font-family: var(--se-font-mono);
    }

    .slide-footer {
      position: absolute;
      bottom: 36px;
      left: 112px;
      right: 112px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      color: var(--se-fg-3);
      letter-spacing: 0.04em;
      font-family: var(--se-font-mono);
      border-top: 1px solid var(--se-line);
      padding-top: 16px;
    }
    .slide-footer .brand {
      display: flex; align-items: center;
      font-family: var(--se-font-display);
      font-weight: 700;
      color: var(--se-fg-strong);
      letter-spacing: 0.02em;
    }
    .slide-footer .brand b { color: var(--se-primary); }
    .slide-footer .brand img { height: 22px; width: auto; display: block; }
    .title-left .brand-mark img { height: 40px; width: auto; display: block; }
    .title-left .brand-mark { display: flex; align-items: center; gap: 18px; }
    .title-left .brand-mark .meta { font-family: var(--se-font-mono); font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--se-fg-3); border-left: 1px solid var(--se-line); padding-left: 18px; line-height: 1.5; }

    h1.slide-title {
      font-family: var(--se-font-display);
      font-size: 64px;
      line-height: 1.05;
      letter-spacing: -0.02em;
      font-weight: 700;
      color: var(--se-fg-strong);
      margin: 0;
      max-width: 1400px;
    }
    h2.slide-title {
      font-family: var(--se-font-display);
      font-size: 52px;
      line-height: 1.08;
      letter-spacing: -0.02em;
      font-weight: 700;
      color: var(--se-fg-strong);
      margin: 0;
      max-width: 1500px;
    }
    p.slide-lead {
      font-size: 24px;
      line-height: 1.4;
      color: var(--se-fg-2);
      max-width: 1200px;
      margin: 0;
      font-weight: 400;
    }

    /* ─────────────── primitives ─────────────── */
    .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:32px; }
    .grid-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:24px; }
    .grid-4 { display:grid; grid-template-columns:repeat(4,1fr); gap:20px; }

    .card {
      background: var(--se-bg);
      border: 1px solid var(--se-line);
      border-radius: 14px;
      padding: 28px 32px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .card.soft { background: var(--se-bg-soft); border-color: var(--se-line); }
    .card.warm { background: #E8E7DF; border-color: #DAD9D0; }
    .card.indigo {
      background: var(--se-primary);
      color: #fff;
      border-color: var(--se-primary);
    }
    .card.indigo h3, .card.indigo h4, .card.indigo .num { color: #fff; }
    .card.indigo p, .card.indigo .small { color: rgba(255,255,255,0.85); }

    .tag {
      align-self: flex-start;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--se-primary);
      font-family: var(--se-font-mono);
    }
    .card.indigo .tag { color: rgba(255,255,255,0.9); }

    .card h3 { margin:0; font-family:var(--se-font-display); font-size:24px; font-weight:700; color:var(--se-fg-strong); letter-spacing:-0.01em; }
    .card h4 { margin:0; font-family:var(--se-font-display); font-size:20px; font-weight:700; color:var(--se-fg-strong); }
    .card p  { margin:0; font-size:16px; line-height:1.5; color:var(--se-fg-2); }
    .card .small { font-size:13px; color:var(--se-fg-3); }
    .card .num {
      font-family: var(--se-font-display);
      font-size: 56px; font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--se-fg-strong);
      line-height: 0.95;
      font-variant-numeric: tabular-nums;
    }
    .card .num small { font-size: 18px; color: var(--se-fg-3); font-weight:500; letter-spacing: 0; margin-left:6px; }

    .chip {
      display: inline-flex; align-items: center;
      padding: 6px 14px;
      border: 1px solid var(--se-line);
      border-radius: 999px;
      font-size: 13px;
      color: var(--se-fg-2);
      font-family: var(--se-font-mono);
      background: #fff;
    }
    .chip.indigo { background: var(--se-primary-50); color: var(--se-primary-700); border-color: var(--se-primary-100); }
    .chip-row { display:flex; flex-wrap:wrap; gap:10px; }

    .kv { display:grid; grid-template-columns: 220px 1fr; gap: 12px 24px; font-size: 15px; }
    .kv dt { font-family: var(--se-font-mono); color: var(--se-fg-3); font-size: 13px; letter-spacing: 0.04em; text-transform: uppercase; }
    .kv dd { margin: 0; color: var(--se-fg); }

    table.spec {
      width: 100%; border-collapse: collapse; font-size: 15px;
    }
    table.spec th, table.spec td {
      text-align: left; padding: 14px 18px; border-bottom: 1px solid var(--se-line);
      vertical-align: top;
    }
    table.spec th {
      font-family: var(--se-font-mono); font-size: 12px; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--se-fg-3); font-weight: 600;
      border-bottom: 2px solid var(--se-fg-strong);
    }
    table.spec td.mono { font-family: var(--se-font-mono); font-variant-numeric: tabular-nums; }
    table.spec td .badge {
      display:inline-block; font-family: var(--se-font-mono); font-size:11px;

      color: var(--se-primary-700); letter-spacing: 0.06em;
    }

    /* full-bleed title slide */
    section.slide.title-slide { padding: 0; background: var(--se-bg); }
    .title-grid {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      width: 100%; height: 100%;

    .title-left {

    .model-card h4 { margin: 0; font-family: var(--se-font-display); font-size: 19px; color: var(--se-fg-strong); }
    .model-card p  { margin: 0; font-size: 14px; line-height: 1.45; color: var(--se-fg-2); }
    .model-card .out {
      font-family: var(--se-font-mono); font-size: 12px;
